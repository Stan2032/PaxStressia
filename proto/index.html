<script id="engine-js">
/* PaxStressia greybox engine — DOM-free port of sim/ (DESIGN.md §18).
   Self-consistent seeded determinism; not bit-compatible with the Python sim
   (each client is internally deterministic; rules JSON is the shared truth). */
"use strict";
const PaxEngine = (function () {
  function clamp(v, lo, hi) {
    lo = lo === undefined ? 0 : lo; hi = hi === undefined ? 100 : hi;
    return Math.max(lo, Math.min(hi, v));
  }
  function mulberry32(seed) {
    let s = seed >>> 0;
    return {
      state: () => s,
      setState: (v) => { s = v >>> 0; },
      next() {
        s |= 0; s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      },
    };
  }
  function gauss(rng, sigma) {
    let u = rng.next(); if (u <= 0) u = 1e-12;
    const v = rng.next();
    return sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  const sorted = (obj) => Object.keys(obj).sort();

  function Game(rules, seed) {
    const C = rules.constants;
    const rng = mulberry32(seed);
    const st = {
      seed, turn: 0, pendingEvent: null, fired: [],
      nodes: {}, edges: [], factions: {}, coupRisk: {}, collapsed: {},
      protoBlocs: [], blocs: [], exposure: {},
      norms: { kinetic: 50, rule_of_law: 50, autocracy: 50 },
      markets: { arms: 50, oil: 50 }, patronStrength: {}, rivalry: 0, commands: [], coalition: 0,
      actives: [],
      player: { domestic: C.starting.domestic, international: C.starting.international,
        treasury: C.starting.treasury, mandate: 0, drift: 0, casualties: 0,
        turnsSinceElection: 0, honeymoonLeft: 0, spentTotal: 0, suppressClocks: [] },
      ledger: [], reports: [], estimates: {}, headlines: [],
      hist: { believed: [], truth: [], domestic: [], international: [], localAvg: [] },
      headlineStreak: {},
    };
    for (const n of rules.nodes) {
      st.nodes[n.id] = { id: n.id, name: n.name, country: n.country, capital: n.capital,
        governance: n.governance, development: n.development, grievance: n.grievance,
        population_k: n.population_k, government: n.government || "civilian",
        local: n.local_legitimacy, intelBase: n.intel_coverage, intel: n.intel_coverage,
        patron: Object.assign({}, n.patron_influence || {}), opsPressure: 0, partnerCap: 0,
        resources: (n.resources || []).slice(), theater: n.theater || null, presence: {} };
      for (const f of sorted(n.presence || {})) {
        const p = n.presence[f];
        st.nodes[n.id].presence[f] = { s: p.strength, e: p.entrenchment, v: p.visibility };
      }
    }
    st.edges = rules.edges.map((e) => ({ id: e.id, a: e.a, b: e.b, types: e.types,
      capacity: e.capacity, interdiction: 0 }));
    for (const f of rules.factions) {
      st.factions[f.id] = { id: f.id, name: f.name, sponsor: f.sponsor || null,
        tier: f.capability_tier, relations: f.relations || {}, links: [] };
    }
    const countries = [...new Set(rules.nodes.map((n) => n.country))].sort();
    for (const c of countries) { st.coupRisk[c] = 0; st.collapsed[c] = false; st.exposure[c] = 0; }
    const patronDefs = rules.patrons || [];
    for (const p of patronDefs) if (!(p.id in st.patronStrength)) st.patronStrength[p.id] = 0;
    const inits = {}; for (const i of rules.initiatives) inits[i.id] = i;

    const nodesSorted = () => sorted(st.nodes).map((k) => st.nodes[k]);
    const countryNodes = (c) => nodesSorted().filter((n) => n.country === c);
    const capitalOf = (c) => countryNodes(c).find((n) => n.capital) || null;
    const edgesOf = (id) => st.edges.filter((e) => e.a === id || e.b === id);
    const avgGrievance = () =>
      nodesSorted().reduce((s, n) => s + n.grievance, 0) / nodesSorted().length;
    const juntaCount = () => countries.filter((c) => {
      const cap = capitalOf(c); return cap && cap.government !== "civilian" &&
        cap.government !== "failed";
    }).length;
    const totalStrength = () => nodesSorted().reduce((s, n) =>
      s + sorted(n.presence).reduce((t, f) => t + n.presence[f].s, 0), 0);
    const localAvg = () =>
      nodesSorted().reduce((s, n) => s + n.local, 0) / nodesSorted().length;

    function ledgerApply(gauge, source, delta) {
      let applied = 0;
      if (gauge === "domestic") {
        const old = st.player.domestic;
        st.player.domestic = clamp(old + delta); applied = st.player.domestic - old;
      } else if (gauge === "international") {
        const old = st.player.international;
        st.player.international = clamp(old + delta); applied = st.player.international - old;
      } else {
        const n = st.nodes[gauge.slice(6)];
        const old = n.local; n.local = clamp(old + delta); applied = n.local - old;
      }
      if (applied !== 0) st.ledger.push({ turn: st.turn, gauge, source,
        delta: Math.round(applied * 10000) / 10000 });
    }

    function refreshActives() {
      st.actives = st.actives.filter((a) => a.expires > st.turn);
      for (const n of nodesSorted()) { n.opsPressure = 0; n.intel = n.intelBase; }
      const amnesty = {}; let umbrella = 0;
      for (const a of st.actives) {
        if (a.op === "ops_pressure") st.nodes[a.node].opsPressure += a.params.amount;
        else if (a.op === "intel") {
          const targets = a.node ? [a.node] : sorted(st.nodes);
          for (const t of targets) st.nodes[t].intel += a.params.delta;
        } else if (a.op === "amnesty") amnesty[a.node] = (amnesty[a.node] || 0) + a.params.rate;
        else if (a.op === "intl_umbrella") umbrella += a.params.delta;
      }
      for (const n of nodesSorted()) n.intel = clamp(n.intel, 0.05, 0.95);
      return { amnesty, umbrella };
    }

    function applyOp(op, nodeId, source, log) {
      const kind = op.op;
      if (["ops_pressure", "intel", "amnesty", "intl_umbrella"].includes(kind)) {
        const params = {}; for (const k of Object.keys(op))
          if (!["op", "turns", "node"].includes(k)) params[k] = op[k];
        st.actives.push({ op: kind, params,
          node: kind === "intl_umbrella" ? null : nodeId, source,
          expires: st.turn + (op.turns || 1) });
      } else if (kind === "attrit") {
        const n = st.nodes[nodeId];
        const ids = sorted(n.presence);
        if (ids.length) {
          const target = ids.reduce((a, b) => (n.presence[b].s > n.presence[a].s ? b : a));
          n.presence[target].s = clamp(n.presence[target].s - op.amount);
          log.push({ event: "attrit", node: nodeId, faction: target,
            amount: op.amount, source });
        }
      } else if (kind === "local_legitimacy") ledgerApply("local:" + nodeId, source, op.delta);
      else if (kind === "domestic_legitimacy") ledgerApply("domestic", source, op.delta);
      else if (kind === "international_legitimacy")
        ledgerApply("international", source, op.delta);
      else if (["governance", "development", "grievance"].includes(kind)) {
        const n = st.nodes[nodeId]; n[kind] = clamp(n[kind] + op.delta);
      } else if (kind === "partner_capacity") {
        const n = st.nodes[nodeId]; n.partnerCap = Math.max(0, n.partnerCap + op.delta);
      } else if (kind === "coup_seed") {
        st.coupRisk[st.nodes[nodeId].country] += op.delta;
      } else if (kind === "drift") st.player.drift += op.tiers;
      else if (kind === "presence") {
        const n = st.nodes[nodeId];
        if (!(op.faction in n.presence)) {
          n.presence[op.faction] = { s: 0, e: 0, v: 30 };
          log.push({ event: "presence_seeded", faction: op.faction, node: nodeId, source });
        }
        const p = n.presence[op.faction];
        p.s = clamp(p.s + (op.strength || 0));
        p.e = clamp(p.e + (op.entrenchment || 0));
      } else if (kind === "patron") {
        const n = st.nodes[nodeId];
        n.patron[op.patron] = clamp((n.patron[op.patron] || 0) + op.delta);
      } else if (kind === "suppress_clock") {
        st.player.suppressClocks.push({ severity: op.severity, age: 0,
          source, node: nodeId || null });
        log.push({ event: "suppressed", source, severity: op.severity });
      } else if (kind === "exposure") {
        const targets = nodeId ? [st.nodes[nodeId].country]
          : countries.filter((c) => { const cap = capitalOf(c);
            return cap && cap.government !== "civilian"; });
        for (const c of targets) st.exposure[c] = clamp((st.exposure[c] || 0) + op.delta);
        if (targets.length) log.push({ event: "exposure", countries: targets, source });
      } else if (kind === "designate") {
        const c = nodeId ? st.nodes[nodeId].country : null;
        if (c) {
          if ((st.exposure[c] || 0) >= C.sanctions_exposure_min) {
            st.exposure[c] -= C.sanctions_exposure_cost;
            ledgerApply("international", source, C.sanctions_intl);
            const patron = dominantPatron(c);
            for (const n of countryNodes(c))
              n.patron[patron] = Math.max(0, (n.patron[patron] || 0) - C.sanctions_patron);
            if (patron in st.patronStrength)
              st.patronStrength[patron] = Math.max(0, st.patronStrength[patron] - C.sanctions_patron_global);
            for (const b of st.blocs) if (b.countries.includes(c))
              b.stage = Math.max(1, b.stage - C.sanctions_bloc_slow);
            log.push({ event: "designation", country: c, patron, source });
          } else {
            ledgerApply("international", source + ":thin_case", -1);
            log.push({ event: "designation_failed", country: c, source });
          }
        }
      } else if (kind === "negotiate") {
        const n = nodeId ? st.nodes[nodeId] : null;
        const fids = n ? sorted(n.presence) : [];
        if (fids.length) {
          const t = fids.reduce((a, b) => (n.presence[b].s > n.presence[a].s ? b : a));
          const p = n.presence[t];
          if (p.s >= C.negotiate_min && p.s <= C.negotiate_max) {
            p.s = clamp(p.s - C.negotiate_strength_drain);
            p.e = clamp(p.e - C.negotiate_strength_drain / 2);
            ledgerApply("domestic", source, -C.negotiate_domestic_cost);
            ledgerApply("international", source, C.negotiate_international_gain);
            log.push({ event: "negotiated", node: nodeId, faction: t, source });
          } else {
            ledgerApply("domestic", source + ":talks_failed", -1);
            log.push({ event: "negotiate_failed", node: nodeId, source });
          }
        }
      } else if (kind === "command") {
        // §21.7: stand up a standing Regional Command over the node's theatre.
        const th = nodeId ? st.nodes[nodeId].theater : null;
        if (C.commands_enabled > 0 && th && !st.commands.includes(th) &&
            st.commands.length < C.command_max) {
          st.commands.push(th); st.commands.sort();
          log.push({ event: "command_established", theater: th, node: nodeId, source });
        }
      } else if (kind === "coalition") {
        // §21.8: rally partners toward their fair share — raises cohesion.
        if (C.coalition_enabled > 0) {
          st.coalition = clamp(st.coalition + C.coalition_rally_gain);
          log.push({ event: "coalition_rallied", cohesion: Math.round(st.coalition), source });
        }
      }
    }
    function coalitionBurdenShare() {
      // §21.8: fraction of Regional-Command cost the coalition currently carries.
      if (!(C.coalition_enabled > 0)) return 0;
      return C.coalition_max_share * (st.coalition / 100);
    }
    function coalitionDecay() {
      // free-riding drift + fraying under a rising rival bloc + the strain of every
      // command you lean on it to carry (§21.8); mirrors sim/coalition.py.
      if (!(C.coalition_enabled > 0)) return;
      const erosion = C.coalition_decay + C.coalition_rivalry_erosion * st.rivalry / 100 +
        C.coalition_command_strain * st.commands.length;
      st.coalition = clamp(st.coalition - erosion);
    }
    function commandsApply(log) {
      // §21.7: standing commands CONTAIN their theatres (breadth, not depth) and
      // BLEED the home front at an accelerating cost; mirrors sim/commands.py.
      if (!(C.commands_enabled > 0) || !st.commands.length) return;
      for (const th of st.commands.slice()) {
        for (const n of nodesSorted().filter((x) => x.theater === th)) {
          const ids = sorted(n.presence);
          if (ids.length) {
            const t = ids.reduce((a, b) => (n.presence[b].s > n.presence[a].s ? b : a));
            n.presence[t].s = clamp(n.presence[t].s - C.command_attrition);
          }
          n.governance = clamp(n.governance + C.command_gov_buffer);

        !(c.once && st.fired.includes(c.id)));

      const total = pool.reduce((s, c) => s + c.weight, 0);
      let roll = rng.next() * total;
      for (const c of pool) { if (roll < c.weight) return c; roll -= c.weight; }
      return pool[pool.length - 1];
    }

    let work = null; // per-turn scratch between endTurn and finishTurn
    function endTurn(orders) {
      const log = [], events = [];
      const casualtiesBefore = st.player.casualties;
      const driftBefore = st.player.drift;
      const executed = [];
      for (const o of orders || []) {
        const init = inits[o.initiative]; if (!init) continue;
        if (init.target === "node" && !(o.node in st.nodes)) continue;
        if (init.mandate_cost > st.player.mandate ||
            init.treasury_cost > st.player.treasury) continue;
        st.player.mandate -= init.mandate_cost;
        st.player.treasury -= init.treasury_cost;
        st.player.spentTotal += init.treasury_cost;
        executed.push({ initiative: init.id, node: o.node || null });
      }
      for (const o of executed) {
        const init = inits[o.initiative];
        for (const eff of init.effects) applyOp(eff, o.node, init.id, log);
        const risk = init.casualty_risk || 0;
        if (init.family === "military" && risk > 0 && rng.next() < risk) {
          st.player.casualties += 1;
          log.push({ event: "casualties", initiative: init.id, node: o.node });
        }
      }
      for (const o of executed) {
        const bf = inits[o.initiative].backfire;
        if (rng.next() < bf.probability) {
          for (const eff of bf.effects) applyOp(eff, o.node, o.initiative + ":backfire", log);
          log.push({ event: "backfire", initiative: o.initiative, channel: bf.channel,
            node: o.node });
        }
      }
      const { amnesty, umbrella } = refreshActives();
      if (umbrella > 0) ledgerApply("international", "un_umbrella", umbrella);
      const growth = applyGrowth(amnesty);
      log.push(...applySpread());
      entrenchAndVisibility();
      log.push(...networkingCheck(growth.dealt));
      commandsApply(log);  // standing commands contain before the collapse rolls (§21.7)
      log.push(...collapseRolls());
      updateBlocs(log);
      patronMarket(log);
      updateMarkets();
      decayExposure();
      work = { log, events, executed, casualtiesBefore, driftBefore, growthLog: growth.log };
      const card = drawEvent();
      if (card) {
        st.pendingEvent = { id: card.id, ctx: contextNode() };
        return { phase: "event", card, ctx: st.pendingEvent.ctx };
      }
      return finishTurn();
    }
    function resolveEvent(choiceIdx) {
      const card = rules.events.find((c) => c.id === st.pendingEvent.id);
      const idx = Math.min(choiceIdx, card.choices.length - 1);
      const choice = card.choices[idx];
      for (const eff of choice.effects)
        applyOp(eff, eff.node || st.pendingEvent.ctx, "event:" + card.id, work.log);
      work.events.push({ id: card.id, title: card.title, choice: choice.label,
        node: st.pendingEvent.ctx });
      st.fired.push(card.id);
      st.pendingEvent = null;
      return finishTurn();
    }
    function finishTurn() {
      updateNorms(work.executed, st.player.drift - work.driftBefore);  // §21 precedent
      const newCas = st.player.casualties - work.casualtiesBefore;
      if (newCas > 0)
        ledgerApply("domestic", "casualties", -C.domestic_hit_per_casualty * newCas);
      applyNormFeedback(work.log);
      applyMarketFeedback(work.log);
      coalitionDecay();  // partners free-ride back unless rallied (§21.8)
      processSuppressClocks(work.log);
      const el = electionTick(); if (el) work.log.push(el);
      const believed = nodesSorted().reduce((s, n) => {
        const est = st.estimates[n.id];
        return s + sorted(est.factions).reduce((t, f) => t + est.factions[f].s, 0);
      }, 0);
      st.hist.believed.push(Math.round(believed));
      st.hist.truth.push(Math.round(totalStrength()));
      st.hist.domestic.push(Math.round(st.player.domestic));
      st.hist.international.push(Math.round(st.player.international));
      st.hist.localAvg.push(Math.round(localAvg()));
      const report = { turn: st.turn,
        ledger: st.ledger.filter((e) => e.turn === st.turn),
        log: work.log, events: work.events, orders: work.executed,
        growth: work.growthLog };
      st.reports.push(report);
      if (st.reports.length > 8) st.reports.shift();
      st.turn += 1;
      startTurn();
      return { phase: "done", report };
    }
    function startTurn() {
      refreshActives();
      const income = mandateIncome();
      st.player.mandate += income;
      st.player.treasury += C.treasury_income;
      st.lastIncome = income;
      computeEstimates();
    }
    function grip(n) {  // insurgent shadow-control (Pillar 4): painted ≠ stabilized
      const fids = sorted(n.presence);
      if (!fids.length) return 0;
      return clamp(Math.max(...fids.map((f) =>
        0.5 * n.presence[f].s + 0.5 * n.presence[f].e)), 0, 100) / 100;
    }
    function score() {
      const ns = nodesSorted();
      let stab, order;
      if (C.grand_scoring > 0) {
        // grand mode (§21.5): scale-invariant containment, mirrors sim/engine.py —
        // population-weighted quality + the free fraction of the world's capitals,
        // dragged by consolidated blocs. order_mult is folded in here.
        const wt = (n) => Math.sqrt(Math.max(1, n.population_k));
        const wsum = ns.reduce((s, n) => s + wt(n), 0) || 1;
        const quality = 100 * ns.reduce((s, n) =>
          s + wt(n) * (n.local / 100) * (n.governance / 100) * (1 - grip(n)), 0) / wsum;
        const freeFrac = 1 - juntaCount() / Math.max(1, countries.length);
        const blocPen = 1 / (1 + C.order_bloc_weight_grand * blocContainment() / C.grand_bloc_ref);
        stab = (C.grand_free_weight * 100 * freeFrac + (1 - C.grand_free_weight) * quality) * blocPen;
        order = 1;
      } else {
        stab = 100 * ns.reduce((s, n) =>
          s + (n.local / 100) * (n.governance / 100) * (1 - grip(n)), 0) / ns.length;
        order = 1 / (1 + C.order_junta_weight * juntaCount() +
          C.order_bloc_weight * blocContainment());
      }
      const integrity = Math.max(C.integrity_floor, 1 - C.drift_per_tier * st.player.drift);
      const costs = st.player.casualties * C.cost_per_casualty +
        st.player.spentTotal * C.cost_spend_norm +
        st.player.drift * C.drift_score_cost;  // §7: Authoritarian Drift is a direct cost too
      const round = (x) => Math.round(x * 100) / 100;
      return { stabilization: round(stab), order_mult: round(order),
        integrity_mult: round(integrity), costs: round(costs),
        juntas: juntaCount(), blocs: st.protoBlocs.length,
        casualties: st.player.casualties, drift: st.player.drift,
        final: round(stab * order * integrity - costs) };
    }
    function ending() {
      // §11 matrix on two axes: ABROAD (Stabilization × Order) and HOME (Integrity).
      const s = score();
      const abroadOK = s.stabilization * s.order_mult >= C.pax_abroad_min;
      const homeOK = s.integrity_mult >= C.integrity_clean_min;
      if (abroadOK && homeOK) return { name: "Pax",
        text: "Stabilized abroad, intact at home, allies still answer the phone. The hard ending — and you found it." };
      if (abroadOK && !homeOK) return { name: "Fortress",
        text: "You kept the peace and lost the thing it was for. The republic still stands; ask it what it has become." };
      if (!abroadOK && homeOK) return { name: "Retreat",
        text: "Clean hands, burning world. The blocs write the next chapter; your conscience writes the footnotes." };
      return { name: "Collapse",
        text: "Quagmire abroad, exhaustion at home. The terms are set elsewhere now." };
    }
    function serialize() {
      return JSON.stringify({ v: 1, rngState: rng.state(), st });
    }
    function restore(json) {
      const data = JSON.parse(json);
      rng.setState(data.rngState);
      Object.assign(st, data.st);
      return api;
    }
    const api = {
      state: st, consts: C, initiatives: inits, rules,
      endTurn, resolveEvent, score, ending, serialize, restore,
      startTurn, mandateIncome, nodesSorted, juntaCount, totalStrength, localAvg,
      capitalOf,
    };
    startTurn();
    return api;
  }
  return { Game, clamp };
})();
if (typeof module !== "undefined") module.exports = PaxEngine;
</script>

  // ---------- map ----------
  function convexHull(pts) {
    if (pts.length < 3) return pts.slice();
    const p = pts.slice().sort((a, b) => a[0] - b[0] || a[1] - b[1]);
    const cr = (o, a, b) => (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0]);
    const lo = [], up = [];
    for (const q of p) { while (lo.length >= 2 && cr(lo[lo.length - 2], lo[lo.length - 1], q) <= 0) lo.pop(); lo.push(q); }
    for (let i = p.length - 1; i >= 0; i--) { const q = p[i]; while (up.length >= 2 && cr(up[up.length - 2], up[up.length - 1], q) <= 0) up.pop(); up.push(q); }
    lo.pop(); up.pop(); return lo.concat(up);

      '<stop offset="0%" stop-color="#16323f"/><stop offset="100%" stop-color="#0b1014"/>' +

    const dense = game.nodesSorted().length > 20;
    for (const key of Object.keys(groups).sort()) {

      const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;

          `v3.4 M${(x + r * 0.7).toFixed(1)} ${(y - r - 2.6).toFixed(1)} ` +

        // a petro-state: an oil drop (what the world's markets are priced on)

  // ---------- map pan / zoom (v0.19) ----------
  function clampView() {

    const s = $("map").querySelector("svg");
    if (s) s.setAttribute("viewBox",
      `${view.x.toFixed(2)} ${view.y.toFixed(2)} ${view.w.toFixed(2)} ${view.h.toFixed(2)}`);
  }

    const s = $("map").querySelector("svg"); const ctm = s && s.getScreenCTM();

    view.w = nw; view.h = nw; clampView(); applyView();

          `</span><span class="val">${list}</span></div>${coRow}</div>`;
      }
      html += '<div class="head">' + (selNode ? "Region detail" : "Tap a region on the map") + "</div>";
      if (selNode) html += nodeCard(selNode);
      else html += '<div class="sub">Circle colour = who runs it (green elected, red junta). ' +
        'Red <b>!</b> marks = visible violence. Number by a region = estimated insurgent forces.</div>';
      P.innerHTML = html;
    } else if (tab === "act") {
      const p = game.state.player;
      const mLeft = p.mandate - queue.reduce((s, q) =>
        s + game.initiatives[q.initiative].mandate_cost, 0);
      const tLeft = p.treasury - queue.reduce((s, q) =>
        s + game.initiatives[q.initiative].treasury_cost, 0);
      const FAM = { military: "⚔️ force", governance: "🏗️ build",
        intelligence: "🕵️ spy", diplomatic: "🤝 talk", domestic: "🏛️ home" };
      // Plain-language action names — the rules keep the doctrinal names; the UI speaks plainly.
      const ANAME = {
        presence_patrols: "Patrols", partnered_raids: "Local-force raids",
        drone_strike: "Air strike", train_equip: "Train local forces",
        development_program: "Aid & services", amnesty_reintegration: "Amnesty deal",
        humint_network: "Informant network", un_mandate: "Seek UN approval",
        fund_research: "Fund researchers", support_exile_media: "Back exile media",
        targeted_sanctions: "Sanctions", negotiate_settlement: "Negotiate a deal",
        surveillance_expansion: "Mass surveillance", establish_command: "Set up a regional base",
        rally_coalition: "Rally allies", administrative_detention: "Detain without trial",
        martial_law: "Censorship & martial law",
      };
      const aName = (id) => ANAME[id] || game.initiatives[id].name;
      let html = `<div class="sub">Pick an action, then (if it needs a region) tap one. ` +
        `Left to spend: <b>🏛️ ${mLeft}</b> · <b>💰 ${Math.round(tLeft)}</b></div>`;
      for (const id of Object.keys(game.initiatives).sort()) {
        const i = game.initiatives[id];
        // gate world-scale-only initiatives (Regional Commands §21.7, Coalition
        // §21.8) out of single-theatre play, where they are inert.
        if (!(game.consts.commands_enabled > 0) && i.effects.some((e) => e.op === "command"))
          continue;
        if (!(game.consts.coalition_enabled > 0) && i.effects.some((e) => e.op === "coalition"))
          continue;
        const cls = armed === id ? "card init armed" : "card init";
        const affordable = i.mandate_cost <= mLeft && i.treasury_cost <= tLeft;
        html += `<div class="${cls}" data-init="${id}" style="${affordable ? "" : "opacity:.5"}">` +
          `<div><b>${aName(id)}</b>` +
          `<small>${FAM[i.family] || i.family}` +
          (i.target === "node" ? " · 📍 tap a region" : "") +
          ` · ⚠️ ${Math.round(i.backfire.probability * 100)}% risk</small></div>` +
          `<span class="cost" title="costs ${i.mandate_cost} Backing and ${i.treasury_cost} Money">` +
          `🏛️ ${i.mandate_cost}<br>💰 ${i.treasury_cost}</span></div>`;
      }
      if (queue.length) {
        html += '<div class="head">Queued</div>';
        queue.forEach((q, k) => {
          html += `<div class="queue" data-dq="${k}">✕ ${aName(q.initiative)}` +
            (q.node ? " → " + q.node : "") + "</div>";
        });
      }
      html += '<div style="height:8px"></div><button class="primary" id="btnEnd">End month</button>';
      P.innerHTML = html;
      P.querySelectorAll("[data-init]").forEach((el) => el.addEventListener("click", () => {
        const i = game.initiatives[el.dataset.init];
        const mLeft2 = game.state.player.mandate - queue.reduce((s, q) =>
          s + game.initiatives[q.initiative].mandate_cost, 0);
        const tLeft2 = game.state.player.treasury - queue.reduce((s, q) =>
          s + game.initiatives[q.initiative].treasury_cost, 0);
        if (i.mandate_cost > mLeft2 || i.treasury_cost > tLeft2) return;
        if (i.target === "global") { queue.push({ initiative: i.id, node: null }); armed = null; }
        else armed = armed === i.id ? null : i.id;
        renderPanel(); renderHeader();
      }));
      P.querySelectorAll("[data-dq]").forEach((el) => el.addEventListener("click", () => {
        queue.splice(Number(el.dataset.dq), 1); renderPanel(); renderHeader();
      }));
      $("btnEnd").addEventListener("click", doEndTurn);
    } else {
      const rep = game.state.reports[game.state.reports.length - 1];
      if (!rep) { P.innerHTML = '<div class="sub">No resolved turns yet.</div>'; return; }
      let html = `<div class="head">Turn ${rep.turn} — itemized consequences</div>`;
      const groups = {};
      for (const e of rep.ledger) (groups[e.gauge] = groups[e.gauge] || []).push(e);
      for (const g of Object.keys(groups).sort()) {
        html += `<div class="card"><b>${g}</b>`;
        for (const e of groups[g]) {
          const cls = e.delta >= 0 ? "pos" : "neg";
          html += `<div class="led"><span class="${cls}">${e.delta >= 0 ? "+" : ""}` +
            `${e.delta.toFixed(1)}</span> ${e.source}</div>`;
        }
        html += "</div>";
      }
      if (!rep.ledger.length) html += '<div class="sub">No change in your standings.</div>';
      if (rep.events.length) {
        html += '<div class="head">Events</div>';
        for (const ev of rep.events)
          html += `<div class="card">${ev.title}<br><span class="sub">→ ${ev.choice}</span></div>`;
      }
      html += '<div class="head">World log</div>';
      for (const l of rep.log.slice(0, 12))
        html += `<div class="sub">· ${l.event}${l.country ? " " + l.country : ""}` +
          `${l.node ? " @" + l.node : ""}${l.outcome ? " → " + l.outcome : ""}</div>`;
      html += `<div class="head">Settings</div><div class="row">` +
        `<span class="sub">seed</span><input id="inSeed" value="${game.state.seed}">` +
        `<span class="sub">months</span><select id="inLen">` +
        [36, 60, game.consts.horizon_turns].map((v) =>
          `<option ${v === horizon ? "selected" : ""}>${v}</option>`).join("") +
        `</select></div><div class="row" style="margin-top:6px">` +
        `<span class="sub">scenario</span><select id="inScen" style="width:auto">` +
        Object.keys(SCENARIOS).map((sid) =>
          `<option value="${sid}" ${sid === scenario ? "selected" : ""}>` +
          `${SCENARIOS[sid]}</option>`).join("") +
        `</select> <button class="act" id="btnNew">New run</button></div>` +
        (rules.scenario ? `<div class="sub" style="margin-top:5px">${rules.scenario.name}` +
          ` — seat: ${rules.scenario.seat}</div>` : "");
      P.innerHTML = html;
      $("btnNew").addEventListener("click", () => {
        horizon = Number($("inLen").value);
        scenario = $("inScen").value;
        newGame(Number($("inSeed").value) || 0);
      });
    }
  }

  // ---------- turn flow ----------
  function doEndTurn() {
    preTurn = snapshotBoard();  // remember the board so we can animate what changed
    const res = game.endTurn(queue);
    queue = []; armed = null;
    if (res.phase === "event") showEvent(res.card, res.ctx);
    else afterTurn();
  }
  // Plain, colour-coded preview of what a choice/effect does — so a player can
  // read the trade-off without parsing prose. Maps ops to everyday words and
  // signs them by whether they're good (green) or bad (red) for the player.
  function effectTags(effects) {
    // [label, value, goodWhenPositive]
    const MAP = {
      domestic_legitimacy: ["🏠 Home", "delta", true],
      international_legitimacy: ["🤝 Allies", "delta", true],
      local_legitimacy: ["🛡️ Trust", "delta", true],
      governance: ["🏛️ Control", "delta", true],
      grievance: ["🔥 Anger", "delta", false],
      coup_seed: ["⚠️ Coup risk", "delta", false],
      partner_capacity: ["🪖 Local forces", "delta", true],
      exposure: ["🔦 Spotlight", "delta", true],
      intl_umbrella: ["☂️ UN cover", "delta", true],
      intel: ["🕵️ Your view", "delta", true],
      drift: ["⛓️ Overreach", "tiers", false],
    };
    const tags = [];
    for (const e of effects || []) {
      if (e.op === "suppress_clock") { tags.push(['<span class="bd">buries it (may leak later)</span>']); continue; }
      if (e.op === "attrit") {
        const good = (e.amount || 0) > 0;
        tags.push([`<span class="${good ? "gd" : "bd"}">${good ? "hits" : "aids"} insurgents</span>`]);
        continue;
      }
      if (e.op === "ops_pressure") { tags.push(['<span class="gd">military pressure</span>']); continue; }
      if (e.op === "negotiate") { tags.push(['<span class="gd">settle a faction</span>']); continue; }
      if (e.op === "designate") { tags.push(['<span class="gd">sanction the regime</span>']); continue; }
      if (e.op === "amnesty") { tags.push(['<span class="gd">defections</span>']); continue; }
      const m = MAP[e.op];
      if (!m) continue;
      const v = e[m[1]] || 0;
      if (!v) continue;
      const good = m[2] ? v > 0 : v < 0;
      const sign = v > 0 ? "+" : "";
      tags.push([`<span class="${good ? "gd" : "bd"}">${m[0]} ${sign}${v}</span>`]);
    }
    return tags.length ? `<div class="sub" style="margin-top:3px">${tags.map((t) => t[0]).join(" · ")}</div>` : "";
  }
  function showEvent(card, ctx) {
    const M = $("modalPaper");
    const where = (game.state.nodes[ctx] && game.state.nodes[ctx].name) || ctx;
    let html = `<h2>${card.title}</h2><p>${card.text}</p>` +
      `<p class="sub">Where: ${where}</p>`;
    card.choices.forEach((c, i) => {
      html += `<button class="choice" data-c="${i}">${c.label}${effectTags(c.effects)}</button>`;
    });
    if (card.sources) html += `<div class="src">${card.sources.join(" · ")}</div>`;
    M.innerHTML = html;
    $("modal").classList.add("show");
    M.querySelectorAll(".choice").forEach((b) => b.addEventListener("click", () => {
      $("modal").classList.remove("show");
      game.resolveEvent(Number(b.dataset.c));
      afterTurn();
    }));
  }
  function afterTurn() {
    save();
    if (game.state.turn >= horizon ||
        Object.values(game.state.collapsed).every(Boolean)) return showEnd();
    setTab("brief"); renderAll();
    animateChanges(preTurn); preTurn = null;  // flash what the turn did to the map
  }
  function showEnd() {
    const s = game.score(), e = game.ending();
    const E = $("endPaper");
    E.innerHTML = `<h2>${e.name}</h2><p>${e.text}</p>` +
      `<table><tr><td>Peace held</td><td>${s.stabilization}</td></tr>` +
      `<tr><td>× Order (juntas ${s.juntas}, blocs ${s.blocs})</td><td>${s.order_mult}</td></tr>` +
      `<tr><td>× Staying clean (overreach ${s.drift})</td><td>${s.integrity_mult}</td></tr>` +
      `<tr><td>− Costs (lives ${s.casualties}, money)</td><td>${s.costs}</td></tr>` +
      `<tr><td><b>Final score</b></td><td><b>${s.final}</b></td></tr></table>` +
      `<div class="head">Post-mortem: what you believed vs what was true</div>` +
      `<canvas id="pm" width="380" height="170"></canvas>` +
      `<div class="sub">amber = believed insurgent strength (briefing estimates) · ` +
      `red = the truth · the gap is the fog you did or didn't buy down</div>` +
      fogReveal() +
      peopleReveal() +
      `<div style="height:8px"></div>` +
      `<button class="primary" id="btnAgain">New run (seed ${game.state.seed + 1})</button>`;
    $("endgame").classList.add("show");
    drawPostMortem();
    $("btnAgain").addEventListener("click", () => {
      $("endgame").classList.remove("show");
      newGame(game.state.seed + 1);
    });
  }
  function peopleReveal() {
    // §20.2 capstone: what became of the named people you met — the quiet you
    // left them to, or didn't. Red if their region fell (their kept beat fired),
    // green if it held (only the met beat fired).
    const PEOPLE = {
      aminata: ["Aminata, the teacher", "teaches the new curriculum, in a town that fell", "still teaching, in a town that held"],
      ousmane: ["Ousmane, the reporter", "mobilised to the front — he files nothing now", "still filing"],
      fatou: ["Dr. Fatou, the clinic", "her clinic requisitioned; she went north", "her clinic still open"],
      ibrahim: ["Judge Ibrahim", "his court suspended; he is not at his bench", "still on the bench"],
    };
    const f = game.state.fired, rows = [];
    for (const k of Object.keys(PEOPLE)) {
      const [name, lost, held] = PEOPLE[k];
      if (f.includes("kept_" + k)) rows.push(`<tr><td>${name}</td><td class="bd">${lost}</td></tr>`);
      else if (f.includes("met_" + k)) rows.push(`<tr><td>${name}</td><td class="gd">${held}</td></tr>`);
    }
    if (!rows.length) return "";
    return `<div class="head">And the people you met</div><table>${rows.join("")}</table>` +
      `<div class="sub">the quiet you left them to — or didn't</div>`;
  }
  function fogReveal() {
    // The deceptive-calm reveal: regions whose true strength most exceeded belief.
    const est = game.state.estimates, gaps = [];
    for (const n of game.nodesSorted()) {
      const tru = sorted(n.presence).reduce((s, f) => s + n.presence[f].s, 0);
      const bel = Object.values(est[n.id].factions).reduce((s, f) => s + f.s, 0);
      if (tru > 0) gaps.push({ name: n.name, tru, bel, gap: tru - bel });
    }
    gaps.sort((a, b) => b.gap - a.gap);
    const worst = gaps.filter((g) => g.gap > 3).slice(0, 3);
    if (!worst.length) return '<div class="sub" style="margin-top:6px">Your map was honest: ' +
      'little hidden strength at the end. Money on a clearer view, well spent.</div>';
    let html = '<div class="head" style="font-size:12px">Where the quiet lied</div>';
    for (const g of worst)
      html += `<div class="sub">${g.name}: you believed ~${Math.round(g.bel)} fighters; ` +
        `there were ~${Math.round(g.tru)}. The calm was shadow control, not peace.</div>`;
    return html;
  }
  function drawPostMortem() {
    const cv = $("pm"), ctx = cv.getContext("2d");
    const { believed, truth } = game.state.hist;
    const W = cv.width, H = cv.height, n = truth.length;
    const max = Math.max(10, ...believed, ...truth) * 1.1;
    ctx.fillStyle = "#0d1117"; ctx.fillRect(0, 0, W, H);
    const line = (data, color) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
      data.forEach((v, i) => {
        const x = 8 + (W - 16) * (n > 1 ? i / (n - 1) : 0);
        const y = H - 8 - (H - 16) * (v / max);
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
    };
    line(believed, "#ffb300"); line(truth, "#ef5350");
  }

  function renderAll() {
    // Each panel is independent — a fault in one must never blank the others.
    for (const fn of [renderHeader, renderMap, renderPanel]) {
      try { fn(); } catch (e) { console.error("render error in " + fn.name, e); }
    }
  }

  // ---------- boot ----------
  (async function boot() {
    allRules = await loadAll();
    let restored = false;
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const blob = JSON.parse(raw);
        if (blob.v !== SAVE_VERSION) throw new Error("stale save");  // discard old-shape saves
        horizon = blob.horizon || 60;
        scenario = blob.scenario && (blob.scenario === "sahel_lite" ||
          allRules.scenarios[blob.scenario]) ? blob.scenario : "sahel_lite";
        rules = mergedRules(scenario);
        game = PaxEngine.Game(rules, 0).restore(blob.data);
        restored = true;
      }
    } catch (e) { restored = false; }
    if (!restored) { rules = mergedRules(scenario); game = PaxEngine.Game(rules, 42); save(); }
    $("tabBrief").addEventListener("click", () => setTab("brief"));
    $("tabAct").addEventListener("click", () => setTab("act"));
    $("tabReport").addEventListener("click", () => setTab("report"));
    $("tabKey").addEventListener("click", () => setTab("key"));
    $("helpBtn").addEventListener("click", showIntro);
    if (game.state.turn >= horizon) { showEnd(); } else renderAll();
    // First-ever load: coach the player through the loop, one step at a time
    // (tracked separately from the game save). The "?" button reopens the short intro.
    try {
      if (!localStorage.getItem("paxstressia_coached") && game.state.turn < horizon) {
        startCoach();
      }
    } catch (e) { /* private mode: just skip the one-time coach */ }
  })();
})();
</script>
</body>
</html>
