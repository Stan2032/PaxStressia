<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PaxStressia — greybox prototype (v0.3)</title>
<style>
  :root{
    --bg:#14181d; --panel:#1c2229; --panel2:#222a33; --ink:#cfd8dc; --dim:#78909c;
    --amber:#ffb300; --teal:#26a69a; --red:#ef5350; --blue:#42a5f5; --green:#9ccc65;
    --junta:#b71c1c; --emirate:#4a148c; --failed:#37474f; --civ:#33691e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.45 ui-monospace,Menlo,Consolas,monospace}
  #app{display:flex; flex-direction:column; height:100%; max-width:760px; margin:0 auto}
  header{padding:6px 10px; background:var(--panel); border-bottom:1px solid #000}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .date{color:var(--amber); font-weight:bold}
  .chip{background:var(--panel2); border-radius:4px; padding:1px 7px; white-space:nowrap}
  .chip b{color:var(--amber)}
  .gauges{display:flex; gap:6px; margin-top:4px}
  .gauge{flex:1}
  .gauge label{font-size:10px; color:var(--dim); display:flex; justify-content:space-between}
  .bar{height:7px; background:#000; border-radius:3px; overflow:hidden}
  .bar i{display:block; height:100%; transition:width .4s}
  #mapwrap{flex:1; position:relative; display:flex; min-height:240px}
  #map{flex:1; touch-action:none; background:
    radial-gradient(ellipse at 70% 20%, #1a2129 0%, var(--bg) 70%)}
  #map svg{width:100%; height:100%; display:block}
  #zoomctl{position:absolute; right:8px; bottom:8px; display:flex; flex-direction:column; gap:5px}
  #zoomctl button{width:32px; height:32px; font-size:18px; line-height:1; border:1px solid #000;
    border-radius:6px; background:var(--panel2); color:var(--ink); cursor:pointer; opacity:0.85}
  #zoomctl button:active{background:var(--amber); color:#000}
  .edge{stroke:#3a4750; stroke-width:1.5}
  .edge.smuggling{stroke-dasharray:5 4; stroke:#5d4037}
  .node circle.body{stroke:#000; stroke-width:1.2; cursor:pointer}
  .node.sel circle.body{stroke:var(--amber); stroke-width:2.5}
  .node text{fill:var(--ink); font-size:4px; pointer-events:none}
  .node .est{fill:var(--amber); font-size:3.6px}
  .node .pips{fill:var(--red); font-size:4px}
  .node .star{fill:var(--amber); font-size:4.5px}
  .node .patron{fill:#ff7043}
  .node .heat{fill:none; stroke:var(--red); opacity:0.7; pointer-events:none}
  .node .flag{stroke:var(--teal); stroke-width:0.7; fill:none}
  .node .oil{fill:#111; stroke:#000; stroke-width:0.3}
  .grat{stroke:#33444e; stroke-width:0.25; opacity:0.5}
  .land{fill:#36493d; stroke:#3f5446; stroke-width:5; stroke-linejoin:round; opacity:0.95}
  .theaterlbl{fill:#5a6b72; font-size:2.6px; letter-spacing:0.2px; pointer-events:none}
  /* motion (v0.20): the map reacts to a turn — a fall flashes, a flare pulses, a flag unfurls */
  @keyframes fellFlash{0%{stroke:#fff; stroke-width:4} 70%{stroke:#fff; stroke-width:2.4} 100%{stroke:#000; stroke-width:1.2}}
  .node.fell circle.body{animation:fellFlash 1.1s ease-out}
  @keyframes flarePulse{0%,100%{opacity:0.7} 45%{opacity:1; stroke-width:4.5}}
  .node.flared .heat{animation:flarePulse 1.2s ease-in-out}
  @keyframes plantFlag{0%{opacity:0; transform:translateY(2px) scale(0.4)} 100%{opacity:1; transform:none}}
  .node.plant .flag{animation:plantFlag 0.6s ease-out; transform-box:fill-box; transform-origin:bottom center}
  @media (prefers-reduced-motion:reduce){.node.fell circle.body,.node.flared .heat,.node.plant .flag{animation:none}}
  #sheet{background:var(--panel); border-top:2px solid #000; height:46%; display:flex;
    flex-direction:column}
  nav{display:flex}
  nav button{flex:1; background:var(--panel2); border:0; color:var(--dim); padding:8px;
    font:inherit; border-right:1px solid #000}
  nav button.on{background:var(--panel); color:var(--amber); font-weight:bold}
  #panel{flex:1; overflow-y:auto; padding:8px 10px}
  .head{color:var(--amber); margin:6px 0 3px; font-weight:bold}
  .sub{color:var(--dim); font-size:12px}
  .card{background:var(--panel2); border-radius:6px; padding:7px 9px; margin:6px 0}
  .init{display:flex; justify-content:space-between; align-items:center; gap:6px;
    border-left:3px solid var(--dim)}
  .init.armed{border-left-color:var(--amber); background:#2c3540}
  .init small{color:var(--dim); display:block}
  .cost{color:var(--amber); white-space:nowrap}
  button.act{background:var(--panel2); color:var(--ink); border:1px solid #000;
    border-radius:6px; padding:8px 12px; font:inherit}
  button.primary{background:var(--amber); color:#000; font-weight:bold; width:100%;
    padding:11px; border:0; border-radius:6px; font-size:15px}
  .led{font-size:12px; margin-left:8px}
  .led .pos{color:var(--green)} .led .neg{color:var(--red)}
  .hl{border-left:3px solid var(--red); padding-left:8px; margin:5px 0; font-size:13px}
  .hl.warn{border-left-color:var(--amber)} .hl.info{border-left-color:var(--blue)}
  .frow{display:flex; justify-content:space-between; font-size:12px; padding:2px 0}
  .band{color:var(--dim)}
  #modal,#endgame{position:fixed; inset:0; background:rgba(0,0,0,.78); display:none;
    align-items:center; justify-content:center; padding:16px; z-index:10}
  #modal.show,#endgame.show{display:flex}
  .paper{background:var(--panel); border:1px solid var(--amber); border-radius:8px;
    max-width:420px; width:100%; max-height:90%; overflow-y:auto; padding:14px}
  .paper h2{color:var(--amber); margin:0 0 6px; font-size:16px}
  .choice{display:block; width:100%; text-align:left; margin:7px 0; padding:9px;
    background:var(--panel2); color:var(--ink); border:1px solid #000; border-radius:6px;
    font:inherit}
  .choice:active{background:#2c3540}
  canvas{width:100%; background:#0d1117; border-radius:6px}
  .src{font-size:10px; color:var(--dim); text-align:right}
  input,select{background:var(--panel2); color:var(--ink); border:1px solid #000;
    border-radius:4px; padding:5px; font:inherit; width:90px}
  .queue{color:var(--teal); font-size:12px}
  table{width:100%; border-collapse:collapse; font-size:12px}
  td{padding:2px 4px; border-bottom:1px solid #2a323b}
  td:last-child{text-align:right}
  /* v0.5.2 legibility */
  .hint{color:var(--dim); font-weight:normal}
  .gd{color:var(--green)} .bd{color:var(--red)}
  #helpBtn{margin-left:auto; background:var(--panel2); border:1px solid #000;
    color:var(--amber); border-radius:50%; width:24px; height:24px; font:inherit;
    font-weight:bold; cursor:pointer; flex:none}
  #coach{position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
    width:calc(100% - 24px); max-width:340px; background:var(--panel2);
    border:1px solid var(--amber); border-radius:10px; padding:12px 14px;
    box-shadow:0 6px 24px rgba(0,0,0,.5); z-index:60; font-size:13px; line-height:1.45}
  #coach .cn{display:flex; justify-content:space-between; align-items:center;
    margin-top:10px; gap:10px}
  #coach .cstep{color:var(--dim); font-size:11px}
  #coach .cnext{background:var(--amber); color:#000; border:none; border-radius:6px;
    padding:6px 12px; font-weight:bold; cursor:pointer}
  #coach .cskip{color:var(--dim); background:none; border:none; cursor:pointer;
    font-size:12px; text-decoration:underline; margin-right:4px}
  .kv{display:flex; justify-content:space-between; gap:8px; align-items:center;
    font-size:12px; padding:3px 0; border-bottom:1px solid #232b33}
  .kv .lbl{color:var(--dim)} .kv .val{font-variant-numeric:tabular-nums; white-space:nowrap}
  .meter{height:6px; background:#000; border-radius:3px; overflow:hidden; width:90px}
  .meter i{display:block; height:100%}
  .fcard{background:#191f26; border-radius:5px; padding:5px 7px; margin:5px 0}
  .fcard .nm{font-weight:bold}
  .legend{display:flex; flex-wrap:wrap; gap:5px 12px; font-size:11px; color:var(--dim);
    padding:5px 0}
  .swatch{display:inline-block; width:9px; height:9px; border-radius:50%;
    vertical-align:middle; margin-right:3px; border:1px solid #000}
  .help h3{color:var(--amber); margin:11px 0 2px; font-size:13px}
  .help p{margin:3px 0; font-size:12.5px}
  .help .term{color:var(--ink); font-weight:bold}
  .help .arrow{color:var(--amber)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="row">
      <span class="date" id="hDate">—</span>
      <span class="chip" title="Backing — what you spend each month to act. It comes from the voters: the more they're with you, the more you get.">🏛️ <b id="hMandate">0</b></span>
      <span class="chip" title="Money — your budget for programmes this month.">💰 <b id="hTreasury">0</b></span>
      <span class="chip" id="hElection">—</span>
      <span class="chip" id="hDrift" style="display:none" title="Overreach — the emergency powers you've reached for. They never go away, and they drag down your final score: your own democracy is what you're spending.">⛓️ <b>0</b></span>
      <span class="chip" id="hSecrets" style="display:none; color:var(--red)" title="Cover-ups — things you buried. Each month one might leak, costing far more than owning up would have. A free press makes leaks likelier.">📂 <b>0</b></span>
      <button id="helpBtn" title="What am I looking at?">?</button>
    </div>
    <div class="gauges">
      <div class="gauge"><label><span title="Home — the voters back home. They can end your war at the ballot box.">🏠 <span class="hint">home</span></span> <span id="vDom"></span></label>
        <div class="bar"><i id="bDom" style="background:var(--blue)"></i></div></div>
      <div class="gauge"><label><span title="Allies — the other countries and bodies standing with you.">🤝 <span class="hint">allies</span></span> <span id="vIntl"></span></label>
        <div class="bar"><i id="bIntl" style="background:var(--teal)"></i></div></div>
      <div class="gauge"><label><span title="Trust — whether the people on the ground are with you, not the insurgents. The real win.">🛡️ <span class="hint">trust</span></span> <span id="vLoc"></span></label>
        <div class="bar"><i id="bLoc" style="background:var(--green)"></i></div></div>
    </div>
  </header>
  <div id="mapwrap"><div id="map"></div>
    <div id="zoomctl"><button data-z="in" title="Zoom in">+</button>
      <button data-z="out" title="Zoom out">−</button>
      <button data-z="reset" title="Whole map">⤢</button></div></div>
  <div id="sheet">
    <nav>
      <button id="tabBrief" class="on">Briefing</button>
      <button id="tabAct">Act</button>
      <button id="tabReport">Report</button>
      <button id="tabKey">Key</button>
    </nav>
    <div id="panel"></div>
  </div>
</div>
<div id="modal"><div class="paper" id="modalPaper"></div></div>
<div id="endgame"><div class="paper" id="endPaper"></div></div>

}],"id":"transitional_council","notes":"The train-and-equip blowback made visible. The collapse roll itself fires in resolution substep f (DESIGN \u00a718.3).","requires":{"min_coup_risk":0.4},"sources":["Sahel coup-leader training records"],"text":"Officers your trainers certified seize state TV at dawn, citing the failing war \u2014 and thank their foreign partners, vaguely.","title":"A 'Transitional Council' Announces Itself","weight":1.5},{"choices":[{"effects":[{"delta":3,"op":"domestic_legitimacy"},{"delta":-0.1,"op":"intel","turns":4}],"label":"Declare progress"},{"effects":[{"delta":0.15,"op":"intel","turns":4},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Commission an assessment"}],"id":"quiet_sector_report","notes":"Pillar 4 as an event: quiet is not peace. Declaring progress relaxes collection exactly where entrenchment is doing its work.","sources":["2026 Sahel entrenchment analyses \u2014 falling attacks \u2260 security"],"text":"A barely-covered sector's attack counts have fallen two quarters running. Your briefer calls it progress; a footnote notes new village 'dispute committees', author unknown.","title":"The Quiet Sector","weight":0.7},{"choices":[{"effects":[{"delta":8,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Fund the documentation \u2014 satellites, forensics, the survivors' testimony"},{"effects":[{"delta":-3,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"label":"Note it. The war will not wait for a tribunal"}],"id":"closed_moura","notes":"Closed-society layer (\u00a720.2): mass atrocity rendered as aftermath and number, not act. Document vs. look away.","once":true,"requires":{"any_junta":true},"sources":["UN OHCHR fact-finding mission: Moura, Mali, 27\u201331 March 2022 \u2014 at least 500 unlawfully killed by FAMa and foreign (Wagner) personnel","Human Rights Watch, on Moura and the 2023 Russian veto"],"text":"For five days nothing leaves the market town. When a fact-finding mission finally counts, the dead are in the hundreds \u2014 and they were executed, not killed in any battle. The junta's bulletin reads 'jihadists neutralised.' Its foreign partner does not give interviews.","title":"The Cordon","weight":1.3},{"choices":[{"effects":[{"delta":6,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Fund attribution research \u2014 trace the network, publish the forensics"},{"effects":[{"delta":-4,"op":"international_legitimacy"}],"label":"Refuse to dignify it"}],"id":"closed_fimi","notes":"\u00a720.3 the lying layer: the contested information space. Pairs with the atrocity card.","once":true,"requires":{"any_junta":true},"sources":["EEAS\u2013VIGINUM\u2013FCDO technical report on the 'African Initiative' Russian FIMI operation, June 2025","Staged-corpse disinformation at Gossi, Mali, April 2022, falsely blaming departing French forces"],"text":"Staged footage multiplies across a thousand day-old accounts: bodies at a base your forces just vacated, captioned in your name. A Moscow 'news agency' assembled from a mercenary group's old contacts runs it first. By morning the lie is 'what everyone knows.'","title":"What Everyone Knows","weight":1.3},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Back exile media and designate the officials who signed it"},{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Work with the new reality \u2014 you still need the basing rights"}],"id":"closed_decree","notes":"\u00a720.2 repression by decree: party dissolution, indefinite rule.","once":true,"requires":{"any_junta":true},"sources":["Mali suspends then dissolves political parties, April 2024; Burkina Faso dissolves all parties by decree, January 2026 (HRW; Al Jazeera)"],"text":"A single decree suspends every political party 'until further notice,' and the transition's calendar quietly loses its last date. The men who signed it will not be standing for election against anyone.","title":"Until Further Notice","weight":1.2},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Shelter the conscripted voices and carry their record out"},{"effects":[{"delta":-2,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"label":"Stay clear of their internal affairs"}],"id":"closed_conscription","notes":"\u00a720.2 punitive conscription of critics.","once":true,"requires":{"any_junta":true},"sources":["Burkina Faso's April 2023 'general mobilization' decree used to forcibly conscript journalists, judges and activists; courts ruled it illegal (HRW; Amnesty International \u2014 the Daouda Diallo case)"],"text":"A human-rights lawyer who had been cataloguing the army's abuses is filmed in fresh fatigues at the front \u2014 'mobilised' by emergency decree. Courts rule the orders manifestly illegal; the orders keep arriving. Every other critic reads the message.","title":"Mobilised","weight":1.2},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Fund exile and diaspora outlets to route around the blackout"},{"effects":[{"delta":2,"op":"grievance"},{"delta":-1,"op":"international_legitimacy"}],"label":"Let the silence settle"}],"id":"closed_blackout","notes":"\u00a720.2 the media-ban ladder \u2014 quiet is not calm (the \u00a79 deceptive-calm thesis, socialised).","once":true,"requires":{"any_junta":true},"sources":["Sahel media-ban ladder: France 24, RFI and the BBC suspended and banned across Mali, Burkina Faso and Niger, 2023\u20132024 (CPJ; RSF)"],"text":"Another rung down the ladder: the foreign broadcasters go off the air, then the wire services, then the apps. A new statute makes sharing 'data likely to disturb public order' a crime. The region goes quiet \u2014 which is not the same thing as calm.","title":"The Quiet","weight":1.2},{"choices":[{"effects":[{"delta":6,"op":"exposure"}],"label":"Build the evidence outside the UN \u2014 fund the independent record"},{"effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Accept the limits of the instrument"}],"id":"closed_panel","notes":"\u00a720.3/\u00a720.4: the rival's veto nullifies the UN instrument \u2014 a deliberately frustrating tool.","once":true,"requires":{"any_junta":true,"min_turn":40},"sources":["MINUSMA terminated at the junta's demand, UN Security Council Res. 2690, June 2023","Russia's lone veto ending the Mali sanctions Panel of Experts mandate, August 2023 (HRW)"],"text":"Your resolution to renew the independent panel \u2014 the last body still naming names \u2014 dies on a single veto. The peacekeepers are already gone. From here, what is recorded depends entirely on who is left to record it.","title":"Who Is Left to Count","weight":1.2},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Keep funding the record; documentation outlives the sanction"},{"effects":[{"delta":-1,"op":"international_legitimacy"},{"delta":1,"op":"domestic_legitimacy"}],"label":"Spend your outrage where it can still move something"}],"id":"closed_reversal","notes":"\u00a720.4 the sobering counterweight: documentation exposes; it rarely punishes. The durable win is the record.","once":true,"requires":{"any_junta":true,"min_turn":60},"sources":["US lifts sanctions on three Wagner-linked Malian officials to court security cooperation, March 2026 (HRW); Wagner rebranded as the state-run Africa Corps"],"text":"The designations you spent so much capital to win are quietly lifted \u2014 three names removed to 'court security cooperation' with the very officers they named. Impunity, it turns out, is also a policy. What endures is not the punishment you sought; it is the record you funded.","title":"Struck Off","weight":1.1}],"factions":[{"capability_tier":2,"composite_of":"Composite closely modeled on JNIM and its precursors (Ansar Dine, AQIM's Saharan katibas, MUJAO, Katiba Macina). Locally rooted, federated structure, shadow-governance playbook.","id":"ansar_al_sahel","ideology":["salafi-jihadist","local-grievance"],"name":"Ansar al-Sahel","notes":"The entrenchment-first antagonist: embeds in local disputes, taxes routes, runs shadow courts. Rivalry with wilayat_sahel is real but historically punctuated by truces of convenience \u2014 unlike-group linking must stay possible (DESIGN \u00a75.2).","relations":{"wilayat_sahel":-0.4},"sources":["CFR Global Conflict Tracker \u2014 Sahel","ICG reporting on JNIM"],"sponsor":"aq_network"},{"capability_tier":2,"composite_of":"Composite closely modeled on IS-Sahel (ex-ISGS) and ISWAP influence at the arc's edges. Transnational franchise logic, higher-tempo violence, weaker local rooting.","id":"wilayat_sahel","ideology":["salafi-jihadist","transnational"],"name":"Wilayat Sahel","notes":"The strength-first antagonist: louder, more visible, less survivable under pressure \u2014 the contrast faction that makes the Strength/Entrenchment/Visibility triad legible in play.","relations":{"ansar_al_sahel":-0.4},"sources":["ACLED tri-border data","CFR Global Conflict Tracker \u2014 Sahel"],"sponsor":"is_core"}],"initiatives":[{"backfire":{"channel":"occupation_antibodies","effects":[{"delta":-2,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"note":"Foreign boots past the welcome threshold generate antibodies (Kilcullen). Casualty drip handled via casualty_risk \u2192 Domestic.","probability":0.15},"casualty_risk":0.3,"effects":[{"amount":25,"op":"ops_pressure","turns":3}],"family":"military","id":"presence_patrols","mandate_cost":2,"name":"Presence Patrols","notes":"Suppresses Strength and raises insurgent Visibility while active.","sources":["FM 3-24 paradoxes","Kilcullen, The Accidental Guerrilla"],"target":"node","treasury_cost":2},{"backfire":{"channel":"partner_conduct","effects":[{"delta":-4,"op":"local_legitimacy"},{"delta":-3,"op":"international_legitimacy"},{"delta":4,"op":"grievance"}],"note":"Cheap attrition, but partner-force abuses carry your flag \u2014 Local and International pay for it.","probability":0.2},"casualty_risk":0.1,"effects":[{"amount":8,"op":"attrit"},{"delta":2,"op":"partner_capacity"}],"family":"military","id":"partnered_raids","mandate_cost":1,"name":"Partnered Raids","sources":["FM 3-24","Sahel partner-force abuse reporting"],"target":"node","treasury_cost":1},{"backfire":{"channel":"collateral","effects":[{"delta":-5,"op":"local_legitimacy"},{"delta":6,"op":"grievance"},{"delta":-2,"op":"international_legitimacy"}],"note":"Fast and no body bags \u2014 until the collateral roll: a crater, a martyrdom narrative, a recruitment spike via Grievance.","probability":0.25},"effects":[{"amount":12,"op":"attrit"}],"family":"military","id":"drone_strike","mandate_cost":1,"name":"Drone Strike","sources":["RAND on decapitation limits","FM 3-24 paradoxes"],"target":"node","treasury_cost":2},{"backfire":{"channel":"coup_seed","effects":[{"delta":0.2,"op":"coup_seed"}],"note":"Cheap force multiplier \u2014 and every cycle plants a coup seed: trained officers raise junta odds on the collapse roll (several Sahel coup leaders were Western-trained). Arms leakage to the graph lands v0.4.","probability":1.0},"effects":[{"delta":5,"op":"partner_capacity"}],"family":"military","id":"train_equip","mandate_cost":2,"name":"Train & Equip","sources":["Sahel coup-leader training records"],"target":"node","treasury_cost":3},{"backfire":{"channel":"insurgent_taxation","effects":[{"amount":-2,"op":"attrit"}],"note":"Wells, roads, schools \u2014 slow Local gains; in contested regions the shadow government taxes the project and the insurgency profits from your aid (negative attrit = strength gain).","probability":0.3},"effects":[{"delta":3,"op":"development"},{"delta":3,"op":"local_legitimacy"},{"delta":2,"op":"governance"},{"delta":-2,"op":"grievance"}],"family":"governance","id":"development_program","mandate_cost":2,"name":"Development Program","sources":["Galula \u2014 the 80% political rule"],"target":"node","treasury_cost":3},{"backfire":{"channel":"recidivism","effects":[{"amount":-3,"op":"attrit"}],"note":"Drains Strength via Defection and costs you 'soft on terror' at home up front; if security lapses, reintegrated fighters return to the fight.","probability":0.2},"effects":[{"op":"amnesty","rate":0.06,"turns":4},{"delta":-3,"op":"domestic_legitimacy"}],"family":"governance","id":"amnesty_reintegration","mandate_cost":2,"name":"Amnesty & Reintegration","sources":["RAND, How Insurgencies End \u2014 negotiated drawdowns"],"target":"node","treasury_cost":3},{"backfire":{"channel":"blown_agent","effects":[{"delta":-2,"op":"local_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"note":"The only counter to deceptive calm \u2014 it reveals Entrenchment truth. A blown network burns the people who trusted you.","probability":0.1},"effects":[{"delta":0.25,"op":"intel","turns":6}],"family":"intelligence","id":"humint_network","mandate_cost":1,"name":"HUMINT Network","sources":["DESIGN \u00a79 \u2014 fog and deceptive calm"],"target":"node","treasury_cost":2},{"backfire":{"channel":"veto_delay","effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"note":"A cheap legitimacy umbrella that is slow and vetoable \u2014 a stalled resolution reads as weakness at home and abroad.","probability":0.3},"effects":[{"delta":1,"op":"intl_umbrella","turns":8},{"delta":3,"op":"international_legitimacy"}],"family":"diplomatic","id":"un_mandate","mandate_cost":2,"name":"Seek UN Mandate","sources":["MINUSMA record"],"target":"global","treasury_cost":1},{"backfire":{"channel":"funders_paradox","effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"note":"Endow think tanks and academics to document a regime \u2014 slow, durable Exposure that raises the price of its no-strings patron. But state money is an attack surface: 'foreign puppet' discrediting can blunt the very credibility you bought (the OCCRP funding paradox).","probability":0.2},"effects":[{"delta":6,"op":"exposure"}],"family":"diplomatic","id":"fund_research","mandate_cost":1,"name":"Fund Independent Research","notes":"The empirical backbone of the \u00a720 Exposure system: research that survives denial.","sources":["Global Witness / The Sentry \u2192 Magnitsky designation pipeline","OCCRP funding-independence FAQ"],"target":"node","treasury_cost":3},{"backfire":{"channel":"transnational_repression","effects":[{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"note":"Exile journalists move faster than think tanks \u2014 but the regime reaches their families and local fixers (transnational repression, Pegasus). The human cost is real, and the game does not flinch from it.","probability":0.25},"effects":[{"delta":10,"op":"exposure"}],"family":"intelligence","id":"support_exile_media","mandate_cost":1,"name":"Support Exile Media","notes":"Faster Exposure, carried by people the regime can hurt (\u00a720.4).","sources":["Freedom House, Transnational Repression","Forbidden Stories / Amnesty \u2014 Pegasus Project"],"target":"node","treasury_cost":2},{"backfire":{"channel":"patron_retaliation","effects":[{"delta":-2,"op":"partner_capacity"}],"note":"Spend accumulated Exposure to sanction regime figures: strips patron influence and rolls back a bloc's consolidation. Needs the evidence first \u2014 a thin case (low Exposure) is dismissed and costs you credibility. The regime retaliates by expelling your people and NGOs.","probability":0.3},"effects":[{"op":"designate"}],"family":"diplomatic","id":"targeted_sanctions","mandate_cost":2,"name":"Targeted Designations","notes":"Converts Exposure into pressure \u2014 the documented research\u2192designation chain (\u00a720.4).","sources":["US Treasury OFAC \u2014 Wagner/Mali designations 2023","Human Rights First \u2014 Global Magnitsky dossiers"],"target":"node","treasury_cost":1},{"backfire":{"channel":"spoiler_attack","effects":[{"delta":3,"op":"grievance"}],"note":"The Rebel Inc endgame: where a faction is stalemated \u2014 too strong to crush, not strong enough to win \u2014 talks can settle it, draining its Forces and shadow control. Costs you 'soft on terror' at home, earns International respect, and is often the only clean exit. Spoilers may attack the table to break it.","probability":0.25},"effects":[{"op":"negotiate"}],"family":"diplomatic","id":"negotiate_settlement","mandate_cost":2,"name":"Negotiate a Settlement","notes":"The negotiation endgame (\u00a77 diplomatic). Only bites at genuine stalemate.","sources":["RAND, How Insurgencies End \u2014 negotiated settlements","Colombia/Havana accords model"],"target":"node","treasury_cost":1},{"backfire":{"channel":"civil_liberties_scandal","effects":[{"delta":-5,"op":"domestic_legitimacy"},{"delta":-2,"op":"international_legitimacy"}],"note":"Tier 1 of the Emergency Powers track: real, immediate intel power everywhere \u2014 and the Authoritarian Drift is permanent either way. The track must be tempting. That is the point.","probability":0.15},"effects":[{"op":"drift","tiers":1},{"delta":0.1,"op":"intel","turns":8}],"family":"domestic","id":"surveillance_expansion","mandate_cost":1,"name":"Surveillance Expansion (Emergency Powers I)","sources":["DESIGN \u00a77 Domestic / \u00a711 IntegrityMultiplier"],"target":"global","treasury_cost":1},{"backfire":{"channel":"occupation_resentment","effects":[{"delta":4,"op":"grievance"},{"delta":-1,"op":"domestic_legitimacy"}],"note":"A standing foreign command can read as occupation: heavy-handed presence breeds local resentment, and at home the first whiff of an open-ended commitment.","probability":0.15},"effects":[{"op":"command"}],"family":"diplomatic","id":"establish_command","mandate_cost":3,"name":"Establish Regional Command","notes":"World-scale lever (\u00a721.7): a standing posture over the target's whole theatre that passively contains insurgency across all its nodes \u2014 breadth, not depth \u2014 at an accelerating home-front cost. Grand mode only.","sources":["US AFRICOM / CENTCOM theatre commands","Multinational Joint Task Force (Lake Chad); Operation Barkhane"],"target":"node","treasury_cost":8},{"backfire":{"channel":"burden_sharing_dispute","effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"note":"Pressing allies toward their fair share is a hard sell (NATO's 2% fight): a snubbed summit reads as discord abroad and free-riding resentment at home.","probability":0.2},"effects":[{"op":"coalition"}],"family":"diplomatic","id":"rally_coalition","mandate_cost":2,"name":"Rally the Coalition","notes":"World-scale lever (\u00a721.8): rallies partners to share the upkeep of your Regional Commands. Cohesion free-rides away each turn and frays under a rising rival bloc, so it must be re-rallied. Grand mode only.","sources":["Global Coalition to Defeat ISIS (87 members)","Olson & Zeckhauser (1966), the economics of alliances; NATO 2% burden-sharing"],"target":"global","treasury_cost":2},{"backfire":{"channel":"wrongful_detention","effects":[{"delta":4,"op":"grievance"},{"delta":-2,"op":"local_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"},{"delta":-2,"op":"international_legitimacy"}],"note":"Tier 2 of the Emergency Powers track (Belmarsh, India's MISA, the French Micas): detention without trial removes the threat *now* \u2014 cheap, immediate, strong. But it is the accidental guerrilla made mechanical (Kilcullen): every wrongful sweep manufactures the insurgents it claims to fight, and the Drift is permanent. It works. That is the trap.","probability":0.15},"effects":[{"amount":14,"op":"attrit"},{"delta":5,"op":"governance"},{"op":"drift","tiers":2}],"family":"domestic","id":"administrative_detention","mandate_cost":1,"name":"Administrative Detention (Emergency Powers II)","notes":"Emergency Powers II (\u00a77): front-loaded raw power \u2014 strong attrition + imposed control \u2014 at a back-loaded, one-way Authoritarian Drift cost the IntegrityMultiplier never forgets.","sources":["Belmarsh indefinite detention (UK 2001-04) \u2192 control orders \u2192 TPIMs","India MISA (1975 Emergency); French 'Micas' administrative measures (SILT 2017)"],"target":"node","treasury_cost":1},{"backfire":{"channel":"marketplace_of_ideas","effects":[{"delta":5,"op":"grievance"},{"delta":-5,"op":"domestic_legitimacy"},{"delta":-5,"op":"international_legitimacy"}],"note":"Tier 3 (India 1975, Turkey's post-coup decrees): impose control and black out the unrest \u2014 a large, immediate Order boost. But you are spending the prize to win the symptom (Merom's marketplace of ideas): the educated middle class defects, allies recoil, and the Drift is steep and permanent.","probability":0.15},"effects":[{"delta":17,"op":"governance"},{"delta":-2,"op":"local_legitimacy"},{"op":"drift","tiers":3}],"family":"domestic","id":"martial_law","mandate_cost":2,"name":"Censorship & Martial Law (Emergency Powers III)","notes":"Emergency Powers III (\u00a77): the most tempting and most corrosive tier \u2014 big raw control now, the heaviest one-way Drift later. Survive, and lose the democracy you were defending.","sources":["India's Emergency (1975-77): censorship + ~100,000 detained","Turkey post-2016 emergency decrees; the 'ratchet effect' (Yale J. on Regulation)"],"target":"node","treasury_cost":1}],"nodes":[{"access":0.9,"capital":true,"country":"ML","development":45,"governance":55,"government":"civilian","grievance":35,"id":"bamako","intel_coverage":0.5,"local_legitimacy":50,"name":"Bamako","notes":"Capital and core region of Mali. Collapse rolls for ML fire here (DESIGN \u00a75.3).","patron_influence":{"mercenary":5},"population_k":2200,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.6,"capital":false,"country":"ML","development":25,"governance":35,"government":"civilian","grievance":60,"id":"mopti","intel_coverage":0.3,"local_legitimacy":40,"name":"Mopti / Centre","notes":"Central Mali: intercommunal grievance plus weak state presence \u2014 the historical epicenter of post-2015 expansion.","patron_influence":{},"population_k":2100,"presence":{"ansar_al_sahel":{"entrenchment":15,"strength":25,"visibility":40}},"resources":["agriculture","livestock"],"sources":["ICG reporting on central Mali"]},{"access":0.5,"capital":false,"country":"ML","development":20,"governance":25,"government":"civilian","grievance":70,"id":"gao","intel_coverage":0.25,"local_legitimacy":35,"name":"Gao","notes":"Northern hub on the Niger bend; contested between both composites from the start.","patron_influence":{},"population_k":550,"presence":{"ansar_al_sahel":{"entrenchment":10,"strength":20,"visibility":45},"wilayat_sahel":{"entrenchment":5,"strength":15,"visibility":50}},"resources":["trade_routes"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.3,"capital":false,"country":"ML","development":15,"governance":15,"government":"civilian","grievance":80,"id":"kidal","intel_coverage":0.2,"local_legitimacy":25,"name":"Kidal","notes":"Far-north Tuareg heartland; state writ minimal at start date. Highest starting entrenchment on the map.","patron_influence":{},"population_k":85,"presence":{"ansar_al_sahel":{"entrenchment":25,"strength":30,"visibility":35}},"resources":["smuggling_economy"],"sources":["2012 northern Mali collapse record"]},{"access":0.85,"capital":true,"country":"BF","development":40,"governance":50,"government":"civilian","grievance":40,"id":"ouagadougou","intel_coverage":0.45,"local_legitimacy":45,"name":"Ouagadougou","notes":"Capital and core region of Burkina Faso. Collapse rolls for BF fire here.","patron_influence":{"mercenary":5},"population_k":1900,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.55,"capital":false,"country":"NE","development":20,"governance":30,"government":"civilian","grievance":65,"id":"tillaberi","intel_coverage":0.3,"local_legitimacy":35,"name":"Tillab\u00e9ri","notes":"Niger's tri-border region \u2014 the most attacked sector of the real arc. Niger's capital is off-map at Sahel-lite scale, so NE cannot collapse in this dataset; full arc map (v0.4) adds Niamey.","patron_influence":{},"population_k":2700,"presence":{"ansar_al_sahel":{"entrenchment":5,"strength":10,"visibility":40},"wilayat_sahel":{"entrenchment":10,"strength":20,"visibility":55}},"resources":["agriculture"],"sources":["ACLED tri-border incident data"]}],"patrons":[{"id":"mercenary","model":"Russia / Wagner\u2013Africa Corps model: coup-proofing services, no human-rights strings, payment in mining and oil concessions, arrives fast.","name":"Mercenary patron","notes":"The default regime-backer of the single-theater Sahel; fastest, no conditions.","oil_funded":true,"sources":["Wagner/Africa Corps Mali deployment record"],"speed":1.3},{"id":"investor","model":"China model: infrastructure-for-influence, non-interference doctrine, debt leverage, plays the long game.","name":"Investor patron","notes":"Slower but durable; competes hardest where governance is functional.","oil_funded":false,"sources":["Belt-and-Road / non-interference investment playbook"],"speed":0.8},{"id":"proxy","model":"Iran model: arms and ideology routed through the insurgent/faction graph itself.","name":"Proxy patron","notes":"Competes hardest where an aligned faction graph already exists.","oil_funded":true,"sources":["Proxy-network arms-and-ideology playbook"],"speed":1.0}],"sources":{"disclaimer":"PaxStressia is grounded in real counterinsurgency scholarship and the documented Sahel crisis of 2012\u20132023, then diverges into alt-history. Insurgent factions are composites modeled on real groups, not the groups themselves. Entries below are flagged: VERIFIED (checked against reporting), ESTABLISHED (canonical scholarship/record), or ALT-HISTORY (the game's projection beyond the reliable record \u2014 not presented as fact). The game has a point of view; it does not invent its evidence.","entries":[{"category":"doctrine","citation":"Gil Merom, How Democracies Lose Small Wars (Cambridge University Press, 2003).","confidence":"established","id":"merom","note":"The game's central thesis: democracies lose counterinsurgencies at home, when domestic tolerance for cost and brutality collapses before the insurgency does. This is the Domestic gauge and the Mandate coupling."},{"category":"doctrine","citation":"David Galula, Counterinsurgency Warfare: Theory and Practice (1964).","confidence":"established","id":"galula","note":"COIN is ~80% political, 20% military; the population is the prize. This is why Local legitimacy, not attrition, is the win condition."},{"category":"doctrine","citation":"U.S. Army / Marine Corps, FM 3-24 Counterinsurgency (2006).","confidence":"established","id":"fm324","note":"Legitimacy as the objective, and the paradoxes ('the more force you use, the less effective you may be') \u2014 the law behind every initiative having a backfire channel."},{"category":"doctrine","citation":"David Kilcullen, The Accidental Guerrilla (Oxford University Press, 2009).","confidence":"established","id":"kilcullen","note":"Heavy-handed presence creates insurgents; occupation past a welcome threshold generates antibodies. The occupation-duration decay on Local legitimacy."},{"category":"doctrine","citation":"Ben Connable & Martin Libicki, How Insurgencies End (RAND, 2010); Paul, Clarke, Grill, Paths to Victory (RAND, 2013).","confidence":"established","id":"rand_end","note":"Sanctuaries and external sponsors are the decisive survival variables; leadership decapitation rarely ends an insurgency; insurgencies average ~a decade. Why edges matter more than nodes, and decapitation is deliberately weak."},{"category":"case","citation":"Mali coups (Aug 2020, May 2021); Burkina Faso coups (Jan 2022, Sept 2022); Niger coup (July 2023).","confidence":"established","id":"sahel_coups","note":"The coup cascade the scenario reproduces \u2014 each junta claiming only it could defeat the insurgency. The collapse-roll's junta path."},{"category":"case","citation":"Alliance of Sahel States, founded 16 Sept 2023 (Liptako-Gourma Charter); Mali, Burkina Faso, Niger; announced ECOWAS withdrawal Jan 2024.","confidence":"established","id":"aes","note":"An authoritarian bloc manufactured by insurgency pressure, aligned with a rival patron \u2014 the bloc-consolidation clock."},{"category":"case","citation":"Wagner Group deployment to Mali (from ~Dec 2021), later rebranded 'Africa Corps' under Russian state control.","confidence":"established","id":"wagner","note":"The mercenary patron: coup-proofing with no human-rights strings, paid in mining concessions \u2014 the allegiance market's no-strings offer."},{"category":"case","citation":"Moura massacre, central Mali, 27\u201331 March 2022. UN/OHCHR fact-finding (report 12 May 2023): 500+ killed by Malian armed forces and 'foreign military personnel' (widely identified as Wagner); 58 women and girls subjected to sexual violence.","confidence":"verified","id":"moura","note":"The atrocity that quiet hides \u2014 the partner-force and errant-strike events, and the Transparency Dial.","url":"https://news.un.org/en/story/2023/05/1136607"},{"category":"case","citation":"International Crisis Group and ACLED analyses of the Sahel: falling attack counts can reflect insurgent entrenchment into local political and economic life (shadow taxation, courts), not improved security.","confidence":"established","id":"quiet_not_peace","note":"Pillar 4 (quiet \u2260 peace): the Visibility axis, deceptive-calm fog, and the insurgent-grip discount in scoring."},{"category":"case","citation":"Several Sahel coup leaders were Western-trained officers (widely reported across the 2020\u20132023 coups).", e spillover everyone said was coming, and then it came.","types":["border","road"]},{"a":"coastal_north","b":"niamey","capacity":0.45,"id":"coastal_niamey","notes":"Benin\u2013Niger border axis.","types":["border","road"]}],"events":[{"choices":[{"effects":[{"entrenchment":3,"faction":"azawad_front","node":"kidal","op":"presence","strength":5},{"faction":"ansar_al_sahel","node":"gao","op":"presence","strength":4}],"label":"Watch it unfold"},{"effects":[{"delta":3,"node":"bamako","op":"governance"},{"delta":1,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Emergency support to Bamako"}],"id":"northern_collapse_2012","notes":"The 2012 opening beat. The army-blames-politicians line is the coup cascade's first seed, planted in text.","once":true,"requires":{"max_turn":3},"sources":["2012 Azawad declaration record"],"text":"Three garrisons fold in a fortnight. The separatist front declares an independent Azawad from Kidal; the militants who rode in alongside them are already renaming the courts. The capital's army blames the politicians, loudly, on the radio.","title":"The North Declares Itself","weight":6},{"choices":[{"effects":[{"amount":40,"node":"gao","op":"ops_pressure","turns":4},{"amount":15,"node":"gao","op":"attrit"},{"amount":10,"node":"kidal","op":"attrit"},{"delta":5,"node":"gao","op":"local_legitimacy"},{"delta":3,"op":"domestic_legitimacy"},{"delta":2,"op":"international_legitimacy"}],"label":"Intervene in force"},{"effects":[{"amount":-8,"node":"gao","op":"attrit"},{"delta":5,"node":"mopti","op":"grievance"},{"delta":-2,"op":"international_legitimacy"}],"label":"Decline the lead role"}],"id":"intervention_window","notes":"The Serval moment. Intervention is genuinely good now \u2014 the welcome is real (Kilcullen); what you do with the welcome is the next decade.","once":true,"requires":{"max_turn":22,"min_turn":10},"sources":["2013 intervention record"],"text":"The columns are moving south; the airport at S\u00e9var\u00e9 is hours from falling. Bamako is formally asking. Every ally is watching to see whether you answer, and every future recruiter is watching how.","title":"The Window","weight":6},{"choices":[{"effects":[{"entrenchment":5,"faction":"wilayat_sahel","node":"menaka","op":"presence","strength":12},{"entrenchment":3,"faction":"wilayat_sahel","node":"tillaberi","op":"presence","strength":10}],"label":"Note the split \u2014 rivals fight each other"},{"effects":[{"entrenchment":3,"faction":"wilayat_sahel","node":"menaka","op":"presence","strength":8},{"entrenchment":2,"faction":"wilayat_sahel","node":"tillaberi","op":"presence","strength":8},{"amount":6,"node":"menaka","op":"attrit"},{"delta":3,"node":"menaka","op":"grievance"},{"delta":-2,"node":"menaka","op":"local_legitimacy"}],"label":"Preempt with strikes"}],"id":"franchise_declared","notes":"The 2015 ISGS split, composited. Both choices seed the franchise \u2014 history's gravity \u2014 but the shape differs.","once":true,"requires":{"max_turn":54,"min_turn":36},"sources":["ISGS emergence record"],"text":"A splinter katiba posts its pledge to the global brand. The men are the same men; the flag and the ambition are new. The corridor between M\u00e9naka and the tri-border begins to change hands at night.","title":"The Franchise Arrives","weight":5},{"choices":[{"effects":[{"delta":-5,"node":"ouagadougou","op":"governance"},{"delta":4,"node":"ouagadougou","op":"grievance"},{"delta":1,"op":"international_legitimacy"}],"label":"Back the civilian transition"},{"effects":[{"delta":-7,"node":"ouagadougou","op":"governance"},{"delta":4,"node":"ouagadougou","op":"grievance"},{"delta":1,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Keep working with whoever holds the file"}],"id":"burkina_insurrection","notes":"The October 2014 insurrection and Compaor\u00e9's fall \u2014 the missing beat that hollowed the Burkinab\u00e8 state before the spillover arrived. Political texture the system cannot generate (\u00a718.9); the spillover itself stays endogenous.","once":true,"requires":{"max_turn":40,"min_turn":32},"sources":["Burkina Faso 2014 insurrection record"],"text":"A quarter-century presidency tries to amend its own term limits, and the capital answers in the streets. The palace falls in two days; a transition of soldiers and ministers inherits an administration mid-crisis. None of this is about your war \u2014 and all of it will be.","title":"The Square Fills in Ouagadougou","weight":6},{"choices":[{"effects":[{"delta":0.2,"node":"bamako","op":"coup_seed"},{"delta":4,"node":"bamako","op":"grievance"},{"delta":1,"op":"international_legitimacy"}],"label":"Stand by the elected government"},{"effects":[{"delta":0.4,"node":"bamako","op":"coup_seed"},{"delta":4,"node":"bamako","op":"grievance"},{"delta":1,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Distance yourself quietly"}],"id":"political_crisis_bamako","notes":"The 2020 pre-coup texture. The coup itself stays endogenous (collapse roll) \u2014 this beat only loads the dice the way history loaded them.","once":true,"requires":{"country_not_collapsed":"ML","min_turn":76},"sources":["Mali 2020 crisis record"],"text":"A contested election, a disputed court, a summer of crowds. The army watches the crowds, and the officers you trained watch the army. Your ambassador's cables have stopped using the word 'stable'.","title":"The Street and the Barracks","weight":5},{"choices":[{"effects":[{"delta":3,"op":"international_legitimacy"},{"delta":5,"node":"bamako","op":"grievance"},{"delta":3,"node":"mopti","op":"grievance"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Back the sanctions line"},{"effects":[{"delta":-3,"op":"international_legitimacy"}],"label":"Work the back channels"}],"id":"ecowas_rupture","notes":"Sanctions pressure with the documented humanitarian-blowback channel: the grievance lands on the population before the junta (\u00a77 diplomatic).","once":true,"requires":{"country_collapsed":"ML","min_turn":100},"sources":["ECOWAS-Mali sanctions record 2022"],"text":"The regional community announces borders closed and accounts frozen until a transition timetable appears. The junta answers with flags and a rally. Prices rise in the markets first; speeches about sovereignty rise second.","title":"The Regional Bloc Draws a Line","weight":5},{"choices":[{"effects":[{"delta":25,"node":"bamako","op":"patron","patron":"mercenary"},{"delta":12,"node":"mopti","op":"patron","patron":"mercenary"},{"delta":12,"node":"gao","op":"patron","patron":"mercenary"},{"delta":2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Sanction the deployers"},{"effects":[{"delta":30,"node":"bamako","op":"patron","patron":"mercenary"},{"delta":15,"node":"mopti","op":"patron","patron":"mercenary"},{"delta":15,"node":"gao","op":"patron","patron":"mercenary"},{"delta":-3,"op":"international_legitimacy"}],"label":"Look away"}],"id":"mercenary_arrival","notes":"The mercenary patron lands either way \u2014 the market mechanic's truth (\u00a78): when a junta forms, the no-strings offer wins by default. You only choose what it costs you.","once":true,"requires":{"country_collapsed":"ML"},"sources":["Wagner/Africa Corps Mali deployment record"],"text":"Charter flights at night; weights manifested as 'mining equipment'. Within a month the junta's communiqu\u00e9s use new vocabulary, and a concession map you've never seen is circulating in the ministries. Their offer came with no conditions at all.","title":"Advisors Without Insignia","weight":5},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Isolate the bloc"},{"effects":[{"delta":-2,"op":"international_legitimacy"}],"label":"Keep channels open"}],"id":"aes_declaration","notes":"The AES beat. The consolidation clock itself lands v0.7 \u2014 at v0.4 the proto-bloc detection plus this card carry the weight in text and price.","once":true,"requires":{"min_collapsed":2},"sources":["Alliance of Sahel States formation record 2023"],"text":"Three flags on one stage. A mutual-defense pact, a promised joint force, talk of a common currency \u2014 and a communiqu\u00e9 naming you, specifically, as the region's problem. The pooled broadcast reach starts that evening.","title":"An Alliance of the Like-Minded","weight":5},{"choices":[{"effects":[{"amount":-12,"node":"gao","op":"attrit"},{"amount":-8,"node":"menaka","op":"attrit"},{"delta":4,"node":"gao","op":"grievance"},{"amount":35,"node":"gao","op":"ops_pressure","turns":3},{"delta":-2,"op":"domestic_legitimacy"}],"label":"Surge the response"},{"effects":[{"amount":-12,"node":"gao","op":"attrit"},{"amount":-8,"node":"menaka","op":"attrit"},{"delta":4,"node":"gao","op":"grievance"},{"delta":-3,"node":"gao","op":"local_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Hold and harden"}],"id":"insurgent_concord","notes":"The April 2026 model: ideologically unlike groups, joint offensive (\u00a75.2). Requires an actual link in the faction graph \u2014 if the player kept them apart, this card never exists. The strength surge lands either way; the response shapes whose ledger pays.","once":true,"requires":{"min_links":1,"min_turn":150},"sources":["en.wikipedia.org/wiki/2026_Mali_offensives"],"text":"Two factions that spent a decade killing each other hit five positions in one night, in sequence, on a shared clock. The communiqu\u00e9s are separate; the staff work plainly wasn't. Your analysts called this 'unlikely' in last quarter's assessment.","title":"The Concord of Enemies","weight":6},{"choices":[{"effects":[{"delta":-4,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"label":"Disclose and open a joint inquiry"},{"effects":[{"delta":-2,"op":"local_legitimacy"},{"op":"suppress_clock","severity":7}],"label":"Bury the report"}],"id":"partner_atrocity","notes":"The Transparency Dial (\u00a76). Disclose: pay now, less Local damage (honesty registers). Bury: nothing now, but a leak clock starts \u2014 and a free press tends to find out, at a multiple of the honest cost.","requires":{"min_partner_capacity":1},"sources":["Sahel partner-force abuse reporting","DESIGN \u00a76 Transparency Dial"],"text":"A unit you raid alongside is credibly accused of executing detainees in a village sweep. Your flag is on the operation. The report is on your desk; the press does not have it yet.","title":"Partner-Force Atrocity","weight":1.2},{"choices":[{"effects":[{"delta":-3,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"label":"Own it: release the assessment, pay compensation"},{"effects":[{"op":"suppress_clock","severity":9}],"label":"Classify it"}],"id":"errant_strike","notes":"The Transparency Dial again, harder: classifying costs nothing today and risks an election-shock leak later. The disclose branch is cheaper on average \u2014 if you can stomach paying every time.","requires":{"min_casualties":1},"sources":["Drone-strike collateral reporting; DESIGN \u00a76 Transparency Dial"],"text":"Your strike cell is certain the convoy was a target. The village is certain it was a wedding. Both cannot be right, and only one of them will hold a press conference. Your name is on the authorization.","title":"The Strike Hit a Wedding","weight":1.0},{"choices":[{"effects":[{"delta":3,"op":"international_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"}],"label":"Fund and host humanitarian corridors"},{"effects":[{"delta":-4,"op":"international_legitimacy"},{"delta":2,"op":"domestic_legitimacy"},{"delta":3,"op":"grievance"}],"label":"Press the host state to close the corridor"}],"id":"refugee_wave","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_avg_grievance":55},"sources":["UNHCR Sahel displacement record"],"text":"Displacement from the contested sectors crosses a threshold; columns are moving toward the capital and the borders. Cameras are already there.","title":"Refugee Wave","weight":1.0},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"},{"delta":-3,"op":"partner_capacity"}],"label":"Comply and withdraw in good order"},{"effects":[{"delta":-5,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Pay to stay \u2014 drop the conditionality"}],"id":"base_access_revoked","notes":"Generic deck, shared with Sahel-lite.","requires":{"any_junta":true},"sources":["2022 French withdrawal from Mali record"],"text":"The junta's spokesman, flanked by new advisors you recognize from elsewhere, announces that your forces have weeks to leave. The advisors' employer does not do press conferences.","title":"Base Access Revoked","weight":1.5},{"choices":[{"effects":[{"delta":-5,"op":"domestic_legitimacy"}],"label":"Defend the mission on its merits"},{"effects":[{"delta":-2,"op":"domestic_legitimacy"},{"delta":-2,"op":"international_legitimacy"}],"label":"Pivot to homeland-security framing"}],"id":"election_shock","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_casualties":5},"sources":["Merom, How Democracies Lose Small Wars"],"text":"A coffin-count graphic leads the evening news for the third night running. The opposition has found its single issue, and it is your war.","title":"Election Shock at Home","weight":0.8},{"choices":[{"effects":[{"delta":0.3,"op":"coup_seed"},{"delta":-4,"op":"international_legitimacy"}],"label":"Acquiesce \u2014 stability first"},{"effects":[{"delta":0.1,"op":"coup_seed"},{"delta":-2,"op":"partner_capacity"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Condemn and suspend assistance"}],"id":"transitional_council","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_coup_risk":0.4},"sources":["Sahel coup-leader training records"],"text":"Officers from a battalion your trainers certified appear on state television at dawn. They speak of corruption, of the failing war, and of the patriotic necessity of a transitional period. They thank their foreign partners \u2014 ambiguously.","title":"A 'Transitional Council' Announces Itself","weight":1.5},{"choices":[{"effects":[{"delta":3,"op":"domestic_legitimacy"},{"delta":-0.1,"op":"intel","turns":4}],"label":"Declare progress"},{"effects":[{"delta":0.15,"op":"intel","turns":4},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Commission an independent assessment"}],"id":"quiet_sector_report","notes":"Generic deck, shared with Sahel-lite.","sources":["2026 Sahel entrenchment analyses \u2014 falling attacks \u2260 security"],"text":"Incident counts in a sector you barely cover have fallen for two consecutive quarters. Your briefer calls it progress. A footnote mentions new 'dispute-resolution committees' operating in the villages \u2014 author unknown.","title":"The Quiet Sector","weight":0.7},{"choices":[{"effects":[{"delta":8,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Fund the documentation \u2014 satellites, forensics, the survivors' testimony"},{"effects":[{"delta":-3,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"label":"Note it. The war will not wait for a tribunal"}],"id":"closed_moura","notes":"Closed-society layer (\u00a720.2): mass atrocity rendered as aftermath and number, not act. Document vs. look away.","once":true,"requires":{"any_junta":true},"sources":["UN OHCHR fact-finding mission: Moura, Mali, 27\u201331 March 2022 \u2014 at least 500 unlawfully killed by FAMa and foreign (Wagner) personnel","Human Rights Watch, on Moura and the 2023 Russian veto"],"text":"For five days nothing leaves the market town. When a fact-finding mission finally counts, the dead are in the hundreds \u2014 and they were executed, not killed in any battle. The junta's bulletin reads 'jihadists neutralised.' Its foreign partner does not give interviews.","title":"The Cordon","weight":1.3},{"choices":[{"effects":[{"delta":6,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Fund attribution research \u2014 trace the network, publish the forensics"},{"effects":[{"delta":-4,"op":"international_legitimacy"}],"label":"Refuse to dignify it"}],"id":"closed_fimi","notes":"\u00a720.3 the lying layer: the contested information space. Pairs with the atrocity card.","once":true,"requires":{"any_junta":true},"sources":["EEAS\u2013VIGINUM\u2013FCDO technical report on the 'African Initiative' Russian FIMI operation, June 2025","Staged-corpse disinformation at Gossi, Mali, April 2022, falsely blaming departing French forces"],"text":"Staged footage multiplies across a thousand day-old accounts: bodies at a base your forces just vacated, captioned in your name. A Moscow 'news agency' assembled from a mercenary group's old contacts runs it first. By morning the lie is 'what everyone knows.'","title":"What Everyone Knows","weight":1.3},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Back exile media and designate the officials who signed it"},{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Work with the new reality \u2014 you still need the basing rights"}],"id":"closed_decree","notes":"\u00a720.2 repression by decree: party dissolution, indefinite rule.","once":true,"requires":{"any_junta":true},"sources":["Mali suspends then dissolves political parties, April 2024; Burkina Faso dissolves all parties by decree, January 2026 (HRW; Al Jazeera)"],"text":"A single decree suspends every political party 'until further notice,' and the transition's calendar quietly loses its last date. The men who signed it will not be standing for election against anyone.","title":"Until Further Notice","weight":1.2},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Shelter the conscripted voices and carry their record out"},{"effects":[{"delta":-2,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"label":"Stay clear of their internal affairs"}],"id":"closed_conscription","notes":"\u00a720.2 punitive conscription of critics.","once":true,"requires":{"any_junta":true},"sources":["Burkina Faso's April 2023 'general mobilization' decree used to forcibly conscript journalists, judges and activists; courts ruled it illegal (HRW; Amnesty International \u2014 the Daouda Diallo case)"],"text":"A human-rights lawyer who had been cataloguing the army's abuses is filmed in fresh fatigues at the front \u2014 'mobilised' by emergency decree. Courts rule the orders manifestly illegal; the orders keep arriving. Every other critic reads the message.","title":"Mobilised","weight":1.2},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Fund exile and diaspora outlets to route around the blackout"},{"effects":[{"delta":2,"op":"grievance"},{"delta":-1,"op":"international_legitimacy"}],"label":"Let the silence settle"}],"id":"closed_blackout","notes":"\u00a720.2 the media-ban ladder \u2014 quiet is not calm (the \u00a79 deceptive-calm thesis, socialised).","once":true,"requires":{"any_junta":true},"sources":["Sahel media-ban ladder: France 24, RFI and the BBC suspended and banned across Mali, Burkina Faso and Niger, 2023\u20132024 (CPJ; RSF)"],"text":"Another rung down the ladder: the foreign broadcasters go off the air, then the wire services, then the apps. A new statute makes sharing 'data likely to disturb public order' a crime. The region goes quiet \u2014 which is not the same thing as calm.","title":"The Quiet","weight":1.2},{"choices":[{"effects":[{"delta":6,"op":"exposure"}],"label":"Build the evidence outside the UN \u2014 fund the independent record"},{"effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Accept the limits of the instrument"}],"id":"closed_panel","notes":"\u00a720.3/\u00a720.4: the rival's veto nullifies the UN instrument \u2014 a deliberately frustrating tool.","once":true,"requires":{"any_junta":true,"min_turn":40},"sources":["MINUSMA terminated at the junta's demand, UN Security Council Res. 2690, June 2023","Russia's lone veto ending the Mali sanctions Panel of Experts mandate, August 2023 (HRW)"],"text":"Your resolution to renew the independent panel \u2014 the last body still naming names \u2014 dies on a single veto. The peacekeepers are already gone. From here, what is recorded depends entirely on who is left to record it.","title":"Who Is Left to Count","weight":1.2},{"choices":[{"effects":[{"delta":5,"op":"exposure"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Keep funding the record; documentation outlives the sanction"},{"effects":[{"delta":-1,"op":"international_legitimacy"},{"delta":1,"op":"domestic_legitimacy"}],"label":"Spend your outrage where it can still move something"}],"id":"closed_reversal","notes":"\u00a720.4 the sobering counterweight: documentation exposes; it rarely punishes. The durable win is the record.","once":true,"requires":{"any_junta":true,"min_turn":60},"sources":["US lifts sanctions on three Wagner-linked Malian officials to court security cooperation, March 2026 (HRW); Wagner rebranded as the state-run Africa Corps"],"text":"The designations you spent so much capital to win are quietly lifted \u2014 three names removed to 'court security cooperation' with the very officers they named. Impunity, it turns out, is also a policy. What endures is not the punishment you sought; it is the record you funded.","title":"Struck Off","weight":1.1},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":1,"op":"domestic_legitimacy"}],"label":"Fund the next intake"},{"effects":[{"delta":1,"op":"domestic_legitimacy"}],"label":"Note it; the budget is thin"}],"id":"met_aminata","notes":"Named-people arc (composite). Pairs with kept_aminata.","once":true,"requires":{"max_turn":50,"min_turn":4},"text":"In a town you helped keep on the map, a school you backed graduates its first class. Aminata, the teacher who stayed when others left, sends a photograph and three lines of thanks. You file it. Good days are also data.","title":"A First Graduating Class","weight":0.7},{"choices":[{"effects":[{"delta":4,"op":"exposure"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Fund the record of what the schools became"},{"effects":[{"delta":-3,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"label":"Let her keep her head down"}],"id":"kept_aminata","notes":"\u00a720.2 named-people-kept: the quiet you left her to.","once":true,"requires":{"any_junta":true,"requires_fired":"met_aminata"},"text":"The town has fallen. Aminata still teaches \u2014 there is no one else \u2014 but the curriculum arrived by decree, and the photograph she once sent you would now be evidence. She does not write anymore.","title":"The New Curriculum","weight":1.0},{"choices":[{"effects":[{"delta":2,"op":"international_legitimacy"}],"label":"Amplify it through allied channels"},{"effects":[{"delta":1,"op":"domestic_legitimacy"}],"label":"Quietly act on what he found"}],"id":"met_ousmane","notes":"Named-people arc (composite). Pairs with kept_ousmane.","once":true,"requires":{"max_turn":60,"min_turn":6},"text":"A wire story you almost missed: Ousmane, a local reporter, has documented a supply route no one wanted documented. His byline cost him friends. It will cost the people running that route, too.","title":"The Reporter","weight":0.7},{"choices":[{"effects":[{"delta":4,"op":"exposure"},{"delta":1,"op":"international_legitimacy"}],"label":"Make his case loudly \u2014 name the decree, name the names"},{"effects":[{"delta":-2,"op":"local_legitimacy"},{"delta":2,"op":"grievance"}],"label":"There is a war on; let it go"}],"id":"kept_ousmane","notes":"\u00a720.2 named-people-kept; ties to the conscription card.","once":true,"requires":{"any_junta":true,"requires_fired":"met_ousmane"},"text":"Ousmane is at the front now \u2014 'mobilised,' the decree says, the same week his next report would have run. He files nothing. The route he found runs again, unwatched.","title":"Mobilised","weight":1.0},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":1,"op":"domestic_legitimacy"}],"label":"Keep the supplies flowing"},{"effects":[{"delta":1,"op":"domestic_legitimacy"}],"label":"Note it; resources are stretched"}],"id":"met_fatou","notes":"Named-people arc (composite). Pairs with kept_fatou.","once":true,"requires":{"max_turn":55,"min_turn":5},"text":"Through three bad seasons one clinic never closed. Dr. Fatou runs it on diesel and stubbornness; you've quietly kept the fuel coming. A photograph of a full waiting room is its own kind of victory.","title":"The Clinic That Stayed Open","weight":0.7},{"choices":[{"effects":[{"delta":4,"op":"exposure"}],"label":"Fund the exile medics and document the takeover"},{"effects":[{"delta":-3,"op":"local_legitimacy"},{"delta":1,"op":"grievance"}],"label":"Mourn it and move on"}],"id":"kept_fatou","notes":"\u00a720.2 named-people-kept.","once":true,"requires":{"any_junta":true,"requires_fired":"met_fatou"},"text":"The clinic has been requisitioned \u2014 a garrison now, the waiting room a billet. Dr. Fatou went north with what she could carry. Where there was a clinic there is a checkpoint; the sick are someone else's problem.","title":"Requisitioned","weight":1.0},{"choices":[{"effects":[{"delta":2,"op":"international_legitimacy"}],"label":"Back the court's protection"},{"effects":[{"delta":1,"op":"domestic_legitimacy"}],"label":"Note the precedent"}],"id":"met_ibrahim","notes":"Named-people arc (composite). Pairs with kept_ibrahim.","once":true,"requires":{"max_turn":65,"min_turn":8},"text":"A court does something rare: it convicts an officer for an abuse your monitors helped document. Judge Ibrahim read the sentence with the cameras off and the threats already arriving. The law worked, once, here.","title":"A Conviction","weight":0.7},{"choices":[{"effects":[{"delta":5,"op":"exposure"}],"label":"Keep the record alive outside the country"},{"effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":1,"op":"grievance"}],"label":"Accept that the law has left"}],"id":"kept_ibrahim","notes":"\u00a720.2 named-people-kept.","once":true,"requires":{"any_junta":true,"requires_fired":"met_ibrahim"},"text":"The courts are 'suspended pending reform.' The officer Judge Ibrahim convicted is back in uniform; the judge is not at his bench, or his home. The file your monitors built is the only place the conviction still exists.","title":"Court Adjourned","weight":1.0}],"factions":[{"capability_tier":2,"composite_of":"Composite closely modeled on JNIM and its precursors (Ansar Dine, AQIM's Saharan katibas, MUJAO, Katiba Macina). Locally rooted, federated structure, shadow-governance playbook.","id":"ansar_al_sahel","ideology":["salafi-jihadist","local-grievance"],"name":"Ansar al-Sahel","notes":"The entrenchment-first antagonist. Relations with the Azawad front are deliberately ambivalent (-0.1): allied in 2012, at war by 2013, coordinating again by 2026 \u2014 the affinity floor (\u00a718.5) keeps the late alliance reachable.","relations":{"azawad_front":-0.1,"wilayat_sahel":-0.4},"sources":["CFR Global Conflict Tracker \u2014 Sahel","ICG reporting on JNIM"],"sponsor":"aq_network"},{"capability_tier":2,"composite_of":"Composite closely modeled on IS-Sahel (ex-ISGS) and ISWAP's Lake Chad presence. Transnational franchise logic, higher-tempo violence, weaker local rooting.","id":"wilayat_sahel","ideology":["salafi-jihadist","transnational"],"name":"Wilayat Sahel","notes":"The strength-first antagonist. Starts only at the Lake Chad rim (the ISWAP face of the composite); the Saharan franchise arrives mid-run via the 'franchise declared' beat \u2014 historically the 2015 ISGS split.","relations":{"ansar_al_sahel":-0.4,"azawad_front":-0.6},"sources":["ACLED tri-border data","CFR Global Conflict Tracker \u2014 Sahel"],"sponsor":"is_core"},{"capability_tier":2,"composite_of":"Composite closely modeled on the Tuareg national movement lineage: MNLA (2012) \u2192 CMA \u2192 FLA (2025\u201326). Separatist, ethno-territorial, fights and bargains by turns.","id":"azawad_front","ideology":["separatist","ethno-nationalist"],"name":"Azawad National Front","notes":"No external sponsor: its strength is demographic and territorial, not imported (ExternalSupport = 0, \u00a718.5). The April 2026 coordinated offensives with JNIM \u2014 ideologically unlike groups allying out of shared interest \u2014 are the networking surprise this faction exists to make possible (\u00a75.2).","relations":{"ansar_al_sahel":-0.1,"wilayat_sahel":-0.6},"sources":["2012 Azawad declaration record","en.wikipedia.org/wiki/2026_Mali_offensives"],"sponsor":null}],"nodes":[{"access":0.9,"capital":true,"country":"ML","development":45,"governance":50,"government":"civilian","grievance":35,"id":"bamako","intel_coverage":0.5,"local_legitimacy":50,"name":"Bamako","notes":"Capital and core region of Mali; ML collapse rolls fire here. 2012: the weakest and most-penetrated of the three states \u2014 Mali fell first (2020).","patron_influence":{"mercenary":5},"population_k":2200,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.6,"capital":false,"country":"ML","development":25,"governance":35,"government":"civilian","grievance":55,"id":"mopti","intel_coverage":0.3,"local_legitimacy":42,"name":"Mopti / Centre","notes":"Central Mali. Modest 2012 presence; the Katiba Macina expansion (2015+) should emerge from grievance and spread, not be scripted.","population_k":2100,"presence":{"ansar_al_sahel":{"entrenchment":8,"strength":12,"visibility":30}},"resources":["agriculture","livestock"],"sources":["ICG reporting on central Mali"]},{"access":0.5,"capital":false,"country":"ML","development":20,"governance":22,"government":"civilian","grievance":70,"id":"gao","intel_coverage":0.25,"local_legitimacy":35,"name":"Gao","notes":"Niger-bend hub. 2012: MUJAO-held (folded into the Ansar composite) after pushing out the separatists' early control.","population_k":550,"presence":{"ansar_al_sahel":{"entrenchment":15,"strength":32,"visibility":50},"azawad_front":{"entrenchment":12,"strength":18,"visibility":45}},"resources":["trade_routes"],"sources":["2012 northern Mali collapse record"]},{"access":0.3,"capital":false,"country":"ML","development":15,"governance":12,"government":"civilian","grievance":80,"id":"kidal","intel_coverage":0.2,"local_legitimacy":25,"name":"Kidal","notes":"Tuareg heartland; the state's writ never really returns here in the historical run. Highest starting entrenchment on the map.","population_k":85,"presence":{"ansar_al_sahel":{"entrenchment":22,"strength":28,"visibility":35},"azawad_front":{"entrenchment":30,"strength":35,"visibility":40}},"resources":["smuggling_economy"],"sources":["2012 Azawad declaration record"]},{"access":0.35,"capital":false,"country":"ML","development":15,"governance":18,"government":"civilian","grievance":72,"id":"menaka","intel_coverage":0.2,"local_legitimacy":30,"name":"M\u00e9naka","notes":"The corridor between the Tuareg north and the tri-border zone \u2014 later the Saharan franchise's killing fields; at start, separatist ground.","population_k":250,"presence":{"ansar_al_sahel":{"entrenchment":5,"strength":8,"visibility":30},"azawad_front":{"entrenchment":15,"strength":20,"visibility":35}},"resources":["livestock","smuggling_economy"],"sources":["ACLED M\u00e9naka region data"]},{"access":0.85,"capital":true,"country":"BF","development":40,"governance":54,"government":"civilian","grievance":38,"id":"ouagadougou","intel_coverage":0.45,"local_legitimacy":45,"name":"Ouagadougou","notes":"Capital and core region of Burkina Faso; BF collapse rolls fire here. 2012: the Compaor\u00e9 state, brittle beneath the surface.","patron_influence":{"mercenary":5},"population_k":1900,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.5,"capital":false,"country":"BF","development":18,"governance":30,"government":"civilian","grievance":50,"id":"sahel_bf","intel_coverage":0.3,"local_legitimacy":40,"name":"Northern Burkina (Sahel region)","notes":"Djibo and the BF Sahel. Empty at start \u2014 whether and when it ignites is the spread mechanic's first real test: historically ~2015\u20132016, via Soum-province grievances and the Mopti border.","population_k":1100,"presence":{},"resources":["livestock","gold"],"sources":["ICG Burkina Faso reporting"]},{"access":0.8,"capital":true,"country":"NE","development":35,"governance":60,"government":"civilian","grievance":45,"id":"niamey","intel_coverage":0.4,"local_legitimacy":45,"name":"Niamey","notes":"Capital and core region of Niger \u2014 on the map (unlike Sahel-lite) so the 2023 pattern can complete the cascade endogenously. Governance carried high: Niger was the West's 'model partner' and the region's sturdiest state until the palace coup.","patron_influence":{"mercenary":5},"population_k":1100,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.55,"capital":false,"country":"NE","development":20,"governance":30,"government":"civilian","grievance":55,"id":"tillaberi","intel_coverage":0.3,"local_legitimacy":46,"name":"Tillab\u00e9ri","notes":"The tri-border region. Thin 2012 presence; Niger's tri-border civic outreach (real, and modestly effective until 2023) is carried as higher starting Local legitimacy. The franchise beat and spread should still make it the most attacked sector by the late run \u2014 as in reality.","population_k":2700,"presence":{"ansar_al_sahel":{"entrenchment":3,"strength":5,"visibility":25}},"resources":["agriculture"],"sources":["ACLED tri-border incident data"]},{"access":0.6,"capital":false,"country":"NE","development":22,"governance":32,"government":"civilian","grievance":55,"id":"tahoua","intel_coverage":0.3,"local_legitimacy":38,"name":"Tahoua","notes":"Between the tri-border and the east; a depth region the insurgency reaches only in bad runs \u2014 a useful calibration marker.","population_k":3000,"presence":{},"resources":["agriculture","livestock"],"sources":["ACLED Niger data"]},{"access":0.45,"capital":false,"country":"NE","development":18,"governance":28,"government":"civilian","grievance":60,"id":"diffa","intel_coverage":0.25,"local_legitimacy":35,"name":"Lake Chad rim (Diffa)","notes":"The ISWAP face of the Wilayat composite starts here \u2014 the arc's second front, historically distinct from the Saharan franchise but the same franchising logic.","population_k":700,"presence":{"wilayat_sahel":{"entrenchment":12,"strength":18,"visibility":50}},"resources":["fisheries","trade_routes"],"sources":["ISWAP/Lake Chad reporting"]},{"access":0.6,"capital":false,"country":"GLF","development":30,"governance":45,"government":"civilian","grievance":35,"id":"coastal_north","intel_coverage":0.35,"local_legitimacy":50,"name":"Coastal spillover marker (Benin/Togo north)","notes":"Composite marker for the Gulf-of-Guinea littoral's northern districts (W-Arly-Pendjari complex). No capital on map \u2014 it cannot collapse; it exists to measure how far you let the arc bleed south. Historically: attacks from ~2021.","population_k":900,"presence":{},"resources":["agriculture","parks"],"sources":["Coastal West Africa spillover reporting (ICG)"]}],"scenario":{"description":"Scenario 1, the vertical slice (DESIGN.md \u00a712). Mali's northern collapse, the intervention window, the coup cascade, the AES, the mercenary patron, and the 2026 insurgent alliance \u2014 fourteen years of the premise running live. Reality is the balance baseline: a passive run should approximately reproduce history; your job is to beat it without breaking the thing you're defending.","id":"sahel_arc","name":"The Arc \u2014 Sahel, 2012\u20132026","notes":"Node and faction starting values are 2012 conditions, PROPOSED pending the v0.5 calibration pass. Niger's collapse is now modeled (Niamey on-map). Coups are endogenous (collapse rolls) \u2014 beat events supply the political texture the system cannot generate, never the coups themselves.","seat":"France-analog (one event deck; US seat arrives with the lead-nation roster, DESIGN.md \u00a716.3)","sources":["CFR Global Conflict Tracker \u2014 Violent Extremism in the Sahel","ICG Sahel reporting 2012\u20132026","ACLED tri-border and Burkina Faso data","en.wikipedia.org/wiki/2026_Mali_offensives"]}}}}
