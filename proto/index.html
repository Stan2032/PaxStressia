<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PaxStressia — greybox prototype (v0.3)</title>
<style>
  :root{
    --bg:#14181d; --panel:#1c2229; --panel2:#222a33; --ink:#cfd8dc; --dim:#78909c;
    --amber:#ffb300; --teal:#26a69a; --red:#ef5350; --blue:#42a5f5; --green:#9ccc65;
    --junta:#b71c1c; --emirate:#4a148c; --failed:#37474f; --civ:#33691e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.45 ui-monospace,Menlo,Consolas,monospace}
  #app{display:flex; flex-direction:column; height:100%; max-width:760px; margin:0 auto}
  header{padding:6px 10px; background:var(--panel); border-bottom:1px solid #000}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .date{color:var(--amber); font-weight:bold}
  .chip{background:var(--panel2); border-radius:4px; padding:1px 7px; white-space:nowrap}
  .chip b{color:var(--amber)}
  .gauges{display:flex; gap:6px; margin-top:4px}
  .gauge{flex:1}
  .gauge label{font-size:10px; color:var(--dim); display:flex; justify-content:space-between}
  .bar{height:7px; background:#000; border-radius:3px; overflow:hidden}
  .bar i{display:block; height:100%; transition:width .4s}
  #map{flex:1; min-height:240px; background:
    radial-gradient(ellipse at 70% 20%, #1a2129 0%, var(--bg) 70%)}
  #map svg{width:100%; height:100%}
  .edge{stroke:#3a4750; stroke-width:1.5}
  .edge.smuggling{stroke-dasharray:5 4; stroke:#5d4037}
  .node circle.body{stroke:#000; stroke-width:1.5; cursor:pointer}
  .node.sel circle.body{stroke:var(--amber); stroke-width:3}
  .node text{fill:var(--ink); font-size:11px; pointer-events:none}
  .node .est{fill:var(--amber); font-size:10px}
  .node .pips{fill:var(--red); font-size:9px}
  .node .star{fill:var(--amber); font-size:10px}
  .node .patron{fill:#ff7043}
  #sheet{background:var(--panel); border-top:2px solid #000; height:46%; display:flex;
    flex-direction:column}
  nav{display:flex}
  nav button{flex:1; background:var(--panel2); border:0; color:var(--dim); padding:8px;
    font:inherit; border-right:1px solid #000}
  nav button.on{background:var(--panel); color:var(--amber); font-weight:bold}
  #panel{flex:1; overflow-y:auto; padding:8px 10px}
  .head{color:var(--amber); margin:6px 0 3px; font-weight:bold}
  .sub{color:var(--dim); font-size:12px}
  .card{background:var(--panel2); border-radius:6px; padding:7px 9px; margin:6px 0}
  .init{display:flex; justify-content:space-between; align-items:center; gap:6px;
    border-left:3px solid var(--dim)}
  .init.armed{border-left-color:var(--amber); background:#2c3540}
  .init small{color:var(--dim); display:block}
  .cost{color:var(--amber); white-space:nowrap}
  button.act{background:var(--panel2); color:var(--ink); border:1px solid #000;
    border-radius:6px; padding:8px 12px; font:inherit}
  button.primary{background:var(--amber); color:#000; font-weight:bold; width:100%;
    padding:11px; border:0; border-radius:6px; font-size:15px}
  .led{font-size:12px; margin-left:8px}
  .led .pos{color:var(--green)} .led .neg{color:var(--red)}
  .hl{border-left:3px solid var(--red); padding-left:8px; margin:5px 0; font-size:13px}
  .hl.warn{border-left-color:var(--amber)} .hl.info{border-left-color:var(--blue)}
  .frow{display:flex; justify-content:space-between; font-size:12px; padding:2px 0}
  .band{color:var(--dim)}
  #modal,#endgame{position:fixed; inset:0; background:rgba(0,0,0,.78); display:none;
    align-items:center; justify-content:center; padding:16px; z-index:10}
  #modal.show,#endgame.show{display:flex}
  .paper{background:var(--panel); border:1px solid var(--amber); border-radius:8px;
    max-width:420px; width:100%; max-height:90%; overflow-y:auto; padding:14px}
  .paper h2{color:var(--amber); margin:0 0 6px; font-size:16px}
  .choice{display:block; width:100%; text-align:left; margin:7px 0; padding:9px;
    background:var(--panel2); color:var(--ink); border:1px solid #000; border-radius:6px;
    font:inherit}
  .choice:active{background:#2c3540}
  canvas{width:100%; background:#0d1117; border-radius:6px}
  .src{font-size:10px; color:var(--dim); text-align:right}
  input,select{background:var(--panel2); color:var(--ink); border:1px solid #000;
    border-radius:4px; padding:5px; font:inherit; width:90px}
  .queue{color:var(--teal); font-size:12px}
  table{width:100%; border-collapse:collapse; font-size:12px}
  td{padding:2px 4px; border-bottom:1px solid #2a323b}
  td:last-child{text-align:right}
  /* v0.5.2 legibility */
  .hint{color:var(--dim); font-weight:normal}
  .gd{color:var(--green)} .bd{color:var(--red)}
  #helpBtn{margin-left:auto; background:var(--panel2); border:1px solid #000;
    color:var(--amber); border-radius:50%; width:24px; height:24px; font:inherit;
    font-weight:bold; cursor:pointer; flex:none}
  .kv{display:flex; justify-content:space-between; gap:8px; align-items:center;
    font-size:12px; padding:3px 0; border-bottom:1px solid #232b33}
  .kv .lbl{color:var(--dim)} .kv .val{font-variant-numeric:tabular-nums; white-space:nowrap}
  .meter{height:6px; background:#000; border-radius:3px; overflow:hidden; width:90px}
  .meter i{display:block; height:100%}
  .fcard{background:#191f26; border-radius:5px; padding:5px 7px; margin:5px 0}
  .fcard .nm{font-weight:bold}
  .legend{display:flex; flex-wrap:wrap; gap:5px 12px; font-size:11px; color:var(--dim);
    padding:5px 0}
  .swatch{display:inline-block; width:9px; height:9px; border-radius:50%;
    vertical-align:middle; margin-right:3px; border:1px solid #000}
  .help h3{color:var(--amber); margin:11px 0 2px; font-size:13px}
  .help p{margin:3px 0; font-size:12.5px}
  .help .term{color:var(--ink); font-weight:bold}
  .help .arrow{color:var(--amber)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="row">
      <span class="date" id="hDate">—</span>
      <span class="chip" title="Political capital — spend it each month on actions. Comes from voter support.">Mandate <b id="hMandate">0</b></span>
      <span class="chip" title="Money for programmes this month.">Funds <b id="hTreasury">0</b></span>
      <span class="chip" id="hElection">—</span>
      <span class="chip" id="hDrift" style="display:none" title="Authoritarian Drift — emergency powers you've used. Permanently lowers your final score.">Drift <b>0</b></span>
      <span class="chip" id="hSecrets" style="display:none; color:var(--red)" title="Buried scandals. Each turn there's a chance one leaks — costing far more than disclosing would have. A free press makes leaks more likely.">Buried <b>0</b></span>
      <button id="helpBtn" title="What am I looking at?">?</button>
    </div>
    <div class="gauges">
      <div class="gauge"><label><span>Home <span class="hint">voters</span></span> <span id="vDom"></span></label>
        <div class="bar"><i id="bDom" style="background:var(--blue)"></i></div></div>
      <div class="gauge"><label><span>Allies <span class="hint">world</span></span> <span id="vIntl"></span></label>
        <div class="bar"><i id="bIntl" style="background:var(--teal)"></i></div></div>
      <div class="gauge"><label><span>Local <span class="hint">on the ground</span></span> <span id="vLoc"></span></label>
        <div class="bar"><i id="bLoc" style="background:var(--green)"></i></div></div>
    </div>
  </header>
  <div id="map"></div>
  <div id="sheet">
    <nav>
      <button id="tabBrief" class="on">Briefing</button>
      <button id="tabAct">Act</button>
      <button id="tabReport">Report</button>
      <button id="tabKey">Key</button>
    </nav>
    <div id="panel"></div>
  </div>
</div>
<div id="modal"><div class="paper" id="modalPaper"></div></div>
<div id="endgame"><div class="paper" id="endPaper"></div></div>

gative attrit = strength gain).","probability":0.3},"effects":[{"delta":3,"op":"development"},{"delta":2,"op":"local_legitimacy"},{"delta":1,"op":"governance"}],"family":"governance","id":"development_program","mandate_cost":2,"name":"Development Program","sources":["Galula \u2014 the 80% political rule"],"target":"node","treasury_cost":4},{"backfire":{"channel":"recidivism","effects":[{"amount":-3,"op":"attrit"}],"note":"Drains Strength via Defection and costs you 'soft on terror' at home up front; if security lapses, reintegrated fighters return to the fight.","probability":0.2},"effects":[{"op":"amnesty","rate":0.06,"turns":4},{"delta":-3,"op":"domestic_legitimacy"}],"family":"governance","id":"amnesty_reintegration","mandate_cost":2,"name":"Amnesty & Reintegration","sources":["RAND, How Insurgencies End \u2014 negotiated drawdowns"],"target":"node","treasury_cost":3},{"backfire":{"channel":"blown_agent","effects":[{"delta":-2,"op":"local_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"note":"The only counter to deceptive calm \u2014 it reveals Entrenchment truth. A blown network burns the people who trusted you.","probability":0.1},"effects":[{"delta":0.25,"op":"intel","turns":6}],"family":"intelligence","id":"humint_network","mandate_cost":1,"name":"HUMINT Network","sources":["DESIGN \u00a79 \u2014 fog and deceptive calm"],"target":"node","treasury_cost":2},{"backfire":{"channel":"veto_delay","effects":[{"delta":-2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"note":"A cheap legitimacy umbrella that is slow and vetoable \u2014 a stalled resolution reads as weakness at home and abroad.","probability":0.3},"effects":[{"delta":1,"op":"intl_umbrella","turns":8},{"delta":3,"op":"international_legitimacy"}],"family":"diplomatic","id":"un_mandate","mandate_cost":2,"name":"Seek UN Mandate","sources":["MINUSMA record"],"target":"global","treasury_cost":1},{"backfire":{"channel":"civil_liberties_scandal","effects":[{"delta":-5,"op":"domestic_legitimacy"},{"delta":-2,"op":"international_legitimacy"}],"note":"Tier 1 of the Emergency Powers track: real, immediate intel power everywhere \u2014 and the Authoritarian Drift is permanent either way. The track must be tempting. That is the point.","probability":0.15},"effects":[{"op":"drift","tiers":1},{"delta":0.1,"op":"intel","turns":8}],"family":"domestic","id":"surveillance_expansion","mandate_cost":1,"name":"Surveillance Expansion (Emergency Powers I)","sources":["DESIGN \u00a77 Domestic / \u00a711 IntegrityMultiplier"],"target":"global","treasury_cost":1}],"nodes":[{"access":0.9,"capital":true,"country":"ML","development":45,"governance":55,"government":"civilian","grievance":35,"id":"bamako","intel_coverage":0.5,"local_legitimacy":50,"name":"Bamako","notes":"Capital and core region of Mali. Collapse rolls for ML fire here (DESIGN \u00a75.3).","patron_influence":{"mercenary":5},"population_k":2200,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.6,"capital":false,"country":"ML","development":25,"governance":35,"government":"civilian","grievance":60,"id":"mopti","intel_coverage":0.3,"local_legitimacy":40,"name":"Mopti / Centre","notes":"Central Mali: intercommunal grievance plus weak state presence \u2014 the historical epicenter of post-2015 expansion.","patron_influence":{},"population_k":2100,"presence":{"ansar_al_sahel":{"entrenchment":15,"strength":25,"visibility":40}},"resources":["agriculture","livestock"],"sources":["ICG reporting on central Mali"]},{"access":0.5,"capital":false,"country":"ML","development":20,"governance":25,"government":"civilian","grievance":70,"id":"gao","intel_coverage":0.25,"local_legitimacy":35,"name":"Gao","notes":"Northern hub on the Niger bend; contested between both composites from the start.","patron_influence":{},"population_k":550,"presence":{"ansar_al_sahel":{"entrenchment":10,"strength":20,"visibility":45},"wilayat_sahel":{"entrenchment":5,"strength":15,"visibility":50}},"resources":["trade_routes"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.3,"capital":false,"country":"ML","development":15,"governance":15,"government":"civilian","grievance":80,"id":"kidal","intel_coverage":0.2,"local_legitimacy":25,"name":"Kidal","notes":"Far-north Tuareg heartland; state writ minimal at start date. Highest starting entrenchment on the map.","patron_influence":{},"population_k":85,"presence":{"ansar_al_sahel":{"entrenchment":25,"strength":30,"visibility":35}},"resources":["smuggling_economy"],"sources":["2012 northern Mali collapse record"]},{"access":0.85,"capital":true,"country":"BF","development":40,"governance":50,"government":"civilian","grievance":40,"id":"ouagadougou","intel_coverage":0.45,"local_legitimacy":45,"name":"Ouagadougou","notes":"Capital and core region of Burkina Faso. Collapse rolls for BF fire here.","patron_influence":{"mercenary":5},"population_k":1900,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.55,"capital":false,"country":"NE","development":20,"governance":30,"government":"civilian","grievance":65,"id":"tillaberi","intel_coverage":0.3,"local_legitimacy":35,"name":"Tillab\u00e9ri","notes":"Niger's tri-border region \u2014 the most attacked sector of the real arc. Niger's capital is off-map at Sahel-lite scale, so NE cannot collapse in this dataset; full arc map (v0.4) adds Niamey.","patron_influence":{},"population_k":2700,"presence":{"ansar_al_sahel":{"entrenchment":5,"strength":10,"visibility":40},"wilayat_sahel":{"entrenchment":10,"strength":20,"visibility":55}},"resources":["agriculture"],"sources":["ACLED tri-border incident data"]}]},"scenarios":{"sahel_arc":{"edges":[{"a":"bamako","b":"mopti","capacity":0.7,"id":"bamako_mopti","notes":"RN6 corridor; state logistics and infiltration share the road.","types":["road"]},{"a":"mopti","b":"gao","capacity":0.6,"id":"mopti_gao","notes":"Niger river axis \u2014 the 2013 intervention's route, and the rollback's.","types":["road","river","smuggling"]},{"a":"gao","b":"kidal","capacity":0.5,"id":"gao_kidal","notes":"Desert route to the Tuareg heartland; 2011 Libya arms flow.","types":["road","smuggling","ethnic"]},{"a":"gao","b":"menaka","capacity":0.55,"id":"gao_menaka","notes":"Eastward along the bend.","types":["road","smuggling"]},{"a":"kidal","b":"menaka","capacity":0.45,"id":"kidal_menaka","notes":"Intra-Tuareg corridor.","types":["smuggling","ethnic"]},{"a":"menaka","b":"tillaberi","capacity":0.55,"id":"menaka_tillaberi","notes":"The corridor into the tri-border zone \u2014 the franchise's main artery in the historical run.","types":["border","smuggling","ethnic"]},{"a":"gao","b":"tillaberi","capacity":0.6,"id":"gao_tillaberi","notes":"Tri-border artery, Mali side.","types":["border","smuggling"]},{"a":"mopti","b":"sahel_bf","capacity":0.55,"id":"mopti_sahel_bf","notes":"The 2015+ spillover path into Soum/Djibo \u2014 cross-border community ties.","types":["border","ethnic","smuggling"]},{"a":"sahel_bf","b":"ouagadougou","capacity":0.6,"id":"sahel_bf_ouagadougou","notes":"Djibo road; in the bad years, a convoy route under escort.","types":["road"]},{"a":"sahel_bf","b":"tillaberi","capacity":0.5,"id":"sahel_bf_tillaberi","notes":"Tri-border artery, Burkina side.","types":["border","smuggling"]},{"a":"bamako","b":"ouagadougou","capacity":0.65,"id":"bamako_ouagadougou","notes":"Inter-capital highway; the axis the coup cascade and the AES propagated along.","types":["road"]},{"a":"ouagadougou","b":"tillaberi","capacity":0.5,"id":"ouagadougou_tillaberi","notes":"Eastern Burkina\u2013western Niger axis.","types":["border","road"]},{"a":"tillaberi","b":"niamey","capacity":0.75,"id":"tillaberi_niamey","notes":"The capital sits inside its most contested region's commute.","types":["road"]},{"a":"niamey","b":"tahoua","capacity":0.65,"id":"niamey_tahoua","notes":"Eastward national road.","types":["road"]},{"a":"tillaberi","b":"tahoua","capacity":0.5,"id":"tillaberi_tahoua","notes":"Northern parallel route.","types":["road","smuggling"]},{"a":"tahoua","b":"diffa","capacity":0.4,"id":"tahoua_diffa","notes":"The long east road \u2014 two fronts, one thin line between them.","types":["road","smuggling"]},{"a":"ouagadougou","b":"coastal_north","capacity":0.55,"id":"ouagadougou_coastal","notes":"South toward the Gulf littoral \u2014 the spillover everyone said was coming, and then it came.","types":["border","road"]},{"a":"coastal_north","b":"niamey","capacity":0.45,"id":"coastal_niamey","notes":"Benin\u2013Niger border axis.","types":["border","road"]}],"events":[{"choices":[{"effects":[{"entrenchment":3,"faction":"azawad_front","node":"kidal","op":"presence","strength":5},{"faction":"ansar_al_sahel","node":"gao","op":"presence","strength":4}],"label":"Watch it unfold"},{"effects":[{"delta":3,"node":"bamako","op":"governance"},{"delta":1,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Emergency support to Bamako"}],"id":"northern_collapse_2012","notes":"The 2012 opening beat. The army-blames-politicians line is the coup cascade's first seed, planted in text.","once":true,"requires":{"max_turn":3},"sources":["2012 Azawad declaration record"],"text":"Three garrisons fold in a fortnight. The separatist front declares an independent Azawad from Kidal; the militants who rode in alongside them are already renaming the courts. The capital's army blames the politicians, loudly, on the radio.","title":"The North Declares Itself","weight":6},{"choices":[{"effects":[{"amount":40,"node":"gao","op":"ops_pressure","turns":4},{"amount":15,"node":"gao","op":"attrit"},{"amount":10,"node":"kidal","op":"attrit"},{"delta":5,"node":"gao","op":"local_legitimacy"},{"delta":3,"op":"domestic_legitimacy"},{"delta":2,"op":"international_legitimacy"}],"label":"Intervene in force"},{"effects":[{"amount":-8,"node":"gao","op":"attrit"},{"delta":5,"node":"mopti","op":"grievance"},{"delta":-2,"op":"international_legitimacy"}],"label":"Decline the lead role"}],"id":"intervention_window","notes":"The Serval moment. Intervention is genuinely good now \u2014 the welcome is real (Kilcullen); what you do with the welcome is the next decade.","once":true,"requires":{"max_turn":22,"min_turn":10},"sources":["2013 intervention record"],"text":"The columns are moving south; the airport at S\u00e9var\u00e9 is hours from falling. Bamako is formally asking. Every ally is watching to see whether you answer, and every future recruiter is watching how.","title":"The Window","weight":6},{"choices":[{"effects":[{"entrenchment":5,"faction":"wilayat_sahel","node":"menaka","op":"presence","strength":12},{"entrenchment":3,"faction":"wilayat_sahel","node":"tillaberi","op":"presence","strength":10}],"label":"Note the split \u2014 rivals fight each other"},{"effects":[{"entrenchment":3,"faction":"wilayat_sahel","node":"menaka","op":"presence","strength":8},{"entrenchment":2,"faction":"wilayat_sahel","node":"tillaberi","op":"presence","strength":8},{"amount":6,"node":"menaka","op":"attrit"},{"delta":3,"node":"menaka","op":"grievance"},{"delta":-2,"node":"menaka","op":"local_legitimacy"}],"label":"Preempt with strikes"}],"id":"franchise_declared","notes":"The 2015 ISGS split, composited. Both choices seed the franchise \u2014 history's gravity \u2014 but the shape differs.","once":true,"requires":{"max_turn":54,"min_turn":36},"sources":["ISGS emergence record"],"text":"A splinter katiba posts its pledge to the global brand. The men are the same men; the flag and the ambition are new. The corridor between M\u00e9naka and the tri-border begins to change hands at night.","title":"The Franchise Arrives","weight":5},{"choices":[{"effects":[{"delta":-5,"node":"ouagadougou","op":"governance"},{"delta":4,"node":"ouagadougou","op":"grievance"},{"delta":1,"op":"international_legitimacy"}],"label":"Back the civilian transition"},{"effects":[{"delta":-7,"node":"ouagadougou","op":"governance"},{"delta":4,"node":"ouagadougou","op":"grievance"},{"delta":1,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Keep working with whoever holds the file"}],"id":"burkina_insurrection","notes":"The October 2014 insurrection and Compaor\u00e9's fall \u2014 the missing beat that hollowed the Burkinab\u00e8 state before the spillover arrived. Political texture the system cannot generate (\u00a718.9); the spillover itself stays endogenous.","once":true,"requires":{"max_turn":40,"min_turn":32},"sources":["Burkina Faso 2014 insurrection record"],"text":"A quarter-century presidency tries to amend its own term limits, and the capital answers in the streets. The palace falls in two days; a transition of soldiers and ministers inherits an administration mid-crisis. None of this is about your war \u2014 and all of it will be.","title":"The Square Fills in Ouagadougou","weight":6},{"choices":[{"effects":[{"delta":0.2,"node":"bamako","op":"coup_seed"},{"delta":4,"node":"bamako","op":"grievance"},{"delta":1,"op":"international_legitimacy"}],"label":"Stand by the elected government"},{"effects":[{"delta":0.4,"node":"bamako","op":"coup_seed"},{"delta":4,"node":"bamako","op":"grievance"},{"delta":1,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Distance yourself quietly"}],"id":"political_crisis_bamako","notes":"The 2020 pre-coup texture. The coup itself stays endogenous (collapse roll) \u2014 this beat only loads the dice the way history loaded them.","once":true,"requires":{"country_not_collapsed":"ML","min_turn":76},"sources":["Mali 2020 crisis record"],"text":"A contested election, a disputed court, a summer of crowds. The army watches the crowds, and the officers you trained watch the army. Your ambassador's cables have stopped using the word 'stable'.","title":"The Street and the Barracks","weight":5},{"choices":[{"effects":[{"delta":3,"op":"international_legitimacy"},{"delta":5,"node":"bamako","op":"grievance"},{"delta":3,"node":"mopti","op":"grievance"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Back the sanctions line"},{"effects":[{"delta":-3,"op":"international_legitimacy"}],"label":"Work the back channels"}],"id":"ecowas_rupture","notes":"Sanctions pressure with the documented humanitarian-blowback channel: the grievance lands on the population before the junta (\u00a77 diplomatic).","once":true,"requires":{"country_collapsed":"ML","min_turn":100},"sources":["ECOWAS-Mali sanctions record 2022"],"text":"The regional community announces borders closed and accounts frozen until a transition timetable appears. The junta answers with flags and a rally. Prices rise in the markets first; speeches about sovereignty rise second.","title":"The Regional Bloc Draws a Line","weight":5},{"choices":[{"effects":[{"delta":25,"node":"bamako","op":"patron","patron":"mercenary"},{"delta":12,"node":"mopti","op":"patron","patron":"mercenary"},{"delta":12,"node":"gao","op":"patron","patron":"mercenary"},{"delta":2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Sanction the deployers"},{"effects":[{"delta":30,"node":"bamako","op":"patron","patron":"mercenary"},{"delta":15,"node":"mopti","op":"patron","patron":"mercenary"},{"delta":15,"node":"gao","op":"patron","patron":"mercenary"},{"delta":-3,"op":"international_legitimacy"}],"label":"Look away"}],"id":"mercenary_arrival","notes":"The mercenary patron lands either way \u2014 the market mechanic's truth (\u00a78): when a junta forms, the no-strings offer wins by default. You only choose what it costs you.","once":true,"requires":{"country_collapsed":"ML"},"sources":["Wagner/Africa Corps Mali deployment record"],"text":"Charter flights at night; weights manifested as 'mining equipment'. Within a month the junta's communiqu\u00e9s use new vocabulary, and a concession map you've never seen is circulating in the ministries. Their offer came with no conditions at all.","title":"Advisors Without Insignia","weight":5},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Isolate the bloc"},{"effects":[{"delta":-2,"op":"international_legitimacy"}],"label":"Keep channels open"}],"id":"aes_declaration","notes":"The AES beat. The consolidation clock itself lands v0.7 \u2014 at v0.4 the proto-bloc detection plus this card carry the weight in text and price.","once":true,"requires":{"min_collapsed":2},"sources":["Alliance of Sahel States formation record 2023"],"text":"Three flags on one stage. A mutual-defense pact, a promised joint force, talk of a common currency \u2014 and a communiqu\u00e9 naming you, specifically, as the region's problem. The pooled broadcast reach starts that evening.","title":"An Alliance of the Like-Minded","weight":5},{"choices":[{"effects":[{"amount":-12,"node":"gao","op":"attrit"},{"amount":-8,"node":"menaka","op":"attrit"},{"delta":4,"node":"gao","op":"grievance"},{"amount":35,"node":"gao","op":"ops_pressure","turns":3},{"delta":-2,"op":"domestic_legitimacy"}],"label":"Surge the response"},{"effects":[{"amount":-12,"node":"gao","op":"attrit"},{"amount":-8,"node":"menaka","op":"attrit"},{"delta":4,"node":"gao","op":"grievance"},{"delta":-3,"node":"gao","op":"local_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Hold and harden"}],"id":"insurgent_concord","notes":"The April 2026 model: ideologically unlike groups, joint offensive (\u00a75.2). Requires an actual link in the faction graph \u2014 if the player kept them apart, this card never exists. The strength surge lands either way; the response shapes whose ledger pays.","once":true,"requires":{"min_links":1,"min_turn":150},"sources":["en.wikipedia.org/wiki/2026_Mali_offensives"],"text":"Two factions that spent a decade killing each other hit five positions in one night, in sequence, on a shared clock. The communiqu\u00e9s are separate; the staff work plainly wasn't. Your analysts called this 'unlikely' in last quarter's assessment.","title":"The Concord of Enemies","weight":6},{"choices":[{"effects":[{"delta":-4,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"label":"Disclose and open a joint inquiry"},{"effects":[{"delta":-2,"op":"local_legitimacy"},{"op":"suppress_clock","severity":7}],"label":"Bury the report"}],"id":"partner_atrocity","notes":"The Transparency Dial (\u00a76). Disclose: pay now, less Local damage (honesty registers). Bury: nothing now, but a leak clock starts \u2014 and a free press tends to find out, at a multiple of the honest cost.","requires":{"min_partner_capacity":1},"sources":["Sahel partner-force abuse reporting","DESIGN \u00a76 Transparency Dial"],"text":"A unit you raid alongside is credibly accused of executing detainees in a village sweep. Your flag is on the operation. The report is on your desk; the press does not have it yet.","title":"Partner-Force Atrocity","weight":1.2},{"choices":[{"effects":[{"delta":-3,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"label":"Own it: release the assessment, pay compensation"},{"effects":[{"op":"suppress_clock","severity":9}],"label":"Classify it"}],"id":"errant_strike","notes":"The Transparency Dial again, harder: classifying costs nothing today and risks an election-shock leak later. The disclose branch is cheaper on average \u2014 if you can stomach paying every time.","requires":{"min_casualties":1},"sources":["Drone-strike collateral reporting; DESIGN \u00a76 Transparency Dial"],"text":"Your strike cell is certain the convoy was a target. The village is certain it was a wedding. Both cannot be right, and only one of them will hold a press conference. Your name is on the authorization.","title":"The Strike Hit a Wedding","weight":1.0},{"choices":[{"effects":[{"delta":3,"op":"international_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"}],"label":"Fund and host humanitarian corridors"},{"effects":[{"delta":-4,"op":"international_legitimacy"},{"delta":2,"op":"domestic_legitimacy"},{"delta":3,"op":"grievance"}],"label":"Press the host state to close the corridor"}],"id":"refugee_wave","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_avg_grievance":55},"sources":["UNHCR Sahel displacement record"],"text":"Displacement from the contested sectors crosses a threshold; columns are moving toward the capital and the borders. Cameras are already there.","title":"Refugee Wave","weight":1.0},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"},{"delta":-3,"op":"partner_capacity"}],"label":"Comply and withdraw in good order"},{"effects":[{"delta":-5,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Pay to stay \u2014 drop the conditionality"}],"id":"base_access_revoked","notes":"Generic deck, shared with Sahel-lite.","requires":{"any_junta":true},"sources":["2022 French withdrawal from Mali record"],"text":"The junta's spokesman, flanked by new advisors you recognize from elsewhere, announces that your forces have weeks to leave. The advisors' employer does not do press conferences.","title":"Base Access Revoked","weight":1.5},{"choices":[{"effects":[{"delta":-5,"op":"domestic_legitimacy"}],"label":"Defend the mission on its merits"},{"effects":[{"delta":-2,"op":"domestic_legitimacy"},{"delta":-2,"op":"international_legitimacy"}],"label":"Pivot to homeland-security framing"}],"id":"election_shock","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_casualties":5},"sources":["Merom, How Democracies Lose Small Wars"],"text":"A coffin-count graphic leads the evening news for the third night running. The opposition has found its single issue, and it is your war.","title":"Election Shock at Home","weight":0.8},{"choices":[{"effects":[{"delta":0.3,"op":"coup_seed"},{"delta":-4,"op":"international_legitimacy"}],"label":"Acquiesce \u2014 stability first"},{"effects":[{"delta":0.1,"op":"coup_seed"},{"delta":-2,"op":"partner_capacity"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Condemn and suspend assistance"}],"id":"transitional_council","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_coup_risk":0.4},"sources":["Sahel coup-leader training records"],"text":"Officers from a battalion your trainers certified appear on state television at dawn. They speak of corruption, of the failing war, and of the patriotic necessity of a transitional period. They thank their foreign partners \u2014 ambiguously.","title":"A 'Transitional Council' Announces Itself","weight":1.5},{"choices":[{"effects":[{"delta":3,"op":"domestic_legitimacy"},{"delta":-0.1,"op":"intel","turns":4}],"label":"Declare progress"},{"effects":[{"delta":0.15,"op":"intel","turns":4},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Commission an independent assessment"}],"id":"quiet_sector_report","notes":"Generic deck, shared with Sahel-lite.","sources":["2026 Sahel entrenchment analyses \u2014 falling attacks \u2260 security"],"text":"Incident counts in a sector you barely cover have fallen for two consecutive quarters. Your briefer calls it progress. A footnote mentions new 'dispute-resolution committees' operating in the villages \u2014 author unknown.","title":"The Quiet Sector","weight":0.7}],"factions":[{"capability_tier":2,"composite_of":"Composite closely modeled on JNIM and its precursors (Ansar Dine, AQIM's Saharan katibas, MUJAO, Katiba Macina). Locally rooted, federated structure, shadow-governance playbook.","id":"ansar_al_sahel","ideology":["salafi-jihadist","local-grievance"],"name":"Ansar al-Sahel","notes":"The entrenchment-first antagonist. Relations with the Azawad front are deliberately ambivalent (-0.1): allied in 2012, at war by 2013, coordinating again by 2026 \u2014 the affinity floor (\u00a718.5) keeps the late alliance reachable.","relations":{"azawad_front":-0.1,"wilayat_sahel":-0.4},"sources":["CFR Global Conflict Tracker \u2014 Sahel","ICG reporting on JNIM"],"sponsor":"aq_network"},{"capability_tier":2,"composite_of":"Composite closely modeled on IS-Sahel (ex-ISGS) and ISWAP's Lake Chad presence. Transnational franchise logic, higher-tempo violence, weaker local rooting.","id":"wilayat_sahel","ideology":["salafi-jihadist","transnational"],"name":"Wilayat Sahel","notes":"The strength-first antagonist. Starts only at the Lake Chad rim (the ISWAP face of the composite); the Saharan franchise arrives mid-run via the 'franchise declared' beat \u2014 historically the 2015 ISGS split.","relations":{"ansar_al_sahel":-0.4,"azawad_front":-0.6},"sources":["ACLED tri-border data","CFR Global Conflict Tracker \u2014 Sahel"],"sponsor":"is_core"},{"capability_tier":2,"composite_of":"Composite closely modeled on the Tuareg national movement lineage: MNLA (2012) \u2192 CMA \u2192 FLA (2025\u201326). Separatist, ethno-territorial, fights and bargains by turns.","id":"azawad_front","ideology":["separatist","ethno-nationalist"],"name":"Azawad National Front","notes":"No external sponsor: its strength is demographic and territorial, not imported (ExternalSupport = 0, \u00a718.5). The April 2026 coordinated offensives with JNIM \u2014 ideologically unlike groups allying out of shared interest \u2014 are the networking surprise this faction exists to make possible (\u00a75.2).","relations":{"ansar_al_sahel":-0.1,"wilayat_sahel":-0.6},"sources":["2012 Azawad declaration record","en.wikipedia.org/wiki/2026_Mali_offensives"],"sponsor":null}],"nodes":[{"access":0.9,"capital":true,"country":"ML","development":45,"governance":50,"government":"civilian","grievance":35,"id":"bamako","intel_coverage":0.5,"local_legitimacy":50,"name":"Bamako","notes":"Capital and core region of Mali; ML collapse rolls fire here. 2012: the weakest and most-penetrated of the three states \u2014 Mali fell first (2020).","patron_influence":{"mercenary":5},"population_k":2200,"pr tri-border zone \u2014 later the Saharan franchise's killing fields; at start, separatist ground.","population_k":250,"presence":{"ansar_al_sahel":{"entrenchment":5,"strength":8,"visibility":30},"azawad_front":{"entrenchment":15,"strength":20,"visibility":35}},"resources":["livestock","smuggling_economy"],"sources":["ACLED M\u00e9naka region data"]},{"access":0.85,"capital":true,"country":"BF","development":40,"governance":54,"government":"civilian","grievance":38,"id":"ouagadougou","intel_coverage":0.45,"local_legitimacy":45,"name":"Ouagadougou","notes":"Capital and core region of Burkina Faso; BF collapse rolls fire here. 2012: the Compaor\u00e9 state, brittle beneath the surface.","patron_influence":{"mercenary":5},"population_k":1900,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]},{"access":0.5,"capital":false,"country":"BF","development":18,"governance":30,"government":"civilian","grievance":50,"id":"sahel_bf","intel_coverage":0.3,"local_legitimacy":40,"name":"Northern Burkina (Sahel region)","notes":"Djibo and the BF Sahel. Empty at start \u2014 whether and when it ignites is the spread mechanic's first real test: historically ~2015\u20132016, via Soum-province grievances and the Mopti border.","population_k":1100,"presence":{},"resources":["livestock","gold"],"sources":["ICG Burkina Faso reporting"]},{"access":0.8,"capital":true,"country":"NE","development":35,"governance":60,"government":"civilian","grievance":45,"id":"niamey","intel_coverage":0.4,"local_legitimacy":45,"name":"Niamey","notes":"Capital and core region of Niger \u2014 on the map (unlike Sahel-lite) so the 2023 pattern can complete the cascade endogenously. Governance carried high: Niger was the West's 'model partner' and the region's sturdiest state until the palace coup.","patron_influence":{"mercenary":5},"population_k":1100,"presence":{},"resources":["administration","trade"],"sources":["CFR Global Conflict Tracker \u2014 Sahel"]} <script id="engine-js">
/* PaxStressia greybox engine — DOM-free port of sim/ (DESIGN.md §18).
   Self-consistent seeded determinism; not bit-compatible with the Python sim
   (each client is internally deterministic; rules JSON is the shared truth). */
"use strict";
const PaxEngine = (function () {
  function clamp(v, lo, hi) {
    lo = lo === undefined ? 0 : lo; hi = hi === undefined ? 100 : hi;
    return Math.max(lo, Math.min(hi, v));
  }
  function mulberry32(seed) {
    let s = seed >>> 0;
    return {
      state: () => s,
      setState: (v) => { s = v >>> 0; },
      next() {
        s |= 0; s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      },
    };
  }
  function gauss(rng, sigma) {
    let u = rng.next(); if (u <= 0) u = 1e-12;
    const v = rng.next();
    return sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  const sorted = (obj) => Object.keys(obj).sort();

  function Game(rules, seed) {
    const C = rules.constants;
    const rng = mulberry32(seed);
    const st = {
      seed, turn: 0, pendingEvent: null, fired: [],
      nodes: {}, edges: [], factions: {}, coupRisk: {}, collapsed: {},
      protoBlocs: [], actives: [],
      player: { domestic: C.starting.domestic, international: C.starting.international,
        treasury: C.starting.treasury, mandate: 0, drift: 0, casualties: 0,
        turnsSinceElection: 0, honeymoonLeft: 0, spentTotal: 0, suppressClocks: [] },
      ledger: [], reports: [], estimates: {}, headlines: [],
      hist: { believed: [], truth: [], domestic: [], international: [], localAvg: [] },
      headlineStreak: {},
    };
    for (const n of rules.nodes) {
      st.nodes[n.id] = { id: n.id, name: n.name, country: n.country, capital: n.capital,
        governance: n.governance, development: n.development, grievance: n.grievance,
        population_k: n.population_k, government: n.government || "civilian",
        local: n.local_legitimacy, intelBase: n.intel_coverage, intel: n.intel_coverage,
        patron: Object.assign({}, n.patron_influence || {}), opsPressure: 0, partnerCap: 0,
        presence: {} };
      for (const f of sorted(n.presence || {})) {
        const p = n.presence[f];
        st.nodes[n.id].presence[f] = { s: p.strength, e: p.entrenchment, v: p.visibility };
      }
    }
    st.edges = rules.edges.map((e) => ({ id: e.id, a: e.a, b: e.b, types: e.types,
      capacity: e.capacity, interdiction: 0 }));
    for (const f of rules.factions) {
      st.factions[f.id] = { id: f.id, name: f.name, sponsor: f.sponsor || null,
        tier: f.capability_tier, relations: f.relations || {}, links: [] };
    }
    const countries = [...new Set(rules.nodes.map((n) => n.country))].sort();
    for (const c of countries) { st.coupRisk[c] = 0; st.collapsed[c] = false; }
    const inits = {}; for (const i of rules.initiatives) inits[i.id] = i;

    const nodesSorted = () => sorted(st.nodes).map((k) => st.nodes[k]);
    const countryNodes = (c) => nodesSorted().filter((n) => n.country === c);
    const capitalOf = (c) => countryNodes(c).find((n) => n.capital) || null;
    const edgesOf = (id) => st.edges.filter((e) => e.a === id || e.b === id);
    const avgGrievance = () =>
      nodesSorted().reduce((s, n) => s + n.grievance, 0) / nodesSorted().length;
    const juntaCount = () => countries.filter((c) => {
      const cap = capitalOf(c); return cap && cap.government !== "civilian" &&
        cap.government !== "failed";
    }).length;
    const totalStrength = () => nodesSorted().reduce((s, n) =>
      s + sorted(n.presence).reduce((t, f) => t + n.presence[f].s, 0), 0);
    const localAvg = () =>
      nodesSorted().reduce((s, n) => s + n.local, 0) / nodesSorted().length;

    function ledgerApply(gauge, source, delta) {
      let applied = 0;
      if (gauge === "domestic") {
        const old = st.player.domestic;
        st.player.domestic = clamp(old + delta); applied = st.player.domestic - old;
      } else if (gauge === "international") {
        const old = st.player.international;
        st.player.international = clamp(old + delta); applied = st.player.international - old;
      } else {
        const n = st.nodes[gauge.slice(6)];
        const old = n.local; n.local = clamp(old + delta); applied = n.local - old;
      }
      if (applied !== 0) st.ledger.push({ turn: st.turn, gauge, source,
        delta: Math.round(applied * 10000) / 10000 });
    }

    function refreshActives() {
      st.actives = st.actives.filter((a) => a.expires > st.turn);
      for (const n of nodesSorted()) { n.opsPressure = 0; n.intel = n.intelBase; }
      const amnesty = {}; let umbrella = 0;
      for (const a of st.actives) {
        if (a.op === "ops_pressure") st.nodes[a.node].opsPressure += a.params.amount;
        else if (a.op === "intel") {
          const targets = a.node ? [a.node] : sorted(st.nodes);
          for (const t of targets) st.nodes[t].intel += a.params.delta;
        } else if (a.op === "amnesty") amnesty[a.node] = (amnesty[a.node] || 0) + a.params.rate;
        else if (a.op === "intl_umbrella") umbrella += a.params.delta;
      }
      for (const n of nodesSorted()) n.intel = clamp(n.intel, 0.05, 0.95);
      return { amnesty, umbrella };
    }

    function applyOp(op, nodeId, source, log) {
      const kind = op.op;
      if (["ops_pressure", "intel", "amnesty", "intl_umbrella"].includes(kind)) {
        const params = {}; for (const k of Object.keys(op))
          if (!["op", "turns", "node"].includes(k)) params[k] = op[k];
        st.actives.push({ op: kind, params,
          node: kind === "intl_umbrella" ? null : nodeId, source,
          expires: st.turn + (op.turns || 1) });
      } else if (kind === "attrit") {
        const n = st.nodes[nodeId];
        const ids = sorted(n.presence);
        if (ids.length) {
          const target = ids.reduce((a, b) => (n.presence[b].s > n.presence[a].s ? b : a));
          n.presence[target].s = clamp(n.presence[target].s - op.amount);
          log.push({ event: "attrit", node: nodeId, faction: target,
            amount: op.amount, source });
        }
      } else if (kind === "local_legitimacy") ledgerApply("local:" + nodeId, source, op.delta);
      else if (kind === "domestic_legitimacy") ledgerApply("domestic", source, op.delta);
      else if (kind === "international_legitimacy")
        ledgerApply("international", source, op.delta);
      else if (["governance", "development", "grievance"].includes(kind)) {
        const n = st.nodes[nodeId]; n[kind] = clamp(n[kind] + op.delta);
      } else if (kind === "partner_capacity") {
        const n = st.nodes[nodeId]; n.partnerCap = Math.max(0, n.partnerCap + op.delta);
      } else if (kind === "coup_seed") {
        st.coupRisk[st.nodes[nodeId].country] += op.delta;
      } else if (kind === "drift") st.player.drift += op.tiers;
      else if (kind === "presence") {
        const n = st.nodes[nodeId];
        if (!(op.faction in n.presence)) {
          n.presence[op.faction] = { s: 0, e: 0, v: 30 };
          log.push({ event: "presence_seeded", faction: op.faction, node: nodeId, source });
        }
        const p = n.presence[op.faction];
        p.s = clamp(p.s + (op.strength || 0));
        p.e = clamp(p.e + (op.entrenchment || 0));
      } else if (kind === "patron") {
        const n = st.nodes[nodeId];
        n.patron[op.patron] = clamp((n.patron[op.patron] || 0) + op.delta);
      } else if (kind === "suppress_clock") {
        st.player.suppressClocks.push({ severity: op.severity, age: 0,
          source, node: nodeId || null });
        log.push({ event: "suppressed", source, severity: op.severity });
      }
    }
    function processSuppressClocks(log) {
      // Transparency Dial (§6): buried scandals roll to leak; press freedom and
      // age raise the odds; a leak costs a multiple of honest disclosure.
      const survivors = [];
      for (const c of st.player.suppressClocks) {
        const leakP = (C.leak_base + C.leak_age_factor * c.age) * C.press_freedom;
        if (rng.next() < leakP) {
          const sev = c.severity * C.leak_multiplier, src = "leak:" + c.source;
          ledgerApply("domestic", src, -sev);
          ledgerApply("international", src, -sev * 0.7);
          if (c.node && c.node in st.nodes) ledgerApply("local:" + c.node, src, -sev * 0.5);
          log.push({ event: "leak", source: c.source, age: c.age,
            cost: Math.round(sev * 100) / 100 });
        } else if (c.age + 1 >= C.leak_clock_turns) {
          log.push({ event: "buried_safely", source: c.source });
        } else { c.age += 1; survivors.push(c); }
      }
      st.player.suppressClocks = survivors;
    }

    function routeFactor(nodeId) {
      const es = edgesOf(nodeId); if (!es.length) return 0;
      return es.reduce((s, e) => s + e.capacity * (1 - e.interdiction), 0) / es.length;
    }
    function growthTerms(fid, nid, amnestyRate) {
      const n = st.nodes[nid], p = n.presence[fid], f = st.factions[fid];
      const juntaAmp = 1 + (n.government === "junta" ? C.junta_recruit_amp : 0);
      const links = f.links.length;
      const headroom = 1 - p.s / 100;  // absorptive capacity (v0.5): pools deplete
      const recruitment =
        C.k_recruit * (n.grievance / 100) * (1 - n.governance / 100) * juntaAmp * headroom;
      const external = f.sponsor
        ? C.sponsor_flow * routeFactor(nid) * (1 + C.k_pool * links) * headroom : 0;
      const alliance = C.k_alliance * links * headroom;
      const attrition = (n.opsPressure + n.partnerCap * C.k_partner) * C.k_attrit * (p.s / 100);
      const defection = amnestyRate * p.s;
      return { recruitment, external_support: external, alliance_bonus: alliance,
        attrition: -attrition, defection: -defection };
    }
    function applyGrowth(amnesty) {
      const log = [], dealt = {};
      for (const fid of sorted(st.factions)) dealt[fid] = 0;
      for (const fid of sorted(st.factions)) for (const n of nodesSorted()) {
        if (!(fid in n.presence)) continue;
        const p = n.presence[fid];
        if (p.s <= 0 && p.e <= 0) continue;
        const t = growthTerms(fid, n.id, amnesty[n.id] || 0);
        p.s = clamp(p.s + t.recruitment + t.external_support + t.alliance_bonus +
          t.attrition + t.defection);
        dealt[fid] += -t.attrition;
        log.push({ faction: fid, node: n.id, terms: t, strength: p.s });
      }
      return { log, dealt };
    }
    function applySpread() {
      // v0.4 §18.5: strength above threshold replicates over open edges into
      // adjacent grievance; replication, not movement — the source keeps its men.
      const log = [], inflow = {};
      for (const fid of sorted(st.factions)) for (const n of nodesSorted()) {
        const p = n.presence[fid];
        if (!p || p.s <= C.spread_threshold) continue;
        for (const e of edgesOf(n.id).sort((a, b) => a.id < b.id ? -1 : 1)) {
          const otherId = e.a === n.id ? e.b : e.a;
          const other = st.nodes[otherId];
          // governed cores are raided, not held (v0.5): quadratic governance resist
          const resist = (1 - other.governance / 100) ** 2;
          const flow = C.k_spread * p.s * e.capacity * (1 - e.interdiction) *
            (other.grievance / 100) * resist;
          if (flow > 0) inflow[fid + "|" + otherId] = (inflow[fid + "|" + otherId] || 0) + flow;
        }
      }
      for (const key of Object.keys(inflow).sort()) {
        const [fid, nid] = key.split("|");
        const n = st.nodes[nid];
        if (!(fid in n.presence)) {
          n.presence[fid] = { s: 0, e: 0, v: 25 };
          log.push({ event: "spread", faction: fid, node: nid, turn: st.turn });
        }
        n.presence[fid].s = clamp(n.presence[fid].s + inflow[key] * (1 - n.presence[fid].s / 100));
      }
      return log;
    }
    function entrenchAndVisibility() {
      for (const n of nodesSorted()) for (const fid of sorted(n.presence)) {
        const p = n.presence[fid];
        if (p.s >= C.entrench_strength_min && n.opsPressure < C.entrench_pressure_max)
          p.e = clamp(p.e + C.k_entrench * p.s / 100);
        p.e = clamp(p.e - C.k_entrench_decay * n.local / 100);
        const contest = Math.min(1, n.opsPressure / C.pressure_ref);
        const target = clamp(C.vis_floor + C.vis_contest * contest - C.vis_quiet * p.e);
        p.v = clamp(p.v + C.vis_smooth * (target - p.v));
      }
    }
    function sharedRouteAccess(fa, fb) {
      const holds = (fid) => new Set(nodesSorted()
        .filter((n) => fid in n.presence && n.presence[fid].s > 0).map((n) => n.id));
      const A = holds(fa), B = holds(fb);
      if (!A.size || !B.size) return 0;
      for (const x of A) if (B.has(x)) return 1;
      let best = 0;
      for (const e of [...st.edges].sort((p, q) => p.id < q.id ? -1 : 1)) {
        if ((A.has(e.a) && B.has(e.b)) || (A.has(e.b) && B.has(e.a)))
          best = Math.max(best, e.capacity * (1 - e.interdiction));
      }
      return best;
    }
    function networkingCheck(dealt) {
      const log = [], ids = sorted(st.factions);
      for (let i = 0; i < ids.length; i++) for (let j = i + 1; j < ids.length; j++) {
        const f = st.factions[ids[i]], g = st.factions[ids[j]];
        if (f.links.some((l) => l.with === g.id)) continue;
        const affinity = Math.max(f.relations[g.id] || 0, C.affinity_floor);
        const need = Math.min(2, 1 + ((dealt[f.id] || 0) + (dealt[g.id] || 0)) / 20);
        const score = affinity * need * sharedRouteAccess(f.id, g.id);
        if (score >= C.link_threshold) {
          f.links.push({ with: g.id, turn: st.turn });
          g.links.push({ with: f.id, turn: st.turn });
          log.push({ event: "faction_link", factions: [f.id, g.id], turn: st.turn });
        }
      }
      return log;
    }
    function hopsFrom(originId) {
      const dist = { [originId]: 0 }; let frontier = [originId];
      while (frontier.length) {
        const nxt = [];
        for (const nid of frontier) for (const e of edgesOf(nid)) {
          const other = e.a === nid ? e.b : e.a;
          if (!(other in dist)) { dist[other] = dist[nid] + 1; nxt.push(other); }
        }
        frontier = nxt;
      }
      return dist;
    }
    function collapseRolls() {
      const log = [];
      for (const c of countries) {
        if (st.collapsed[c]) continue;
        const cap = capitalOf(c); if (!cap) continue;
        const hops = hopsFrom(cap.id);  // distance-discounted threat (v0.5)
        let threat = 0;
        for (const n of countryNodes(c)) {
          const distFactor = 1 / (1 + C.collapse_dist_decay * (hops[n.id] ?? 9));
          for (const fid of sorted(n.presence)) {
            const p = n.presence[fid];
            threat = Math.max(threat, p.s * (0.5 + p.e / 200) * distFactor);
          }
        }
        const ratio = threat / Math.max(1, cap.governance);
        if (ratio < C.collapse_ratio) continue;
        const entShare = Math.max(0, ...sorted(cap.presence)
          .map((f) => cap.presence[f].e / 100));
        const weights = [["junta", C.w_junta + st.coupRisk[c]], ["failed", C.w_failed],
          ["emirate", C.w_emirate * entShare]];
        const total = weights.reduce((s, w) => s + w[1], 0);
        if (total <= 0) continue;
        let roll = rng.next() * total, outcome = "junta";
        for (const [name, w] of weights) { if (roll < w) { outcome = name; break; } roll -= w; }
        st.collapsed[c] = true;
        if (outcome === "junta") {
          cap.governance = clamp(cap.governance - C.junta_gov_hit);
          cap.patron.mercenary = clamp((cap.patron.mercenary || 0) + C.junta_patron_gain);
          for (const n of countryNodes(c)) {
            n.grievance = clamp(n.grievance + C.junta_grievance_hit); n.government = "junta";
          }
        } else if (outcome === "failed") {
          cap.governance = clamp(cap.governance * 0.5);
          for (const n of countryNodes(c)) n.government = "failed";
        } else {
          cap.governance = clamp(cap.governance - C.junta_gov_hit);
          for (const n of countryNodes(c)) n.government = "emirate";
        }
        log.push({ event: "state_collapse", country: c, outcome,
          ratio: Math.round(ratio * 100) / 100, turn: st.turn });
      }
      return log;
    }
    function detectProtoBlocs() {
      const log = [];
      const bad = new Set(countries.filter((c) => {
        const cap = capitalOf(c); return cap && cap.government !== "civilian";
      }));
      if (bad.size < 2) return log;
      for (const e of [...st.edges].sort((p, q) => p.id < q.id ? -1 : 1)) {
        const ca = st.nodes[e.a].country, cb = st.nodes[e.b].country;
        if (ca !== cb && bad.has(ca) && bad.has(cb)) {
          const pair = [ca, cb].sort().join("+");
          if (!st.protoBlocs.includes(pair)) {
            st.protoBlocs.push(pair);
            log.push({ event: "proto_bloc", countries: pair, turn: st.turn });
          }
        }
      }
      return log;
    }
    function patronDrift() {
      const log = [];
      for (const c of countries) {
        const cap = capitalOf(c);
        if (!cap || cap.government === "civilian") continue;
        for (const n of countryNodes(c)) {
          const old = n.patron.mercenary || 0;
          n.patron.mercenary = clamp(old + C.patron_drift_junta);
          if (old < 50 && n.patron.mercenary >= 50)
            log.push({ event: "patron_dominant", node: n.id, turn: st.turn });
        }
      }
      return log;
    }
    function mandateIncome() {
      let phase = 1;
      if (st.player.honeymoonLeft > 0) phase = C.honeymoon_mult;
      else {
        const toEl = C.election_period_turns - st.player.turnsSinceElection;
        if (toEl <= C.lameduck_turns && st.player.domestic < 50) phase = C.lameduck_mult;
      }
      return Math.max(1, Math.round(C.mandate_base * (0.5 + st.player.domestic / 100) * phase));
    }
    function electionTick() {
      st.player.turnsSinceElection += 1;
      if (st.player.honeymoonLeft > 0) st.player.honeymoonLeft -= 1;
      if (st.player.turnsSinceElection < C.election_period_turns) return null;
      st.player.turnsSinceElection = 0;
      const winP = 1 / (1 + Math.exp(-(st.player.domestic - 50) / C.election_k));
      const won = rng.next() < winP;
      if (won) st.player.honeymoonLeft = C.honeymoon_turns;
      else {
        const target = 50 + (st.player.domestic - 50) * C.continuity_reversion;
        ledgerApply("domestic", "election:loss_reversion", target - st.player.domestic);
      }
      return { event: "election", won, winP: Math.round(winP * 100) / 100, turn: st.turn };
    }
    function estimate(trueV, coverage, ent, sigmaMult) {
      const sigma = C.fog_sigma_max * (1 - coverage) * (sigmaMult || 1);
      const bias = -C.fog_calm_bias * (ent / 100) * (1 - coverage);
      const displayed = Math.max(0, trueV * (1 + bias + gauss(rng, sigma)));
      return { est: Math.round(displayed * 10) / 10,
        band: Math.round(1.64 * sigma * trueV * 10) / 10 };
    }
    function computeEstimates() {
      const out = {};
      for (const n of nodesSorted()) {
        const per = {};
        for (const fid of sorted(n.presence)) {
          const p = n.presence[fid];
          const s = estimate(p.s, n.intel, p.e, 1);
          const e = estimate(p.e, n.intel, p.e, C.fog_entrench_mult);
          per[fid] = { s: s.est, sBand: s.band, e: e.est, eBand: e.band,
            v: Math.round(p.v) };
        }
        out[n.id] = { coverage: Math.round(n.intel * 100) / 100, factions: per };
      }
      st.estimates = out;
    }
    function eligible(card) {
      const r = card.requires || {};
      if (r.min_turn !== undefined && st.turn < r.min_turn) return false;
      if (r.max_turn !== undefined && st.turn > r.max_turn) return false;
      if (r.min_avg_grievance !== undefined && avgGrievance() < r.min_avg_grievance)
        return false;
      if (r.any_junta && juntaCount() === 0) return false;
      if (r.min_coup_risk !== undefined &&
        Math.max(0, ...Object.values(st.coupRisk)) < r.min_coup_risk) return false;
      if (r.min_partner_capacity !== undefined &&
        Math.max(0, ...nodesSorted().map((n) => n.partnerCap)) < r.min_partner_capacity)
        return false;
      if (r.min_casualties !== undefined && st.player.casualties < r.min_casualties)
        return false;
      if (r.country_collapsed !== undefined && !st.collapsed[r.country_collapsed])
        return false;
      if (r.country_not_collapsed !== undefined && st.collapsed[r.country_not_collapsed])
        return false;
      if (r.min_collapsed !== undefined &&
        Object.values(st.collapsed).filter(Boolean).length < r.min_collapsed) return false;
      if (r.min_links !== undefined) {
        const pairs = sorted(st.factions)
          .reduce((s, f) => s + st.factions[f].links.length, 0) / 2;
        if (pairs < r.min_links) return false;
      }
      return true;
    }
    function contextNode() {
      let best = null, bestS = -1;
      for (const n of nodesSorted()) {
        const t = sorted(n.presence).reduce((s, f) => s + n.presence[f].s, 0);
        if (t > bestS) { best = n.id; bestS = t; }
      }
      return best || nodesSorted()[0].id;
    }
    function drawEvent() {
      if (rng.next() >= C.event_chance) return null;
      const pool = rules.events.filter((c) => c.weight > 0 && eligible(c) &&
        !(c.once && st.fired.includes(c.id)));
      if (!pool.length) return null;
      const total = pool.reduce((s, c) => s + c.weight, 0);
      let roll = rng.next() * total;
      for (const c of pool) { if (roll < c.weight) return c; roll -= c.weight; }
      return pool[pool.length - 1];
    }

    let work = null; // per-turn scratch between endTurn and finishTurn
    function endTurn(orders) {
      const log = [], events = [];
      const casualtiesBefore = st.player.casualties;
      const executed = [];
      for (const o of orders || []) {
        const init = inits[o.initiative]; if (!init) continue;
        if (init.target === "node" && !(o.node in st.nodes)) continue;
        if (init.mandate_cost > st.player.mandate ||
            init.treasury_cost > st.player.treasury) continue;
        st.player.mandate -= init.mandate_cost;
        st.player.treasury -= init.treasury_cost;
        st.player.spentTotal += init.treasury_cost;
        executed.push({ initiative: init.id, node: o.node || null });
      }
      for (const o of executed) {
        const init = inits[o.initiative];
        for (const eff of init.effects) applyOp(eff, o.node, init.id, log);
        const risk = init.casualty_risk || 0;
        if (init.family === "military" && risk > 0 && rng.next() < risk) {
          st.player.casualties += 1;
          log.push({ event: "casualties", initiative: init.id, node: o.node });
        }
      }
      for (const o of executed) {
        const bf = inits[o.initiative].backfire;
        if (rng.next() < bf.probability) {
          for (const eff of bf.effects) applyOp(eff, o.node, o.initiative + ":backfire", log);
          log.push({ event: "backfire", initiative: o.initiative, channel: bf.channel,
            node: o.node });
        }
      }
      const { amnesty, umbrella } = refreshActives();
      if (umbrella > 0) ledgerApply("international", "un_umbrella", umbrella);
      const growth = applyGrowth(amnesty);
      log.push(...applySpread());
      entrenchAndVisibility();
      log.push(...networkingCheck(growth.dealt));
      log.push(...collapseRolls());
      log.push(...detectProtoBlocs());
      log.push(...patronDrift());
      work = { log, events, executed, casualtiesBefore, growthLog: growth.log };
      const card = drawEvent();
      if (card) {
        st.pendingEvent = { id: card.id, ctx: contextNode() };
        return { phase: "event", card, ctx: st.pendingEvent.ctx };
      }
      return finishTurn();
    }
    function resolveEvent(choiceIdx) {
      const card = rules.events.find((c) => c.id === st.pendingEvent.id);
      const idx = Math.min(choiceIdx, card.choices.length - 1);
      const choice = card.choices[idx];
      for (const eff of choice.effects)
        applyOp(eff, eff.node || st.pendingEvent.ctx, "event:" + card.id, work.log);
      work.events.push({ id: card.id, title: card.title, choice: choice.label,
        node: st.pendingEvent.ctx });
      st.fired.push(card.id);
      st.pendingEvent = null;
      return finishTurn();
    }
    function finishTurn() {
      const newCas = st.player.casualties - work.casualtiesBefore;
      if (newCas > 0)
        ledgerApply("domestic", "casualties", -C.domestic_hit_per_casualty * newCas);
      processSuppressClocks(work.log);
      const el = electionTick(); if (el) work.log.push(el);
      const believed = nodesSorted().reduce((s, n) => {
        const est = st.estimates[n.id];
        return s + sorted(est.factions).reduce((t, f) => t + est.factions[f].s, 0);
      }, 0);
      st.hist.believed.push(Math.round(believed));
      st.hist.truth.push(Math.round(totalStrength()));
      st.hist.domestic.push(Math.round(st.player.domestic));
      st.hist.international.push(Math.round(st.player.international));
      st.hist.localAvg.push(Math.round(localAvg()));
      const report = { turn: st.turn,
        ledger: st.ledger.filter((e) => e.turn === st.turn),
        log: work.log, events: work.events, orders: work.executed,
        growth: work.growthLog };
      st.reports.push(report);
      if (st.reports.length > 8) st.reports.shift();
      st.turn += 1;
      startTurn();
      return { phase: "done", report };
    }
    function startTurn() {
      refreshActives();
      const income = mandateIncome();
      st.player.mandate += income;
      st.player.treasury += C.treasury_income;
      st.lastIncome = income;
      computeEstimates();
    }
    function score() {
      const ns = nodesSorted();
      const stab = 100 * ns.reduce((s, n) =>
        s + (n.local / 100) * (n.governance / 100), 0) / ns.length;
      const order = 1 / (1 + C.order_junta_weight * juntaCount() +
        C.order_bloc_weight * st.protoBlocs.length);
      const integrity = Math.max(C.integrity_floor, 1 - C.drift_per_tier * st.player.drift);
      const costs = st.player.casualties * C.cost_per_casualty +
        st.player.spentTotal * C.cost_spend_norm;
      const round = (x) => Math.round(x * 100) / 100;
      return { stabilization: round(stab), order_mult: round(order),
        integrity_mult: round(integrity), costs: round(costs),
        juntas: juntaCount(), blocs: st.protoBlocs.length,
        casualties: st.player.casualties, drift: st.player.drift,
        final: round(stab * order * integrity - costs) };
    }
    function ending() {
      const s = score();
      const stabOK = s.stabilization >= 25, integOK = s.integrity_mult >= 0.85;
      if (stabOK && integOK && s.juntas === 0) return { name: "Pax",
        text: "Stabilized abroad, intact at home, allies still answer the phone. The hard ending — you found it." };
      if (stabOK && !integOK) return { name: "Fortress",
        text: "You kept the peace and lost the thing it was for. The republic stands; ask it what it is now." };
      if (!stabOK && integOK) return { name: "Retreat",
        text: "Clean hands, burning world. The blocs write the next chapter; your conscience writes the footnotes." };
      return { name: "Collapse",
        text: "Quagmire abroad, exhaustion at home. The terms are set elsewhere now." };
    }
    function serialize() {
      return JSON.stringify({ v: 1, rngState: rng.state(), st });
    }
    function restore(json) {
      const data = JSON.parse(json);
      rng.setState(data.rngState);
      Object.assign(st, data.st);
      return api;
    }
    const api = {
      state: st, consts: C, initiatives: inits, rules,
      endTurn, resolveEvent, score, ending, serialize, restore,
      startTurn, mandateIncome, nodesSorted, juntaCount, totalStrength, localAvg,
      capitalOf,
    };
    startTurn();
    return api;
  }
  return { Game, clamp };
})();
if (typeof module !== "undefined") module.exports = PaxEngine;
</script>

<script>
/* UI layer — everything below touches the DOM. */
"use strict";
if (typeof document !== "undefined") (function () {
  const $ = (id) => document.getElementById(id);
  const POS = { bamako: [12, 62], mopti: [30, 48], gao: [52, 26], kidal: [60, 8],
    menaka: [68, 30], sahel_bf: [38, 62], ouagadougou: [40, 82], tillaberi: [70, 52],
    niamey: [80, 66], tahoua: [88, 42], diffa: [93, 74], coastal_north: [58, 92] };
  const SCENARIOS = { sahel_lite: "Sahel-lite (6 nodes, dev)",
    sahel_arc: "The Arc — Sahel 2012–2026 (12 nodes)" };
  const SCN_FILES = ["nodes", "edges", "factions", "events", "constants"];
  const GOV_FILL = { civilian: "var(--civ)", junta: "var(--junta)",
    emirate: "var(--emirate)", failed: "var(--failed)" };
  const SAVE_KEY = "paxstressia_save_v1";
  const RULE_FILES = ["nodes", "edges", "factions", "initiatives", "events", "constants"];

  let game = null, rules = null, allRules = null, rulesSource = "snapshot";
  let scenario = "sahel_lite";
  let tab = "brief", selNode = null, armed = null, queue = [], horizon = 60;

  async function loadAll() {
    try {
      const base = {};
      for (const f of RULE_FILES) {
        const r = await fetch("../rules/" + f + ".json");
        if (!r.ok) throw new Error(f);
        base[f] = await r.json();
      }
      const scenarios = {};
      for (const sid of Object.keys(SCENARIOS)) {
        if (sid === "sahel_lite") continue;
        try {
          const meta = await fetch("../rules/scenarios/" + sid + "/scenario.json");
          if (!meta.ok) continue;
          const pack = { scenario: await meta.json() };
          for (const f of SCN_FILES) {
            const r = await fetch("../rules/scenarios/" + sid + "/" + f + ".json");
            if (r.ok) pack[f] = await r.json();
          }
          scenarios[sid] = pack;
        } catch (e) { /* scenario optional */ }
      }
      rulesSource = "live"; return { base, scenarios };
    } catch (e) {
      const snap = JSON.parse($("rules-snapshot").textContent);
      if (snap.__placeholder__) {
        document.body.innerHTML = "<p style='padding:2em'>No rules: serve over http " +
          "(python3 -m http.server from repo root) or run proto/build.py.</p>";
        throw e;
      }
      rulesSource = "snapshot"; return snap;
    }
  }
  function mergedRules(sid) {
    // Mirrors sim/world.load_rules (§18.9): scenario files replace; constants merge.
    if (sid === "sahel_lite" || !allRules.scenarios[sid]) return allRules.base;
    const pack = allRules.scenarios[sid];
    const out = Object.assign({}, allRules.base);
    for (const f of ["nodes", "edges", "factions", "events"])
      if (pack[f]) out[f] = pack[f];
    if (pack.constants) out.constants = Object.assign({}, out.constants, pack.constants);
    out.scenario = pack.scenario;
    return out;
  }
  function save() {
    try { localStorage.setItem(SAVE_KEY,
      JSON.stringify({ horizon, scenario, data: game.serialize() })); } catch (e) {}
  }
  function newGame(seed) {
    rules = mergedRules(scenario);
    game = PaxEngine.Game(rules, seed);
    queue = []; armed = null; selNode = null;
    save(); renderAll();
  }

  // ---------- header ----------
  function dateStr() {
    const [y, m] = game.consts.start_date.split("-").map(Number);
    const t = (m - 1) + game.state.turn;
    return (y + Math.floor(t / 12)) + "-" + String(t % 12 + 1).padStart(2, "0");
  }
  function renderHeader() {
    const p = game.state.player;
    $("hDate").textContent = "T" + game.state.turn + " · " + dateStr();
    $("hMandate").textContent = p.mandate - queue.reduce((s, q) =>
      s + game.initiatives[q.initiative].mandate_cost, 0);
    $("hTreasury").textContent = Math.round(p.treasury - queue.reduce((s, q) =>
      s + game.initiatives[q.initiative].treasury_cost, 0));
    const toEl = game.consts.election_period_turns - p.turnsSinceElection;
    $("hElection").textContent = "Election in " + toEl;
    $("hDrift").style.display = p.drift > 0 ? "" : "none";
    if (p.drift > 0) $("hDrift").querySelector("b").textContent = p.drift;
    const buried = (p.suppressClocks || []).length;
    $("hSecrets").style.display = buried > 0 ? "" : "none";
    if (buried > 0) $("hSecrets").querySelector("b").textContent = buried;
    $("hSource").textContent = "rules: " + rulesSource;
    setBar("Dom", p.domestic); setBar("Intl", p.international);
    setBar("Loc", game.localAvg());
  }
  function setBar(key, v) {
    $("b" + key).style.width = v + "%";
    $("v" + key).textContent = Math.round(v);
  }

  // ---------- map ----------
  function renderMap() {
    const W = 100, H = 100;
    let svg = '<svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">';
    for (const e of game.state.edges) {
      const [ax, ay] = POS[e.a], [bx, by] = POS[e.b];
      const cls = e.types.includes("smuggling") ? "edge smuggling" : "edge";
      svg += `<line class="${cls}" x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}"/>`;
    }
    for (const n of game.nodesSorted()) {
      const [x, y] = POS[n.id] || [50, 50];
      const r = 3 + Math.sqrt(n.population_k) / 18;
      const est = game.state.estimates[n.id];
      const tot = Object.values(est.factions).reduce((s, f) => s + f.s, 0);
      const band = Object.values(est.factions).reduce((s, f) => s + f.sBand, 0);
      const maxV = Math.max(0, ...Object.values(est.factions).map((f) => f.v));
      const pips = "!".repeat(maxV > 60 ? 3 : maxV > 35 ? 2 : maxV > 15 ? 1 : 0);
      const sel = selNode === n.id ? " sel" : "";
      const op = (0.45 + n.intel * 0.55).toFixed(2);
      svg += `<g class="node${sel}" data-node="${n.id}">` +
        `<circle class="body" cx="${x}" cy="${y}" r="${r}" fill="${GOV_FILL[n.government]}"/>` +
        (n.capital ? `<text class="star" x="${x - 1.6}" y="${y - r - 1.5}">★</text>` : "") +
        ((n.patron.mercenary || 0) >= 50
          ? `<circle class="patron" cx="${x + r}" cy="${y - r}" r="1.4"/>` : "") +
        `<text x="${x + r + 1.2}" y="${y + 1}">${n.name.split(" ")[0]}</text>` +
        (tot >= 1
          ? `<text class="est" x="${x + r + 1.2}" y="${y + 5}" opacity="${op}">` +
            `~${Math.round(tot)}</text>` : "") +
        (pips ? `<text class="pips" x="${x - r - 3.5}" y="${y + 1}">${pips}</text>` : "") +
        `</g>`;
    }
    svg += "</svg>";
    $("map").innerHTML = svg;
    $("map").querySelectorAll(".node").forEach((g) => {
      g.addEventListener("click", () => onNodeTap(g.dataset.node));
    });
  }
  function onNodeTap(id) {
    if (armed) {
      queue.push({ initiative: armed, node: id });
      armed = null;
      setTab("act");
