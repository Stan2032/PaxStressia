<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>PaxStressia — greybox prototype (v0.3)</title>
<style>
  :root{
    --bg:#14181d; --panel:#1c2229; --panel2:#222a33; --ink:#cfd8dc; --dim:#78909c;
    --amber:#ffb300; --teal:#26a69a; --red:#ef5350; --blue:#42a5f5; --green:#9ccc65;
    --junta:#b71c1c; --emirate:#4a148c; --failed:#37474f; --civ:#33691e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.45 ui-monospace,Menlo,Consolas,monospace}
  #app{display:flex; flex-direction:column; height:100%; max-width:760px; margin:0 auto}
  header{padding:6px 10px; background:var(--panel); border-bottom:1px solid #000}
  .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .date{color:var(--amber); font-weight:bold}
  .chip{background:var(--panel2); border-radius:4px; padding:1px 7px; white-space:nowrap}
  .chip b{color:var(--amber)}
  .gauges{display:flex; gap:6px; margin-top:4px}
  .gauge{flex:1}
  .gauge label{font-size:10px; color:var(--dim); display:flex; justify-content:space-between}
  .bar{height:7px; background:#000; border-radius:3px; overflow:hidden}
  .bar i{display:block; height:100%; transition:width .4s}
  #map{flex:1; min-height:240px; background:
    radial-gradient(ellipse at 70% 20%, #1a2129 0%, var(--bg) 70%)}
  #map svg{width:100%; height:100%}
  .edge{stroke:#3a4750; stroke-width:1.5}
  .edge.smuggling{stroke-dasharray:5 4; stroke:#5d4037}
  .node circle.body{stroke:#000; stroke-width:1.2; cursor:pointer}
  .node.sel circle.body{stroke:var(--amber); stroke-width:2.5}
  .node text{fill:var(--ink); font-size:4px; pointer-events:none}
  .node .est{fill:var(--amber); font-size:3.6px}
  .node .pips{fill:var(--red); font-size:4px}
  .node .star{fill:var(--amber); font-size:4.5px}
  .node .patron{fill:#ff7043}
  #sheet{background:var(--panel); border-top:2px solid #000; height:46%; display:flex;
    flex-direction:column}
  nav{display:flex}
  nav button{flex:1; background:var(--panel2); border:0; color:var(--dim); padding:8px;
    font:inherit; border-right:1px solid #000}
  nav button.on{background:var(--panel); color:var(--amber); font-weight:bold}
  #panel{flex:1; overflow-y:auto; padding:8px 10px}
  .head{color:var(--amber); margin:6px 0 3px; font-weight:bold}
  .sub{color:var(--dim); font-size:12px}
  .card{background:var(--panel2); border-radius:6px; padding:7px 9px; margin:6px 0}
  .init{display:flex; justify-content:space-between; align-items:center; gap:6px;
    border-left:3px solid var(--dim)}
  .init.armed{border-left-color:var(--amber); background:#2c3540}
  .init small{color:var(--dim); display:block}
  .cost{color:var(--amber); white-space:nowrap}
  button.act{background:var(--panel2); color:var(--ink); border:1px solid #000;
    border-radius:6px; padding:8px 12px; font:inherit}
  button.primary{background:var(--amber); color:#000; font-weight:bold; width:100%;
    padding:11px; border:0; border-radius:6px; font-size:15px}
  .led{font-size:12px; margin-left:8px}
  .led .pos{color:var(--green)} .led .neg{color:var(--red)}
  .hl{border-left:3px solid var(--red); padding-left:8px; margin:5px 0; font-size:13px}
  .hl.warn{border-left-color:var(--amber)} .hl.info{border-left-color:var(--blue)}
  .frow{display:flex; justify-content:space-between; font-size:12px; padding:2px 0}
  .band{color:var(--dim)}
  #modal,#endgame{position:fixed; inset:0; background:rgba(0,0,0,.78); display:none;
    align-items:center; justify-content:center; padding:16px; z-index:10}
  #modal.show,#endgame.show{display:flex}
  .paper{background:var(--panel); border:1px solid var(--amber); border-radius:8px;
    max-width:420px; width:100%; max-height:90%; overflow-y:auto; padding:14px}
  .paper h2{color:var(--amber); margin:0 0 6px; font-size:16px}
  .choice{display:block; width:100%; text-align:left; margin:7px 0; padding:9px;
    background:var(--panel2); color:var(--ink); border:1px solid #000; border-radius:6px;
    font:inherit}
  .choice:active{background:#2c3540}
  canvas{width:100%; background:#0d1117; border-radius:6px}
  .src{font-size:10px; color:var(--dim); text-align:right}
  input,select{background:var(--panel2); color:var(--ink); border:1px solid #000;
    border-radius:4px; padding:5px; font:inherit; width:90px}
  .queue{color:var(--teal); font-size:12px}
  table{width:100%; border-collapse:collapse; font-size:12px}
  td{padding:2px 4px; border-bottom:1px solid #2a323b}
  td:last-child{text-align:right}
  /* v0.5.2 legibility */
  .hint{color:var(--dim); font-weight:normal}
  .gd{color:var(--green)} .bd{color:var(--red)}
  #helpBtn{margin-left:auto; background:var(--panel2); border:1px solid #000;
    color:var(--amber); border-radius:50%; width:24px; height:24px; font:inherit;
    font-weight:bold; cursor:pointer; flex:none}
  .kv{display:flex; justify-content:space-between; gap:8px; align-items:center;
    font-size:12px; padding:3px 0; border-bottom:1px solid #232b33}
  .kv .lbl{color:var(--dim)} .kv .val{font-variant-numeric:tabular-nums; white-space:nowrap}
  .meter{height:6px; background:#000; border-radius:3px; overflow:hidden; width:90px}
  .meter i{display:block; height:100%}
  .fcard{background:#191f26; border-radius:5px; padding:5px 7px; margin:5px 0}
  .fcard .nm{font-weight:bold}
  .legend{display:flex; flex-wrap:wrap; gap:5px 12px; font-size:11px; color:var(--dim);
    padding:5px 0}
  .swatch{display:inline-block; width:9px; height:9px; border-radius:50%;
    vertical-align:middle; margin-right:3px; border:1px solid #000}
  .help h3{color:var(--amber); margin:11px 0 2px; font-size:13px}
  .help p{margin:3px 0; font-size:12.5px}
  .help .term{color:var(--ink); font-weight:bold}
  .help .arrow{color:var(--amber)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="row">
      <span class="date" id="hDate">—</span>
      <span class="chip" title="Political capital — spend it each month on actions. Comes from voter support.">Mandate <b id="hMandate">0</b></span>
      <span class="chip" title="Money for programmes this month.">Funds <b id="hTreasury">0</b></span>
      <span class="chip" id="hElection">—</span>
      <span class="chip" id="hDrift" style="display:none" title="Authoritarian Drift — emergency powers you've used. Permanently lowers your final score.">Drift <b>0</b></span>
      <span class="chip" id="hSecrets" style="display:none; color:var(--red)" title="Buried scandals. Each turn there's a chance one leaks — costing far more than disclosing would have. A free press makes leaks more likely.">Buried <b>0</b></span>
      <button id="helpBtn" title="What am I looking at?">?</button>
    </div>
    <div class="gauges">
      <div class="gauge"><label><span>Home <span class="hint">voters</span></span> <span id="vDom"></span></label>
        <div class="bar"><i id="bDom" style="background:var(--blue)"></i></div></div>
      <div class="gauge"><label><span>Allies <span class="hint">world</span></span> <span id="vIntl"></span></label>
        <div class="bar"><i id="bIntl" style="background:var(--teal)"></i></div></div>
      <div class="gauge"><label><span>Local <span class="hint">on the ground</span></span> <span id="vLoc"></span></label>
        <div class="bar"><i id="bLoc" style="background:var(--green)"></i></div></div>
    </div>
  </header>
  <div id="map"></div>
  <div id="sheet">
    <nav>
      <button id="tabBrief" class="on">Briefing</button>
      <button id="tabAct">Act</button>
      <button id="tabReport">Report</button>
      <button id="tabKey">Key</button>
    </nav>
    <div id="panel"></div>
  </div>
</div>
<div id="modal"><div class="paper" id="modalPaper"></div></div>
<div id="endgame"><div class="paper" id="endPaper"></div></div>

s":"Slower but durable; competes hardest where governance is functional.","oil_funded":false,"sources":["Belt-and-Road / non-interference investment playbook"],"speed":0.8},{"id":"proxy","model":"Iran model: arms and ideology routed through the insurgent/faction graph itself.","name":"Proxy patron","notes":"Competes hardest where an aligned faction graph already exists.","oil_funded":true,"sources":["Proxy-network arms-and-ideology playbook"],"speed":1.0}],"sources":{"disclaimer":"PaxStressia is grounded in real counterinsurgency scholarship and the documented Sahel crisis of 2012\u20132023, then diverges into alt-history. Insurgent factions are composites modeled on real groups, not the groups themselves. Entries below are flagged: VERIFIED (checked against reporting), ESTABLISHED (canonical scholarship/record), or ALT-HISTORY (the game's projection beyond the reliable record \u2014 not presented as fact). The game has a point of view; it does not invent its evidence.","entries":[{"category":"doctrine","citation":"Gil Merom, How Democracies Lose Small Wars (Cambridge University Press, 2003).","confidence":"established","id":"merom","note":"The game's central thesis: democracies lose counterinsurgencies at home, when domestic tolerance for cost and brutality collapses before the insurgency does. This is the Domestic gauge and the Mandate coupling."},{"category":"doctrine","citation":"David Galula, Counterinsurgency Warfare: Theory and Practice (1964).","confidence":"established","id":"galula","note":"COIN is ~80% political, 20% military; the population is the prize. This is why Local legitimacy, not attrition, is the win condition."},{"category":"doctrine","citation":"U.S. Army / Marine Corps, FM 3-24 Counterinsurgency (2006).","confidence":"established","id":"fm324","note":"Legitimacy as the objective, and the paradoxes ('the more force you use, the less effective you may be') \u2014 the law behind every initiative having a backfire channel."},{"category":"doctrine","citation":"David Kilcullen, The Accidental Guerrilla (Oxford University Press, 2009).","confidence":"established","id":"kilcullen","note":"Heavy-handed presence creates insurgents; occupation past a welcome threshold generates antibodies. The occupation-duration decay on Local legitimacy."},{"category":"doctrine","citation":"Ben Connable & Martin Libicki, How Insurgencies End (RAND, 2010); Paul, Clarke, Grill, Paths to Victory (RAND, 2013).","confidence":"established","id":"rand_end","note":"Sanctuaries and external sponsors are the decisive survival variables; leadership decapitation rarely ends an insurgency; insurgencies average ~a decade. Why edges matter more than nodes, and decapitation is deliberately weak."},{"category":"case","citation":"Mali coups (Aug 2020, May 2021); Burkina Faso coups (Jan 2022, Sept 2022); Niger coup (July 2023).","confidence":"established","id":"sahel_coups","note":"The coup cascade the scenario reproduces \u2014 each junta claiming only it could defeat the insurgency. The collapse-roll's junta path."},{"category":"case","citation":"Alliance of Sahel States, founded 16 Sept 2023 (Liptako-Gourma Charter); Mali, Burkina Faso, Niger; announced ECOWAS withdrawal Jan 2024.","confidence":"established","id":"aes","note":"An authoritarian bloc manufactured by insurgency pressure, aligned with a rival patron \u2014 the bloc-consolidation clock."},{"category":"case","citation":"Wagner Group deployment to Mali (from ~Dec 2021), later rebranded 'Africa Corps' under Russian state control.","confidence":"established","id":"wagner","note":"The mercenary patron: coup-proofing with no human-rights strings, paid in mining concessions \u2014 the allegiance market's no-strings offer."},{"category":"case","citation":"Moura massacre, central Mali, 27\u201331 March 2022. UN/OHCHR fact-finding (report 12 May 2023): 500+ killed by Malian armed forces and 'foreign military personnel' (widely identified as Wagner); 58 women and girls subjected to sexual violence.","confidence":"verified","id":"moura","note":"The atrocity that quiet hides \u2014 the partner-force and errant-strike events, and the Transparency Dial.","url":"https://news.un.org/en/story/2023/05/1136607"},{"category":"case","citation":"International Crisis Group and ACLED analyses of the Sahel: falling attack counts can reflect insurgent entrenchment into local political and economic life (shadow taxation, courts), not improved security.","confidence":"established","id":"quiet_not_peace","note":"Pillar 4 (quiet \u2260 peace): the Visibility axis, deceptive-calm fog, and the insurgent-grip discount in scoring."},{"category":"case","citation":"Several Sahel coup leaders were Western-trained officers (widely reported across the 2020\u20132023 coups).","confidence":"established","id":"train_blowback","note":"Train-and-equip blowback: the coup-seed backfire on the Train & Equip initiative."},{"category":"case","citation":"AES deepening (joint force, common-currency plans, party dissolutions) and 2024\u20132026 events depicted in the scenario.","confidence":"alt_history","id":"sahel_post2023","note":"ALT-HISTORY: the scenario projects the trajectory past the reliable record. Treated as the game's extrapolation from documented trends, not as established fact. Confirm specifics before citing them as history."},{"category":"data_org","citation":"Council on Foreign Relations \u2014 Global Conflict Tracker.","confidence":"established","id":"cfr_tracker","note":"Conflict-status reference used to set starting conditions."},{"category":"data_org","citation":"ACLED \u2014 Armed Conflict Location & Event Data Project.","confidence":"established","id":"acled","note":"Incident-level data informing regional contestation and the tri-border focus."},{"category":"data_org","citation":"International Crisis Group \u2014 Sahel reporting.","confidence":"established","id":"icg","note":"Field analysis behind the central-Mali and Burkina spillover modeling."},{"category":"data_org","c ral \u2014 the spillover everyone said was coming, and then it came.","types":["border","road"]},{"a":"coastal_north","b":"niamey","capacity":0.45,"id":"coastal_niamey","notes":"Benin\u2013Niger border axis.","types":["border","road"]}],"events":[{"choices":[{"effects":[{"entrenchment":3,"faction":"azawad_front","node":"kidal","op":"presence","strength":5},{"faction":"ansar_al_sahel","node":"gao","op":"presence","strength":4}],"label":"Watch it unfold"},{"effects":[{"delta":3,"node":"bamako","op":"governance"},{"delta":1,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Emergency support to Bamako"}],"id":"northern_collapse_2012","notes":"The 2012 opening beat. The army-blames-politicians line is the coup cascade's first seed, planted in text.","once":true,"requires":{"max_turn":3},"sources":["2012 Azawad declaration record"],"text":"Three garrisons fold in a fortnight. The separatist front declares an independent Azawad from Kidal; the militants who rode in alongside them are already renaming the courts. The capital's army blames the politicians, loudly, on the radio.","title":"The North Declares Itself","weight":6},{"choices":[{"effects":[{"amount":40,"node":"gao","op":"ops_pressure","turns":4},{"amount":15,"node":"gao","op":"attrit"},{"amount":10,"node":"kidal","op":"attrit"},{"delta":5,"node":"gao","op":"local_legitimacy"},{"delta":3,"op":"domestic_legitimacy"},{"delta":2,"op":"international_legitimacy"}],"label":"Intervene in force"},{"effects":[{"amount":-8,"node":"gao","op":"attrit"},{"delta":5,"node":"mopti","op":"grievance"},{"delta":-2,"op":"international_legitimacy"}],"label":"Decline the lead role"}],"id":"intervention_window","notes":"The Serval moment. Intervention is genuinely good now \u2014 the welcome is real (Kilcullen); what you do with the welcome is the next decade.","once":true,"requires":{"max_turn":22,"min_turn":10},"sources":["2013 intervention record"],"text":"The columns are moving south; the airport at S\u00e9var\u00e9 is hours from falling. Bamako is formally asking. Every ally is watching to see whether you answer, and every future recruiter is watching how.","title":"The Window","weight":6},{"choices":[{"effects":[{"entrenchment":5,"faction":"wilayat_sahel","node":"menaka","op":"presence","strength":12},{"entrenchment":3,"faction":"wilayat_sahel","node":"tillaberi","op":"presence","strength":10}],"label":"Note the split \u2014 rivals fight each other"},{"effects":[{"entrenchment":3,"faction":"wilayat_sahel","node":"menaka","op":"presence","strength":8},{"entrenchment":2,"faction":"wilayat_sahel","node":"tillaberi","op":"presence","strength":8},{"amount":6,"node":"menaka","op":"attrit"},{"delta":3,"node":"menaka","op":"grievance"},{"delta":-2,"node":"menaka","op":"local_legitimacy"}],"label":"Preempt with strikes"}],"id":"franchise_declared","notes":"The 2015 ISGS split, composited. Both choices seed the franchise \u2014 history's gravity \u2014 but the shape differs.","once":true,"requires":{"max_turn":54,"min_turn":36},"sources":["ISGS emergence record"],"text":"A splinter katiba posts its pledge to the global brand. The men are the same men; the flag and the ambition are new. The corridor between M\u00e9naka and the tri-border begins to change hands at night.","title":"The Franchise Arrives","weight":5},{"choices":[{"effects":[{"delta":-5,"node":"ouagadougou","op":"governance"},{"delta":4,"node":"ouagadougou","op":"grievance"},{"delta":1,"op":"international_legitimacy"}],"label":"Back the civilian transition"},{"effects":[{"delta":-7,"node":"ouagadougou","op":"governance"},{"delta":4,"node":"ouagadougou","op":"grievance"},{"delta":1,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Keep working with whoever holds the file"}],"id":"burkina_insurrection","notes":"The October 2014 insurrection and Compaor\u00e9's fall \u2014 the missing beat that hollowed the Burkinab\u00e8 state before the spillover arrived. Political texture the system cannot generate (\u00a718.9); the spillover itself stays endogenous.","once":true,"requires":{"max_turn":40,"min_turn":32},"sources":["Burkina Faso 2014 insurrection record"],"text":"A quarter-century presidency tries to amend its own term limits, and the capital answers in the streets. The palace falls in two days; a transition of soldiers and ministers inherits an administration mid-crisis. None of this is about your war \u2014 and all of it will be.","title":"The Square Fills in Ouagadougou","weight":6},{"choices":[{"effects":[{"delta":0.2,"node":"bamako","op":"coup_seed"},{"delta":4,"node":"bamako","op":"grievance"},{"delta":1,"op":"international_legitimacy"}],"label":"Stand by the elected government"},{"effects":[{"delta":0.4,"node":"bamako","op":"coup_seed"},{"delta":4,"node":"bamako","op":"grievance"},{"delta":1,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Distance yourself quietly"}],"id":"political_crisis_bamako","notes":"The 2020 pre-coup texture. The coup itself stays endogenous (collapse roll) \u2014 this beat only loads the dice the way history loaded them.","once":true,"requires":{"country_not_collapsed":"ML","min_turn":76},"sources":["Mali 2020 crisis record"],"text":"A contested election, a disputed court, a summer of crowds. The army watches the crowds, and the officers you trained watch the army. Your ambassador's cables have stopped using the word 'stable'.","title":"The Street and the Barracks","weight":5},{"choices":[{"effects":[{"delta":3,"op":"international_legitimacy"},{"delta":5,"node":"bamako","op":"grievance"},{"delta":3,"node":"mopti","op":"grievance"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Back the sanctions line"},{"effects":[{"delta":-3,"op":"international_legitimacy"}],"label":"Work the back channels"}],"id":"ecowas_rupture","notes":"Sanctions pressure with the documented humanitarian-blowback channel: the grievance lands on the population before the junta (\u00a77 diplomatic).","once":true,"requires":{"country_collapsed":"ML","min_turn":100},"sources":["ECOWAS-Mali sanctions record 2022"],"text":"The regional community announces borders closed and accounts frozen until a transition timetable appears. The junta answers with flags and a rally. Prices rise in the markets first; speeches about sovereignty rise second.","title":"The Regional Bloc Draws a Line","weight":5},{"choices":[{"effects":[{"delta":25,"node":"bamako","op":"patron","patron":"mercenary"},{"delta":12,"node":"mopti","op":"patron","patron":"mercenary"},{"delta":12,"node":"gao","op":"patron","patron":"mercenary"},{"delta":2,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Sanction the deployers"},{"effects":[{"delta":30,"node":"bamako","op":"patron","patron":"mercenary"},{"delta":15,"node":"mopti","op":"patron","patron":"mercenary"},{"delta":15,"node":"gao","op":"patron","patron":"mercenary"},{"delta":-3,"op":"international_legitimacy"}],"label":"Look away"}],"id":"mercenary_arrival","notes":"The mercenary patron lands either way \u2014 the market mechanic's truth (\u00a78): when a junta forms, the no-strings offer wins by default. You only choose what it costs you.","once":true,"requires":{"country_collapsed":"ML"},"sources":["Wagner/Africa Corps Mali deployment record"],"text":"Charter flights at night; weights manifested as 'mining equipment'. Within a month the junta's communiqu\u00e9s use new vocabulary, and a concession map you've never seen is circulating in the ministries. Their offer came with no conditions at all.","title":"Advisors Without Insignia","weight":5},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Isolate the bloc"},{"effects":[{"delta":-2,"op":"international_legitimacy"}],"label":"Keep channels open"}],"id":"aes_declaration","notes":"The AES beat. The consolidation clock itself lands v0.7 \u2014 at v0.4 the proto-bloc detection plus this card carry the weight in text and price.","once":true,"requires":{"min_collapsed":2},"sources":["Alliance of Sahel States formation record 2023"],"text":"Three flags on one stage. A mutual-defense pact, a promised joint force, talk of a common currency \u2014 and a communiqu\u00e9 naming you, specifically, as the region's problem. The pooled broadcast reach starts that evening.","title":"An Alliance of the Like-Minded","weight":5},{"choices":[{"effects":[{"amount":-12,"node":"gao","op":"attrit"},{"amount":-8,"node":"menaka","op":"attrit"},{"delta":4,"node":"gao","op":"grievance"},{"amount":35,"node":"gao","op":"ops_pressure","turns":3},{"delta":-2,"op":"domestic_legitimacy"}],"label":"Surge the response"},{"effects":[{"amount":-12,"node":"gao","op":"attrit"},{"amount":-8,"node":"menaka","op":"attrit"},{"delta":4,"node":"gao","op":"grievance"},{"delta":-3,"node":"gao","op":"local_legitimacy"},{"delta":-1,"op":"international_legitimacy"}],"label":"Hold and harden"}],"id":"insurgent_concord","notes":"The April 2026 model: ideologically unlike groups, joint offensive (\u00a75.2). Requires an actual link in the faction graph \u2014 if the player kept them apart, this card never exists. The strength surge lands either way; the response shapes whose ledger pays.","once":true,"requires":{"min_links":1,"min_turn":150},"sources":["en.wikipedia.org/wiki/2026_Mali_offensives"],"text":"Two factions that spent a decade killing each other hit five positions in one night, in sequence, on a shared clock. The communiqu\u00e9s are separate; the staff work plainly wasn't. Your analysts called this 'unlikely' in last quarter's assessment.","title":"The Concord of Enemies","weight":6},{"choices":[{"effects":[{"delta":-4,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"label":"Disclose and open a joint inquiry"},{"effects":[{"delta":-2,"op":"local_legitimacy"},{"op":"suppress_clock","severity":7}],"label":"Bury the report"}],"id":"partner_atrocity","notes":"The Transparency Dial (\u00a76). Disclose: pay now, less Local damage (honesty registers). Bury: nothing now, but a leak clock starts \u2014 and a free press tends to find out, at a multiple of the honest cost.","requires":{"min_partner_capacity":1},"sources":["Sahel partner-force abuse reporting","DESIGN \u00a76 Transparency Dial"],"text":"A unit you raid alongside is credibly accused of executing detainees in a village sweep. Your flag is on the operation. The report is on your desk; the press does not have it yet.","title":"Partner-Force Atrocity","weight":1.2},{"choices":[{"effects":[{"delta":-3,"op":"domestic_legitimacy"},{"delta":-1,"op":"international_legitimacy"},{"delta":-2,"op":"local_legitimacy"}],"label":"Own it: release the assessment, pay compensation"},{"effects":[{"op":"suppress_clock","severity":9}],"label":"Classify it"}],"id":"errant_strike","notes":"The Transparency Dial again, harder: classifying costs nothing today and risks an election-shock leak later. The disclose branch is cheaper on average \u2014 if you can stomach paying every time.","requires":{"min_casualties":1},"sources":["Drone-strike collateral reporting; DESIGN \u00a76 Transparency Dial"],"text":"Your strike cell is certain the convoy was a target. The village is certain it was a wedding. Both cannot be right, and only one of them will hold a press conference. Your name is on the authorization.","title":"The Strike Hit a Wedding","weight":1.0},{"choices":[{"effects":[{"delta":3,"op":"international_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"}],"label":"Fund and host humanitarian corridors"},{"effects":[{"delta":-4,"op":"international_legitimacy"},{"delta":2,"op":"domestic_legitimacy"},{"delta":3,"op":"grievance"}],"label":"Press the host state to close the corridor"}],"id":"refugee_wave","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_avg_grievance":55},"sources":["UNHCR Sahel displacement record"],"text":"Displacement from the contested sectors crosses a threshold; columns are moving toward the capital and the borders. Cameras are already there.","title":"Refugee Wave","weight":1.0},{"choices":[{"effects":[{"delta":1,"op":"international_legitimacy"},{"delta":-2,"op":"domestic_legitimacy"},{"delta":-3,"op":"partner_capacity"}],"label":"Comply and withdraw in good order"},{"effects":[{"delta":-5,"op":"international_legitimacy"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Pay to stay \u2014 drop the conditionality"}],"id":"base_access_revoked","notes":"Generic deck, shared with Sahel-lite.","requires":{"any_junta":true},"sources":["2022 French withdrawal from Mali record"],"text":"The junta's spokesman, flanked by new advisors you recognize from elsewhere, announces that your forces have weeks to leave. The advisors' employer does not do press conferences.","title":"Base Access Revoked","weight":1.5},{"choices":[{"effects":[{"delta":-5,"op":"domestic_legitimacy"}],"label":"Defend the mission on its merits"},{"effects":[{"delta":-2,"op":"domestic_legitimacy"},{"delta":-2,"op":"international_legitimacy"}],"label":"Pivot to homeland-security framing"}],"id":"election_shock","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_casualties":5},"sources":["Merom, How Democracies Lose Small Wars"],"text":"A coffin-count graphic leads the evening news for the third night running. The opposition has found its single issue, and it is your war.","title":"Election Shock at Home","weight":0.8},{"choices":[{"effects":[{"delta":0.3,"op":"coup_seed"},{"delta":-4,"op":"international_legitimacy"}],"label":"Acquiesce \u2014 stability first"},{"effects":[{"delta":0.1,"op":"coup_seed"},{"delta":-2,"op":"partner_capacity"},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Condemn and suspend assistance"}],"id":"transitional_council","notes":"Generic deck, shared with Sahel-lite.","requires":{"min_coup_risk":0.4},"sources":["Sahel coup-leader training records"],"text":"Officers from a battalion your trainers certified appear on state television at dawn. They speak of corruption, of the failing war, and of the patriotic necessity of a transitional period. They thank their foreign partners \u2014 ambiguously.","title":"A 'Transitional Council' Announces Itself","weight":1.5},{"choices":[{"effects":[{"delta":3,"op":"domestic_legitimacy"},{"delta":-0.1,"op":"intel","turns":4}],"label":"Declare progress"},{"effects":[{"delta":0.15,"op":"intel","turns":4},{"delta":-1,"op":"domestic_legitimacy"}],"label":"Commission an independent assessment"}],"id":"quiet_sector_report","notes":"Generic deck, shared with Sahel-lite.","sources":["2026 Sahel entrenchment analyses \u2014 falling attacks \u2260 security"],"text":"Incident counts in a sector you barely cover have fallen for two consecutive quarters. Your briefer calls it progress. A footnote mentions new 'dispute-resolution committees' operating in the villages \u2014 author unknown.","title":"The Quiet Sector","weight":0.7}],"factions":[{"capability_tier":2,"composite_of":"Composite closely modeled on JNIM and its precursors (Ansar Dine, AQIM's Saharan katibas, MUJAO, Katiba Macina). Locally rooted, federated structure, shadow-governance playbook.","id":"ansar_al_sahel","ideology":["salafi-jihadist","local-grievance"],"name":"Ansar al-Sahel","notes":"The entrenchment-first antagonist. Relations with the Azawad front are deliberately ambivalent (-0.1): allied in 2012, at war by 2013, coordinating again by 2026 \u2014 the affinity floor (\u00a718.5) keeps the late alliance reachable.","relations":{"azawad_front":-0.1,"wilayat_sahel":-0.4},"sources":["CFR Global Conflict Tracker \u2014 Sahel","ICG reporting on JNIM"],"sponsor":"aq_network"},{"capability_tier":2,"composite_of":"Composite closely modeled on IS-Sahel (ex-ISGS) and ISWAP's Lake Chad presence. Transnational franchise logic, higher-tempo violence, weaker local rooting.","id":"wilayat_sahel","ideology":["salafi-jihadist","transnational"],"name":"Wilayat Sahel","notes":"The <script id="engine-js">
/* PaxStressia greybox engine — DOM-free port of sim/ (DESIGN.md §18).
   Self-consistent seeded determinism; not bit-compatible with the Python sim
   (each client is internally deterministic; rules JSON is the shared truth). */
"use strict";
const PaxEngine = (function () {
  function clamp(v, lo, hi) {
    lo = lo === undefined ? 0 : lo; hi = hi === undefined ? 100 : hi;
    return Math.max(lo, Math.min(hi, v));
  }
  function mulberry32(seed) {
    let s = seed >>> 0;
    return {
      state: () => s,
      setState: (v) => { s = v >>> 0; },
      next() {
        s |= 0; s = (s + 0x6D2B79F5) | 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      },
    };
  }
  function gauss(rng, sigma) {
    let u = rng.next(); if (u <= 0) u = 1e-12;
    const v = rng.next();
    return sigma * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }
  const sorted = (obj) => Object.keys(obj).sort();

  function Game(rules, seed) {
    const C = rules.constants;
    const rng = mulberry32(seed);
    const st = {
      seed, turn: 0, pendingEvent: null, fired: [],
      nodes: {}, edges: [], factions: {}, coupRisk: {}, collapsed: {},
      protoBlocs: [], blocs: [], exposure: {},
      norms: { kinetic: 50, rule_of_law: 50, autocracy: 50 },
      markets: { arms: 50, oil: 50 }, patronStrength: {}, rivalry: 0, actives: [],
      player: { domestic: C.starting.domestic, international: C.starting.international,
        treasury: C.starting.treasury, mandate: 0, drift: 0, casualties: 0,
        turnsSinceElection: 0, honeymoonLeft: 0, spentTotal: 0, suppressClocks: [] },
      ledger: [], reports: [], estimates: {}, headlines: [],
      hist: { believed: [], truth: [], domestic: [], international: [], localAvg: [] },
      headlineStreak: {},
    };
    for (const n of rules.nodes) {
      st.nodes[n.id] = { id: n.id, name: n.name, country: n.country, capital: n.capital,
        governance: n.governance, development: n.development, grievance: n.grievance,
        population_k: n.population_k, government: n.government || "civilian",
        local: n.local_legitimacy, intelBase: n.intel_coverage, intel: n.intel_coverage,
        patron: Object.assign({}, n.patron_influence || {}), opsPressure: 0, partnerCap: 0,
        resources: (n.resources || []).slice(), presence: {} };
      for (const f of sorted(n.presence || {})) {
        const p = n.presence[f];
        st.nodes[n.id].presence[f] = { s: p.strength, e: p.entrenchment, v: p.visibility };
      }
    }
    st.edges = rules.edges.map((e) => ({ id: e.id, a: e.a, b: e.b, types: e.types,
      capacity: e.capacity, interdiction: 0 }));
    for (const f of rules.factions) {
      st.factions[f.id] = { id: f.id, name: f.name, sponsor: f.sponsor || null,
        tier: f.capability_tier, relations: f.relations || {}, links: [] };
    }
    const countries = [...new Set(rules.nodes.map((n) => n.country))].sort();
    for (const c of countries) { st.coupRisk[c] = 0; st.collapsed[c] = false; st.exposure[c] = 0; }
    const patronDefs = rules.patrons || [];
    for (const p of patronDefs) if (!(p.id in st.patronStrength)) st.patronStrength[p.id] = 0;
    const inits = {}; for (const i of rules.initiatives) inits[i.id] = i;

    const nodesSorted = () => sorted(st.nodes).map((k) => st.nodes[k]);
    const countryNodes = (c) => nodesSorted().filter((n) => n.country === c);
    const capitalOf = (c) => countryNodes(c).find((n) => n.capital) || null;
    const edgesOf = (id) => st.edges.filter((e) => e.a === id || e.b === id);
    const avgGrievance = () =>
      nodesSorted().reduce((s, n) => s + n.grievance, 0) / nodesSorted().length;
    const juntaCount = () => countries.filter((c) => {
      const cap = capitalOf(c); return cap && cap.government !== "civilian" &&
        cap.government !== "failed";
    }).length;
    const totalStrength = () => nodesSorted().reduce((s, n) =>
      s + sorted(n.presence).reduce((t, f) => t + n.presence[f].s, 0), 0);
    const localAvg = () =>
      nodesSorted().reduce((s, n) => s + n.local, 0) / nodesSorted().length;

    function ledgerApply(gauge, source, delta) {
      let applied = 0;
      if (gauge === "domestic") {
        const old = st.player.domestic;
        st.player.domestic = clamp(old + delta); applied = st.player.domestic - old;
      } else if (gauge === "international") {
        const old = st.player.international;
        st.player.international = clamp(old + delta); applied = st.player.international - old;
      } else {
        const n = st.nodes[gauge.slice(6)];
        const old = n.local; n.local = clamp(old + delta); applied = n.local - old;
      }
      if (applied !== 0) st.ledger.push({ turn: st.turn, gauge, source,
        delta: Math.round(applied * 10000) / 10000 });
    }

    function refreshActives() {
      st.actives = st.actives.filter((a) => a.expires > st.turn);
      for (const n of nodesSorted()) { n.opsPressure = 0; n.intel = n.intelBase; }
      const amnesty = {}; let umbrella = 0;
      for (const a of st.actives) {
        if (a.op === "ops_pressure") st.nodes[a.node].opsPressure += a.params.amount;
        else if (a.op === "intel") {
          const targets = a.node ? [a.node] : sorted(st.nodes);
          for (const t of targets) st.nodes[t].intel += a.params.delta;
        } else if (a.op === "amnesty") amnesty[a.node] = (amnesty[a.node] || 0) + a.params.rate;
        else if (a.op === "intl_umbrella") umbrella += a.params.delta;
      }
      for (const n of nodesSorted()) n.intel = clamp(n.intel, 0.05, 0.95);
      return { amnesty, umbrella };
    }

    function applyOp(op, nodeId, source, log) {
      const kind = op.op;
      if (["ops_pressure", "intel", "amnesty", "intl_umbrella"].includes(kind)) {
        const params = {}; for (const k of Object.keys(op))
          if (!["op", "turns", "node"].includes(k)) params[k] = op[k];
        st.actives.push({ op: kind, params,
          node: kind === "intl_umbrella" ? null : nodeId, source,
          expires: st.turn + (op.turns || 1) });
      } else if (kind === "attrit") {
        const n = st.nodes[nodeId];
        const ids = sorted(n.presence);
        if (ids.length) {
          const target = ids.reduce((a, b) => (n.presence[b].s > n.presence[a].s ? b : a));
          n.presence[target].s = clamp(n.presence[target].s - op.amount);
          log.push({ event: "attrit", node: nodeId, faction: target,
            amount: op.amount, source });
        }
      } else if (kind === "local_legitimacy") ledgerApply("local:" + nodeId, source, op.delta);
      else if (kind === "domestic_legitimacy") ledgerApply("domestic", source, op.delta);
      else if (kind === "international_legitimacy")
        ledgerApply("international", source, op.delta);
      else if (["governance", "development", "grievance"].includes(kind)) {
        const n = st.nodes[nodeId]; n[kind] = clamp(n[kind] + op.delta);
      } else if (kind === "partner_capacity") {
        const n = st.nodes[nodeId]; n.partnerCap = Math.max(0, n.partnerCap + op.delta);
      } else if (kind === "coup_seed") {
        st.coupRisk[st.nodes[nodeId].country] += op.delta;
      } else if (kind === "drift") st.player.drift += op.tiers;
      else if (kind === "presence") {
        const n = st.nodes[nodeId];
        if (!(op.faction in n.presence)) {
          n.presence[op.faction] = { s: 0, e: 0, v: 30 };
          log.push({ event: "presence_seeded", faction: op.faction, node: nodeId, source });
        }
        const p = n.presence[op.faction];
        p.s = clamp(p.s + (op.strength || 0));
        p.e = clamp(p.e + (op.entrenchment || 0));
      } else if (kind === "patron") {
        const n = st.nodes[nodeId];
        n.patron[op.patron] = clamp((n.patron[op.patron] || 0) + op.delta);
      } else if (kind === "suppress_clock") {
        st.player.suppressClocks.push({ severity: op.severity, age: 0,
          source, node: nodeId || null });
        log.push({ event: "suppressed", source, severity: op.severity });
      } else if (kind === "exposure") {
        const targets = nodeId ? [st.nodes[nodeId].country]
          : countries.filter((c) => { const cap = capitalOf(c);
            return cap && cap.government !== "civilian"; });
        for (const c of targets) st.exposure[c] = clamp((st.exposure[c] || 0) + op.delta);
        if (targets.length) log.push({ event: "exposure", countries: targets, source });
      } else if (kind === "designate") {
        const c = nodeId ? st.nodes[nodeId].country : null;
        if (c) {
          if ((st.exposure[c] || 0) >= C.sanctions_exposure_min) {
            st.exposure[c] -= C.sanctions_exposure_cost;
            ledgerApply("international", source, C.sanctions_intl);
            const patron = dominantPatron(c);
            for (const n of countryNodes(c))
              n.patron[patron] = Math.max(0, (n.patron[patron] || 0) - C.sanctions_patron);
            if (patron in st.patronStrength)
              st.patronStrength[patron] = Math.max(0, st.patronStrength[patron] - C.sanctions_patron_global);
            for (const b of st.blocs) if (b.countries.includes(c))
              b.stage = Math.max(1, b.stage - C.sanctions_bloc_slow);
            log.push({ event: "designation", country: c, patron, source });
          } else {
            ledgerApply("international", source + ":thin_case", -1);
            log.push({ event: "designation_failed", country: c, source });
          }
        }
      } else if (kind === "negotiate") {
        const n = nodeId ? st.nodes[nodeId] : null;
        const fids = n ? sorted(n.presence) : [];
        if (fids.length) {
          const t = fids.reduce((a, b) => (n.presence[b].s > n.presence[a].s ? b : a));
          const p = n.presence[t];
          if (p.s >= C.negotiate_min && p.s <= C.negotiate_max) {
            p.s = clamp(p.s - C.negotiate_strength_drain);
            p.e = clamp(p.e - C.negotiate_strength_drain / 2);
            ledgerApply("domestic", source, -C.negotiate_domestic_cost);
            ledgerApply("international", source, C.negotiate_international_gain);
            log.push({ event: "negotiated", node: nodeId, faction: t, source });
          } else {
            ledgerApply("domestic", source + ":talks_failed", -1);
            log.push({ event: "negotiate_failed", node: nodeId, source });
          }
        }
      }
    }
    function processSuppressClocks(log) {
      // Transparency Dial (§6): buried scandals roll to leak; press freedom and
      // age raise the odds; a leak costs a multiple of honest disclosure.
      const survivors = [];
      for (const c of st.player.suppressClocks) {
        const leakP = (C.leak_base + C.leak_age_factor * c.age) * C.press_freedom;
        if (rng.next() < leakP) {
          const sev = c.severity * C.leak_multiplier, src = "leak:" + c.source;
          ledgerApply("domestic", src, -sev);
          ledgerApply("international", src, -sev * 0.7);
          if (c.node && c.node in st.nodes) ledgerApply("local:" + c.node, src, -sev * 0.5);
          log.push({ event: "leak", source: c.source, age: c.age,
            cost: Math.round(sev * 100) / 100 });
        } else if (c.age + 1 >= C.leak_clock_turns) {
          log.push({ event: "buried_safely", source: c.source });
        } else { c.age += 1; survivors.push(c); }
      }
      st.player.suppressClocks = survivors;
    }

    function routeFactor(nodeId) {
      const es = edgesOf(nodeId); if (!es.length) return 0;
      return es.reduce((s, e) => s + e.capacity * (1 - e.interdiction), 0) / es.length;
    }
    function growthTerms(fid, nid, amnestyRate) {
      const n = st.nodes[nid], p = n.presence[fid], f = st.factions[fid];
      const juntaAmp = 1 + (n.government === "junta" ? C.junta_recruit_amp : 0);
      const links = f.links.length;
      const headroom = 1 - p.s / 100;  // absorptive capacity (v0.5): pools deplete
      const recruitment =
        C.k_recruit * (n.grievance / 100) * (1 - n.governance / 100) * juntaAmp * headroom
        * normRecruitMult();
      const external = f.sponsor
        ? C.sponsor_flow * routeFactor(nid) * (1 + C.k_pool * links) * headroom * armsMult() : 0;
      const alliance = C.k_alliance * links * headroom;
      const attrition = (n.opsPressure + n.partnerCap * C.k_partner) * C.k_attrit * (p.s / 100);
      const defection = amnestyRate * p.s;
      return { recruitment, external_support: external, alliance_bonus: alliance,
        attrition: -attrition, defection: -defection };
    }
    function applyGrowth(amnesty) {
      const log = [], dealt = {};
      for (const fid of sorted(st.factions)) dealt[fid] = 0;
      for (const fid of sorted(st.factions)) for (const n of nodesSorted()) {
        if (!(fid in n.presence)) continue;
        const p = n.presence[fid];
        if (p.s <= 0 && p.e <= 0) continue;
        const t = growthTerms(fid, n.id, amnesty[n.id] || 0);
        p.s = clamp(p.s + t.recruitment + t.external_support + t.alliance_bonus +
          t.attrition + t.defection);
        dealt[fid] += -t.attrition;
        log.push({ faction: fid, node: n.id, terms: t, strength: p.s });
      }
      return { log, dealt };
    }
    function applySpread() {
      // v0.4 §18.5: strength above threshold replicates over open edges into
      // adjacent grievance; replication, not movement — the source keeps its men.
      const log = [], inflow = {};
      for (const fid of sorted(st.factions)) for (const n of nodesSorted()) {
        const p = n.presence[fid];
        if (!p || p.s <= C.spread_threshold) continue;
        for (const e of edgesOf(n.id).sort((a, b) => a.id < b.id ? -1 : 1)) {
          const otherId = e.a === n.id ? e.b : e.a;
          const other = st.nodes[otherId];
          // governed cores are raided, not held (v0.5): quadratic governance resist
          const resist = (1 - other.governance / 100) ** 2;
          const flow = C.k_spread * p.s * e.capacity * (1 - e.interdiction) *
            (other.grievance / 100) * resist;
          if (flow > 0) inflow[fid + "|" + otherId] = (inflow[fid + "|" + otherId] || 0) + flow;
        }
      }
      for (const key of Object.keys(inflow).sort()) {
        const [fid, nid] = key.split("|");
        const n = st.nodes[nid];
        if (!(fid in n.presence)) {
          n.presence[fid] = { s: 0, e: 0, v: 25 };
          log.push({ event: "spread", faction: fid, node: nid, turn: st.turn });
        }
        n.presence[fid].s = clamp(n.presence[fid].s + inflow[key] * (1 - n.presence[fid].s / 100));
      }
      return log;
    }
    function entrenchAndVisibility() {
      for (const n of nodesSorted()) for (const fid of sorted(n.presence)) {
        const p = n.presence[fid];
        if (p.s >= C.entrench_strength_min && n.opsPressure < C.entrench_pressure_max)
          p.e = clamp(p.e + C.k_entrench * p.s / 100);
        p.e = clamp(p.e - C.k_entrench_decay * n.local / 100);
        const contest = Math.min(1, n.opsPressure / C.pressure_ref);
        const target = clamp(C.vis_floor + C.vis_contest * contest - C.vis_quiet * p.e);
        p.v = clamp(p.v + C.vis_smooth * (target - p.v));
      }
    }
    function sharedRouteAccess(fa, fb) {
      const holds = (fid) => new Set(nodesSorted()
        .filter((n) => fid in n.presence && n.presence[fid].s > 0).map((n) => n.id));
      const A = holds(fa), B = holds(fb);

      for (const e of [...st.edges].sort((p, q) => p.id < q.id ? -1 : 1)) {
        if ((A.has(e.a) && B.has(e.b)) || (A.has(e.b) && B.has(e.a)))

    function networkingCheck(dealt) {

    function collapseRolls() {

    function updateBlocs(log) {

        if (group.length >= 2) groups.push(group.sort());

    // --- global norms / precedent layer (§21): mirrors sim/norms.py ---
    function normRecruitMult() {

    function patronMarket(log) {
      const intl = st.player.international;

      const comp = (c) => clamp(C.patron_competitiveness_intl * (intl / 100) +
        C.patron_competitiveness_exposure * ((st.exposure[c] || 0) / 100) - normBonus, 0, 0.9);

      if (!multi) {

          const delta = C.patron_drift_junta * (1 - comp(c));
          for (const n of countryNodes(c)) {
            const old = n.patron.mercenary || 0;
            n.patron.mercenary = clamp(old + delta);

        for (const n of countryNodes(c)) {

          n.patron[chosen] = clamp(old + delta);

    function decayExposure() {

        text: "Clean hands, burning world. The blocs write the next chapter; your conscience writes the footnotes." };
      return { name: "Collapse",
        text: "Quagmire abroad, exhaustion at home. The terms are set elsewhere now." };
    }
    function serialize() {
      return JSON.stringify({ v: 1, rngState: rng.state(), st });
    }
    function restore(json) {
      const data = JSON.parse(json);
      rng.setState(data.rngState);
      Object.assign(st, data.st);
      return api;
    }
    const api = {
      state: st, consts: C, initiatives: inits, rules,
      endTurn, resolveEvent, score, ending, serialize, restore,
      startTurn, mandateIncome, nodesSorted, juntaCount, totalStrength, localAvg,
      capitalOf,
    };
    startTurn();
    return api;
  }
  return { Game, clamp };
})();
if (typeof module !== "undefined") module.exports = PaxEngine;
</script>

        seen.add("bf");

        push("cas", 1, "Casualties coming home from " + l.node + ".");

        push("el", 1, l.won ? "Election won. Honeymoon mandate." :

      } else if (l.event === "leak" && !seen.has("leak")) {
        seen.add("leak");
        push("leak", 2, "It leaked. A scandal you buried is on every front page — " +
          "at a far higher price than coming clean would have cost.");
      } else if (l.event === "buried_safely" && !seen.has("bury")) {
        seen.add("bury");
        push("bury", 1, "A buried scandal has gone cold. This time, no one found out.");
      } else if (l.event === "bloc_consolidates" && !seen.has("bloc2")) {
        seen.add("bloc2");
        push("bloc2", 2, "The " + l.countries + " bloc deepens (stage " + l.stage +
          "). The longer it's left, the costlier every option against it.");

  // A 0–100 stat as a labelled meter. dir=+1 means high is GOOD for you (green),

  function statRow(label, hint, val, dir, band) {
    const v = Math.round(val);

  function helpHTML() {

  function showIntro() {

      '<b>Local</b> (the population). Tap a region to see who runs it and how strong the ' +
      'insurgents are. Those insurgent numbers are <b>estimates</b> — the ± is your uncertainty.</p>' +
      '<p>The trap to watch: a region that looks <b>quiet</b> may be quietly <b>captured</b>. ' +
      'Every action has a downside, listed on it.</p>' +
      '<p class="sub">Full plain-language glossary any time: the <b>Key</b> tab.</p>' +
      '<button class="choice" id="introOk" style="text-align:center;color:var(--amber)">Got it</button>';
    $("modal").classList.add("show");
    $("introOk").addEventListener("click", () => $("modal").classList.remove("show"));
  }
  function renderPanel() {
    const P = $("panel");
    if (tab === "key") { P.innerHTML = helpHTML(); return; }
    if (tab === "brief") {
      const rep = game.state.reports[game.state.reports.length - 1];
      let html = '<div class="head">This month\'s news</div>';
      for (const h of headlines(rep)) html += `<div class="${sevClass(h)}">${h.text}</div>`;
      html += `<div class="sub">+${game.state.lastIncome} Mandate this month. ` +
        `Insurgent numbers are <b>estimates</b> (the ± shows how unsure) — better intel narrows them. ` +
        `New here? Tap <b>Key</b> below.</div>`;
      if (game.consts.norm_feedback > 0) {
        const nm = game.state.norms;
        const tag = (lbl, v, badHigh) => {
          const cls = (badHigh ? v > 55 : v < 45) ? "bd" : (badHigh ? v < 45 : v > 55) ? "gd" : "hint";
          return `<span class="${cls}">${lbl} ${Math.round(v)}</span>`;
        };
        html += `<div class="card"><b>World precedent</b> <span class="hint">your way of war, ` +
          `seen everywhere — it shifts insurgency and allies in <i>every</i> theater</span>` +
          `<div class="kv"><span class="lbl">how you fight</span><span class="val">` +
          `${tag("force", nm.kinetic, true)} · ${tag("law", nm.rule_of_law, false)} · ` +
          `${tag("autocracy", nm.autocracy, true)}</span></div></div>`;
      }
      if (game.consts.market_feedback > 0) {
        const mk = game.state.markets;
        const tag = (lbl, v, badHigh) => {
          const cls = (badHigh ? v > 55 : v < 45) ? "bd" : (badHigh ? v < 45 : v > 55) ? "gd" : "hint";
          return `<span class="${cls}">${lbl} ${Math.round(v)}</span>`;
        };
        const ps = Object.entries(game.state.patronStrength || {})
          .filter(([, v]) => v > 5).sort((a, b) => b[1] - a[1])
          .map(([k, v]) => `${k} ${Math.round(v)}`).join(" · ") || "none yet";
        html += `<div class="card"><b>World markets &amp; rivals</b> ` +
          `<span class="hint">conflict and oil move global prices; rival patrons contest the regimes</span>` +
          `<div class="kv"><span class="lbl">markets</span><span class="val">` +
          `${tag("arms", mk.arms, true)} · ${tag("oil", mk.oil, true)}</span></div>` +
          `<div class="kv"><span class="lbl">rival reach</span><span class="val">${ps}</span></div>` +
          `<div class="kv"><span class="lbl">bloc winning</span><span class="val">` +
          `${tag("rivalry", game.state.rivalry, true)}</span></div></div>`;
      }
      html += '<div class="head">' + (selNode ? "Region detail" : "Tap a region on the map") + "</div>";
      if (selNode) html += nodeCard(selNode);
      else html += '<div class="sub">Circle colour = who runs it (green elected, red junta). ' +
        'Red <b>!</b> marks = visible violence. Number by a region = estimated insurgent forces.</div>';
      P.innerHTML = html;
    } else if (tab === "act") {
      const p = game.state.player;
      const mLeft = p.mandate - queue.reduce((s, q) =>
        s + game.initiatives[q.initiative].mandate_cost, 0);
      const tLeft = p.treasury - queue.reduce((s, q) =>
        s + game.initiatives[q.initiative].treasury_cost, 0);
      const FAM = { military: "Military", governance: "Build / govern",
        intelligence: "Intelligence", diplomatic: "Diplomacy", domestic: "At home" };
      let html = `<div class="sub">Pick an action, then (if it needs a target) tap a region. ` +
        `End the month to resolve. Left to spend: <b>${mLeft}</b> Mandate, ` +
        `<b>${Math.round(tLeft)}</b> Funds.</div>`;
      for (const id of Object.keys(game.initiatives).sort()) {
        const i = game.initiatives[id];
        const cls = armed === id ? "card init armed" : "card init";
        const affordable = i.mandate_cost <= mLeft && i.treasury_cost <= tLeft;
        html += `<div class="${cls}" data-init="${id}" style="${affordable ? "" : "opacity:.5"}">` +
          `<div><b>${i.name}</b>` +
          `<small>${FAM[i.family] || i.family}` +
          (i.target === "node" ? " · needs a region" : " · nationwide") +
          ` · risk: ${i.backfire.channel.replace(/_/g, " ")} ` +
          `(${Math.round(i.backfire.probability * 100)}%)</small></div>` +
          `<span class="cost" title="costs ${i.mandate_cost} Mandate and ${i.treasury_cost} Funds">` +
          `${i.mandate_cost} Mandate<br>${i.treasury_cost} Funds</span></div>`;
      }
      if (queue.length) {
        html += '<div class="head">Queued</div>';
        queue.forEach((q, k) => {
          html += `<div class="queue" data-dq="${k}">✕ ${game.initiatives[q.initiative].name}` +
            (q.node ? " → " + q.node : "") + "</div>";
        });
      }
      html += '<div style="height:8px"></div><button class="primary" id="btnEnd">End month</button>';
      P.innerHTML = html;
      P.querySelectorAll("[data-init]").forEach((el) => el.addEventListener("click", () => {
        const i = game.initiatives[el.dataset.init];
        const mLeft2 = game.state.player.mandate - queue.reduce((s, q) =>
          s + game.initiatives[q.initiative].mandate_cost, 0);
        const tLeft2 = game.state.player.treasury - queue.reduce((s, q) =>
          s + game.initiatives[q.initiative].treasury_cost, 0);
        if (i.mandate_cost > mLeft2 || i.treasury_cost > tLeft2) return;
        if (i.target === "global") { queue.push({ initiative: i.id, node: null }); armed = null; }
        else armed = armed === i.id ? null : i.id;
        renderPanel(); renderHeader();
      }));
      P.querySelectorAll("[data-dq]").forEach((el) => el.addEventListener("click", () => {
        queue.splice(Number(el.dataset.dq), 1); renderPanel(); renderHeader();
      }));
      $("btnEnd").addEventListener("click", doEndTurn);
    } else {
      const rep = game.state.reports[game.state.reports.length - 1];
      if (!rep) { P.innerHTML = '<div class="sub">No resolved turns yet.</div>'; return; }
      let html = `<div class="head">Turn ${rep.turn} — itemized consequences</div>`;
      const groups = {};
      for (const e of rep.ledger) (groups[e.gauge] = groups[e.gauge] || []).push(e);
      for (const g of Object.keys(groups).sort()) {
        html += `<div class="card"><b>${g}</b>`;
        for (const e of groups[g]) {
          const cls = e.delta >= 0 ? "pos" : "neg";
          html += `<div class="led"><span class="${cls}">${e.delta >= 0 ? "+" : ""}` +
            `${e.delta.toFixed(1)}</span> ${e.source}</div>`;
        }
        html += "</div>";
      }
      if (!rep.ledger.length) html += '<div class="sub">No legitimacy movement.</div>';
      if (rep.events.length) {
        html += '<div class="head">Events</div>';
        for (const ev of rep.events)
          html += `<div class="card">${ev.title}<br><span class="sub">→ ${ev.choice}</span></div>`;
      }
      html += '<div class="head">World log</div>';
      for (const l of rep.log.slice(0, 12))
        html += `<div class="sub">· ${l.event}${l.country ? " " + l.country : ""}` +
          `${l.node ? " @" + l.node : ""}${l.outcome ? " → " + l.outcome : ""}</div>`;
      html += `<div class="head">Settings</div><div class="row">` +
        `<span class="sub">seed</span><input id="inSeed" value="${game.state.seed}">` +
        `<span class="sub">months</span><select id="inLen">` +
        [36, 60, game.consts.horizon_turns].map((v) =>
          `<option ${v === horizon ? "selected" : ""}>${v}</option>`).join("") +
        `</select></div><div class="row" style="margin-top:6px">` +
        `<span class="sub">scenario</span><select id="inScen" style="width:auto">` +
        Object.keys(SCENARIOS).map((sid) =>
          `<option value="${sid}" ${sid === scenario ? "selected" : ""}>` +
          `${SCENARIOS[sid]}</option>`).join("") +
        `</select> <button class="act" id="btnNew">New run</button></div>` +
        (rules.scenario ? `<div class="sub" style="margin-top:5px">${rules.scenario.name}` +
          ` — seat: ${rules.scenario.seat}</div>` : "");
      P.innerHTML = html;
      $("btnNew").addEventListener("click", () => {
        horizon = Number($("inLen").value);
        scenario = $("inScen").value;
        newGame(Number($("inSeed").value) || 0);
      });
    }
  }

  // ---------- turn flow ----------
  function doEndTurn() {
    const res = game.endTurn(queue);
    queue = []; armed = null;
    if (res.phase === "event") showEvent(res.card, res.ctx);
    else afterTurn();
  }
  // Plain, colour-coded preview of what a choice/effect does — so a player can
  // read the trade-off without parsing prose. Maps ops to everyday words and
  // signs them by whether they're good (green) or bad (red) for the player.
  function effectTags(effects) {
    // [label, value, goodWhenPositive]
    const MAP = {
      domestic_legitimacy: ["Home", "delta", true],
      international_legitimacy: ["Allies", "delta", true],
      local_legitimacy: ["Local", "delta", true],
      governance: ["Govt control", "delta", true],
      grievance: ["Grievance", "delta", false],
      coup_seed: ["Coup risk", "delta", false],
      partner_capacity: ["Local forces", "delta", true],
      exposure: ["Exposure", "delta", true],
      intl_umbrella: ["UN cover", "delta", true],
      intel: ["Intel", "delta", true],
      drift: ["Authoritarian drift", "tiers", false],
    };
    const tags = [];
    for (const e of effects || []) {
      if (e.op === "suppress_clock") { tags.push(['<span class="bd">buries it (may leak later)</span>']); continue; }
      if (e.op === "attrit") {
        const good = (e.amount || 0) > 0;
        tags.push([`<span class="${good ? "gd" : "bd"}">${good ? "hits" : "aids"} insurgents</span>`]);
        continue;
      }
      if (e.op === "ops_pressure") { tags.push(['<span class="gd">military pressure</span>']); continue; }
      if (e.op === "negotiate") { tags.push(['<span class="gd">settle a faction</span>']); continue; }
      if (e.op === "designate") { tags.push(['<span class="gd">sanction the regime</span>']); continue; }
      if (e.op === "amnesty") { tags.push(['<span class="gd">defections</span>']); continue; }
      const m = MAP[e.op];
      if (!m) continue;
      const v = e[m[1]] || 0;
      if (!v) continue;
      const good = m[2] ? v > 0 : v < 0;
      const sign = v > 0 ? "+" : "";
      tags.push([`<span class="${good ? "gd" : "bd"}">${m[0]} ${sign}${v}</span>`]);
    }
    return tags.length ? `<div class="sub" style="margin-top:3px">${tags.map((t) => t[0]).join(" · ")}</div>` : "";
  }
  function showEvent(card, ctx) {
    const M = $("modalPaper");
    const where = (game.state.nodes[ctx] && game.state.nodes[ctx].name) || ctx;
    let html = `<h2>${card.title}</h2><p>${card.text}</p>` +
      `<p class="sub">Where: ${where}</p>`;
    card.choices.forEach((c, i) => {
      html += `<button class="choice" data-c="${i}">${c.label}${effectTags(c.effects)}</button>`;
    });
    if (card.sources) html += `<div class="src">${card.sources.join(" · ")}</div>`;
    M.innerHTML = html;
    $("modal").classList.add("show");
    M.querySelectorAll(".choice").forEach((b) => b.addEventListener("click", () => {
      $("modal").classList.remove("show");
      game.resolveEvent(Number(b.dataset.c));
      afterTurn();
    }));
  }
  function afterTurn() {
    save();
    if (game.state.turn >= horizon ||
        Object.values(game.state.collapsed).every(Boolean)) return showEnd();
    setTab("brief"); renderAll();
  }
  function showEnd() {
    const s = game.score(), e = game.ending();
    const E = $("endPaper");
    E.innerHTML = `<h2>${e.name}</h2><p>${e.text}</p>` +
      `<table><tr><td>Stabilization</td><td>${s.stabilization}</td></tr>` +
      `<tr><td>× Order (juntas ${s.juntas}, blocs ${s.blocs})</td><td>${s.order_mult}</td></tr>` +
      `<tr><td>× Integrity (drift ${s.drift})</td><td>${s.integrity_mult}</td></tr>` +
      `<tr><td>− Costs (casualties ${s.casualties}, spend)</td><td>${s.costs}</td></tr>` +
      `<tr><td><b>Final score</b></td><td><b>${s.final}</b></td></tr></table>` +
      `<div class="head">Post-mortem: what you believed vs what was true</div>` +
      `<canvas id="pm" width="380" height="170"></canvas>` +
      `<div class="sub">amber = believed insurgent strength (briefing estimates) · ` +
      `red = the truth · the gap is the fog you did or didn't buy down</div>` +
      fogReveal() +
      `<div style="height:8px"></div>` +
      `<button class="primary" id="btnAgain">New run (seed ${game.state.seed + 1})</button>`;
    $("endgame").classList.add("show");
    drawPostMortem();
    $("btnAgain").addEventListener("click", () => {
      $("endgame").classList.remove("show");
      newGame(game.state.seed + 1);
    });
  }
  function fogReveal() {
    // The deceptive-calm reveal: regions whose true strength most exceeded belief.
    const est = game.state.estimates, gaps = [];
    for (const n of game.nodesSorted()) {
      const tru = sorted(n.presence).reduce((s, f) => s + n.presence[f].s, 0);
      const bel = Object.values(est[n.id].factions).reduce((s, f) => s + f.s, 0);
      if (tru > 0) gaps.push({ name: n.name, tru, bel, gap: tru - bel });
    }
    gaps.sort((a, b) => b.gap - a.gap);
    const worst = gaps.filter((g) => g.gap > 3).slice(0, 3);
    if (!worst.length) return '<div class="sub" style="margin-top:6px">Your map was honest: ' +
      'little hidden strength at the end. Intel money well spent.</div>';
    let html = '<div class="head" style="font-size:12px">Where the quiet lied</div>';
    for (const g of worst)
      html += `<div class="sub">${g.name}: you believed ~${Math.round(g.bel)} fighters; ` +
        `there were ~${Math.round(g.tru)}. The calm was shadow control, not peace.</div>`;
    return html;
  }
  function drawPostMortem() {
    const cv = $("pm"), ctx = cv.getContext("2d");
    const { believed, truth } = game.state.hist;
    const W = cv.width, H = cv.height, n = truth.length;
    const max = Math.max(10, ...believed, ...truth) * 1.1;
    ctx.fillStyle = "#0d1117"; ctx.fillRect(0, 0, W, H);
    const line = (data, color) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
      data.forEach((v, i) => {
        const x = 8 + (W - 16) * (n > 1 ? i / (n - 1) : 0);
        const y = H - 8 - (H - 16) * (v / max);
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
    };
    line(believed, "#ffb300"); line(truth, "#ef5350");
  }

  function renderAll() {
    // Each panel is independent — a fault in one must never blank the others.
    for (const fn of [renderHeader, renderMap, renderPanel]) {
      try { fn(); } catch (e) { console.error("render error in " + fn.name, e); }
    }
  }

  // ---------- boot ----------
  (async function boot() {
    allRules = await loadAll();
    let restored = false;
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const blob = JSON.parse(raw);
        if (blob.v !== SAVE_VERSION) throw new Error("stale save");  // discard old-shape saves
        horizon = blob.horizon || 60;
        scenario = blob.scenario && (blob.scenario === "sahel_lite" ||
          allRules.scenarios[blob.scenario]) ? blob.scenario : "sahel_lite";
        rules = mergedRules(scenario);
        game = PaxEngine.Game(rules, 0).restore(blob.data);
        restored = true;
      }
    } catch (e) { restored = false; }
    if (!restored) { rules = mergedRules(scenario); game = PaxEngine.Game(rules, 42); save(); }
    $("tabBrief").addEventListener("click", () => setTab("brief"));
    $("tabAct").addEventListener("click", () => setTab("act"));
    $("tabReport").addEventListener("click", () => setTab("report"));
    $("tabKey").addEventListener("click", () => setTab("key"));
    $("helpBtn").addEventListener("click", showIntro);
    if (game.state.turn >= horizon) { showEnd(); } else renderAll();
    // First-ever load: orient the player once (tracked separately from the game save).
    try {
      if (!localStorage.getItem("paxstressia_seen_intro")) {
        showIntro();
        localStorage.setItem("paxstressia_seen_intro", "1");
      }
    } catch (e) { /* private mode: just skip the one-time intro */ }
  })();
})();
</script>
</body>
</html>
