    renderAll();
  }

  // ---------- panels ----------
  function setTab(t) { tab = t;
    for (const x of ["Brief", "Act", "Report", "Key"])
      $("tab" + x).classList.toggle("on", t === x.toLowerCase());
    renderPanel();
  }
  function sevClass(h) { return h.sev === 2 ? "hl" : h.sev === 1 ? "hl warn" : "hl info"; }
  function headlines(report) {
    if (!report) return [{ sev: 0, text: "First briefing. The folder is thin; the theater is not." }];
    const out = [], streak = game.state.headlineStreak;
    const push = (key, sev, text) => {
      streak[key] = (streak[key] || 0) + 1;
      out.push({ sev, text: streak[key] > 1 ? text + " (" + streak[key] + " straight)" : text });
    };
    const seen = new Set();
    for (const l of report.log) {
      if (l.event === "state_collapse" && !seen.has("col")) {
        seen.add("col");
        push("col", 2, l.country + " has fallen: " + l.outcome + " takes the capital.");
      } else if (l.event === "proto_bloc" && !seen.has("bloc")) {
        seen.add("bloc");
        push("bloc", 2, "Proto-bloc detected: " + l.countries + ". Left alone, it grows.");
      } else if (l.event === "faction_link" && !seen.has("link")) {
        seen.add("link");
        push("link", 2, "Factions linking: " + l.factions.join(" ↔ ") + ".");
      } else if (l.event === "backfire" && !seen.has("bf")) {
        seen.add("bf");
        push("bf", 1, "Backfire — " + l.channel.replace(/_/g, " ") +
          (l.node ? " in " + l.node : "") + ".");
      } else if (l.event === "casualties" && !seen.has("cas")) {
        seen.add("cas");
        push("cas", 1, "Casualties coming home from " + l.node + ".");
      } else if (l.event === "election" && !seen.has("el")) {
        seen.add("el");
        push("el", 1, l.won ? "Election won. Honeymoon mandate." :
          "Election lost. The state endures; your standing reverts.");
      } else if (l.event === "patron_dominant" && !seen.has("pat")) {
        seen.add("pat");
        push("pat", 1, "Mercenary patron now dominant in " + l.node + ".");
      } else if (l.event === "leak" && !seen.has("leak")) {
        seen.add("leak");
        push("leak", 2, "It leaked. A scandal you buried is on every front page — " +
          "at a far higher price than coming clean would have cost.");
      } else if (l.event === "buried_safely" && !seen.has("bury")) {
        seen.add("bury");
        push("bury", 1, "A buried scandal has gone cold. This time, no one found out.");
      }
    }
    for (const k of Object.keys(streak))
      if (!out.some((h) => h.text.startsWith(k))) { /* streaks reset by absence */ }
    if (!out.length) out.push({ sev: 0,
      text: "A quiet month on the wires. Quiet is not peace." });
    return out.slice(0, 3);
  }
  // A 0–100 stat as a labelled meter. dir=+1 means high is GOOD for you (green),
  // dir=-1 means high is BAD (red). `est` shows a ± band when it's an estimate.
  function statRow(label, hint, val, dir, band) {
    const v = Math.round(val);
    const frac = Math.max(0, Math.min(100, val));
    const good = dir > 0 ? frac >= 50 : frac <= 50;
    const col = good ? "var(--green)" : "var(--red)";
    const bandTxt = band !== undefined ? ` <span class="band">±${Math.round(band)}</span>` : "";
    return `<div class="kv"><span class="lbl" title="${hint}">${label}</span>` +
      `<span class="val">${v}${bandTxt}<span class="meter" style="display:inline-block;` +
      `margin-left:6px;vertical-align:middle"><i style="width:${frac}%;background:${col}"></i>` +
      `</span></span></div>`;
  }
  function govWord(g) {
    return { civilian: "elected government", junta: "military junta",
      emirate: "insurgent emirate", failed: "collapsed / no government" }[g] || g;
  }
  function nodeCard(id) {
    const n = game.state.nodes[id], est = game.state.estimates[id];
    const COUNTRY = { ML: "Mali", BF: "Burkina Faso", NE: "Niger", GLF: "coast" };
    let facts = "";
    for (const fid of Object.keys(est.factions).sort()) {
      const f = est.factions[fid], name = game.state.factions[fid].name;
      const quiet = f.e > 35 && f.v < 25;
      facts += `<div class="fcard"><div class="nm">${name}</div>` +
        statRow("Forces", "Fighters — how dangerous right now (Strength). Your estimate; ± is the uncertainty.", f.s, -1, f.sBand) +
        statRow("Dug-in", "Shadow government — taxes, courts, control. Hard to remove (Entrenchment).", f.e, -1, f.eBand) +
        statRow("Activity", "Visible violence. Low can mean beaten — or quietly in control (Visibility).", f.v, -1) +
        (quiet ? `<div class="sub bd">⚠ dug-in but quiet — may be running this area, not losing it</div>` : "") +
        `</div>`;
    }
    if (!facts) facts = '<div class="sub">No insurgents detected here — but thin intel can hide them.</div>';
    return `<div class="card"><b>${n.name}</b> <span class="hint">${COUNTRY[n.country] || n.country}` +
      `${n.capital ? " · capital" : ""} · ${govWord(n.government)}</span>` +
      statRow("Govt control", "How firmly the state runs this region (Governance). Higher resists insurgents.", n.governance, 1) +
      statRow("Local support", "Whether the population backs you (Local legitimacy). The real win condition — and the only thing that permanently starves insurgents.", n.local, 1) +
      statRow("Grievance", "Anger at the state. High grievance is what insurgents recruit from.", n.grievance, -1) +
      statRow("Your visibility", "How clearly your intelligence sees this region. Low = the numbers above are guesses.", est.coverage * 100, 1) +
      (n.opsPressure > 0 ? statRow("Military pressure", "Your forces' pressure here right now (suppresses Forces while active).", n.opsPressure, 1) : "") +
      facts + `</div>`;
  }
  function helpHTML() {
    return '<div class="help">' +
      '<div class="head">What is this?</div>' +
      '<p>You run a democracy trying to stabilise a region without becoming the ' +
      'thing you are fighting. Each month you spend <span class="term">Mandate</span> ' +
      '(political capital) and <span class="term">Funds</span> on actions, then end the month ' +
      'and the world reacts.</p>' +
      '<h3>Your three standings (top bars, 0–100, higher is better)</h3>' +
      '<p><span class="term">Home</span> — your voters\' patience. It sets how much ' +
      'Mandate you get. Body bags and scandals drain it.</p>' +
      '<p><span class="term">Allies</span> — the world\'s trust. Unlocks coalitions and ' +
      'cover; civilian harm and hypocrisy drain it.</p>' +
      '<p><span class="term">Local</span> — whether the population on the ground backs you. ' +
      'The slowest to raise and the <b>only</b> thing that permanently starves an insurgency.</p>' +
      '<h3>A region\'s numbers (tap any region)</h3>' +
      '<p><span class="term">Govt control</span> / <span class="term">Local support</span> ' +
      '— high is good (green). <span class="term">Grievance</span> — high is bad (red): it is ' +
      'the fuel insurgents recruit from.</p>' +
      '<p>For each insurgent group: <span class="term">Forces</span> = how dangerous now · ' +
      '<span class="term">Dug-in</span> = shadow control, hard to remove · ' +
      '<span class="term">Activity</span> = visible violence. ' +
      '<b>Dug-in + low Activity = quiet but captured</b> — the trap this game is about.</p>' +
      '<h3>The numbers are guesses</h3>' +
      '<p>Insurgent figures show a <span class="term">± band</span> — your uncertainty. ' +
      'Where <span class="term">Your visibility</span> (intel) is low, a region can look calm ' +
      'while it is quietly lost. Intelligence actions narrow the guesses.</p>' +
      '<h3>How it all connects</h3>' +
      '<p>Grievance <span class="arrow">→</span> grows insurgent Forces. ' +
      'Govt control + Local support <span class="arrow">→</span> resist them. ' +
      'Unwatched Forces <span class="arrow">→</span> become Dug-in. ' +
      'A region overrun <span class="arrow">→</span> can topple its capital into a junta, ' +
      'which makes things <i>worse</i>, not better.</p>' +
      '<p><span class="term">Every action cuts both ways</span> — each one lists its risk and ' +
      'its chance. There are no free moves.</p>' +
      '<h3>Telling the truth (the Transparency Dial)</h3>' +
      '<p>When something goes wrong with your fingerprints on it — an errant strike, a ' +
      'partner\'s atrocity — you choose: <span class="term">disclose</span> (pay a cost now, ' +
      'but less, and your honesty registers) or <span class="term">bury it</span> (nothing now, ' +
      'but it becomes a <span class="term">Buried</span> secret). Each month a buried secret may ' +
      '<span class="term">leak</span> — and a free press makes that likely — costing far more ' +
      'than the truth would have. Honesty is expensive every time, and cheaper on average.</p>' +
      '<h3>Map key</h3>' +
      '<p><span class="swatch" style="background:var(--civ)"></span>elected · ' +
      '<span class="swatch" style="background:var(--junta)"></span>military junta · ' +
      '<span class="swatch" style="background:var(--emirate)"></span>insurgent-run · ' +
      '<span class="swatch" style="background:var(--failed)"></span>collapsed</p>' +
      '<p>★ capital · red <b>!</b> = visible violence · ' +
      '<span class="swatch" style="background:#ff7043"></span> = rival foreign patron entrenched · ' +
      'brown dashed line = smuggling route.</p>' +
      '<h3>Goal</h3>' +
      '<p>Reach the end with regions stabilised, allies onside, and your own democracy intact. ' +
      'Winning by force or emergency powers is possible — and the score will say so.</p>' +
      '</div>';
  }
  function showIntro() {
    $("modalPaper").innerHTML = '<h2>PaxStressia — quick orientation</h2>' +
      '<p>You lead a democracy trying to hold a region together. Each month, spend ' +
      '<b>Mandate</b> on <b>actions</b>, then <b>End month</b>.</p>' +
      '<p>Watch three standings up top — <b>Home</b> (voters), <b>Allies</b> (world), ' +
      '<b>Local</b> (the population). Tap a region to see who runs it and how strong the ' +
      'insurgents are. Those insurgent numbers are <b>estimates</b> — the ± is your uncertainty.</p>' +
      '<p>The trap to watch: a region that looks <b>quiet</b> may be quietly <b>captured</b>. ' +
      'Every action has a downside, listed on it.</p>' +
      '<p class="sub">Full plain-language glossary any time: the <b>Key</b> tab.</p>' +
      '<button class="choice" id="introOk" style="text-align:center;color:var(--amber)">Got it</button>';
    $("modal").classList.add("show");
    $("introOk").addEventListener("click", () => $("modal").classList.remove("show"));
  }
  function renderPanel() {
    const P = $("panel");
    if (tab === "key") { P.innerHTML = helpHTML(); return; }
    if (tab === "brief") {
      const rep = game.state.reports[game.state.reports.length - 1];
      let html = '<div class="head">This month\'s news</div>';
      for (const h of headlines(rep)) html += `<div class="${sevClass(h)}">${h.text}</div>`;
      html += `<div class="sub">+${game.state.lastIncome} Mandate this month. ` +
        `Insurgent numbers are <b>estimates</b> (the ± shows how unsure) — better intel narrows them. ` +
        `New here? Tap <b>Key</b> below.</div>`;
      html += '<div class="head">' + (selNode ? "Region detail" : "Tap a region on the map") + "</div>";
      if (selNode) html += nodeCard(selNode);
      else html += '<div class="sub">Circle colour = who runs it (green elected, red junta). ' +
        'Red <b>!</b> marks = visible violence. Number by a region = estimated insurgent forces.</div>';
      P.innerHTML = html;
    } else if (tab === "act") {
      const p = game.state.player;
      const mLeft = p.mandate - queue.reduce((s, q) =>
        s + game.initiatives[q.initiative].mandate_cost, 0);
      const tLeft = p.treasury - queue.reduce((s, q) =>
        s + game.initiatives[q.initiative].treasury_cost, 0);
      const FAM = { military: "Military", governance: "Build / govern",
        intelligence: "Intelligence", diplomatic: "Diplomacy", domestic: "At home" };
      let html = `<div class="sub">Pick an action, then (if it needs a target) tap a region. ` +
        `End the month to resolve. Left to spend: <b>${mLeft}</b> Mandate, ` +
        `<b>${Math.round(tLeft)}</b> Funds.</div>`;
      for (const id of Object.keys(game.initiatives).sort()) {
        const i = game.initiatives[id];
        const cls = armed === id ? "card init armed" : "card init";
        const affordable = i.mandate_cost <= mLeft && i.treasury_cost <= tLeft;
        html += `<div class="${cls}" data-init="${id}" style="${affordable ? "" : "opacity:.5"}">` +
          `<div><b>${i.name}</b>` +
          `<small>${FAM[i.family] || i.family}` +
          (i.target === "node" ? " · needs a region" : " · nationwide") +
          ` · risk: ${i.backfire.channel.replace(/_/g, " ")} ` +
          `(${Math.round(i.backfire.probability * 100)}%)</small></div>` +
          `<span class="cost" title="costs ${i.mandate_cost} Mandate and ${i.treasury_cost} Funds">` +
          `${i.mandate_cost} Mandate<br>${i.treasury_cost} Funds</span></div>`;
      }
      if (queue.length) {
        html += '<div class="head">Queued</div>';
        queue.forEach((q, k) => {
          html += `<div class="queue" data-dq="${k}">✕ ${game.initiatives[q.initiative].name}` +
            (q.node ? " → " + q.node : "") + "</div>";
        });
      }
      html += '<div style="height:8px"></div><button class="primary" id="btnEnd">End month</button>';
      P.innerHTML = html;
      P.querySelectorAll("[data-init]").forEach((el) => el.addEventListener("click", () => {
        const i = game.initiatives[el.dataset.init];
        const mLeft2 = game.state.player.mandate - queue.reduce((s, q) =>
          s + game.initiatives[q.initiative].mandate_cost, 0);
        const tLeft2 = game.state.player.treasury - queue.reduce((s, q) =>
          s + game.initiatives[q.initiative].treasury_cost, 0);
        if (i.mandate_cost > mLeft2 || i.treasury_cost > tLeft2) return;
        if (i.target === "global") { queue.push({ initiative: i.id, node: null }); armed = null; }
        else armed = armed === i.id ? null : i.id;
        renderPanel(); renderHeader();
      }));
      P.querySelectorAll("[data-dq]").forEach((el) => el.addEventListener("click", () => {
        queue.splice(Number(el.dataset.dq), 1); renderPanel(); renderHeader();
      }));
      $("btnEnd").addEventListener("click", doEndTurn);
    } else {
      const rep = game.state.reports[game.state.reports.length - 1];
      if (!rep) { P.innerHTML = '<div class="sub">No resolved turns yet.</div>'; return; }
      let html = `<div class="head">Turn ${rep.turn} — itemized consequences</div>`;
      const groups = {};
      for (const e of rep.ledger) (groups[e.gauge] = groups[e.gauge] || []).push(e);
      for (const g of Object.keys(groups).sort()) {
        html += `<div class="card"><b>${g}</b>`;
        for (const e of groups[g]) {
          const cls = e.delta >= 0 ? "pos" : "neg";
          html += `<div class="led"><span class="${cls}">${e.delta >= 0 ? "+" : ""}` +
            `${e.delta.toFixed(1)}</span> ${e.source}</div>`;
        }
        html += "</div>";
      }
      if (!rep.ledger.length) html += '<div class="sub">No legitimacy movement.</div>';
      if (rep.events.length) {
        html += '<div class="head">Events</div>';
        for (const ev of rep.events)
          html += `<div class="card">${ev.title}<br><span class="sub">→ ${ev.choice}</span></div>`;
      }
      html += '<div class="head">World log</div>';
      for (const l of rep.log.slice(0, 12))
        html += `<div class="sub">· ${l.event}${l.country ? " " + l.country : ""}` +
          `${l.node ? " @" + l.node : ""}${l.outcome ? " → " + l.outcome : ""}</div>`;
      html += `<div class="head">Settings</div><div class="row">` +
        `<span class="sub">seed</span><input id="inSeed" value="${game.state.seed}">` +
        `<span class="sub">months</span><select id="inLen">` +
        [36, 60, game.consts.horizon_turns].map((v) =>
          `<option ${v === horizon ? "selected" : ""}>${v}</option>`).join("") +
        `</select></div><div class="row" style="margin-top:6px">` +
        `<span class="sub">scenario</span><select id="inScen" style="width:auto">` +
        Object.keys(SCENARIOS).map((sid) =>
          `<option value="${sid}" ${sid === scenario ? "selected" : ""}>` +
          `${SCENARIOS[sid]}</option>`).join("") +
        `</select> <button class="act" id="btnNew">New run</button></div>` +
        (rules.scenario ? `<div class="sub" style="margin-top:5px">${rules.scenario.name}` +
          ` — seat: ${rules.scenario.seat}</div>` : "");
      P.innerHTML = html;
      $("btnNew").addEventListener("click", () => {
        horizon = Number($("inLen").value);
        scenario = $("inScen").value;
        newGame(Number($("inSeed").value) || 0);
      });
    }
  }

  // ---------- turn flow ----------
  function doEndTurn() {
    const res = game.endTurn(queue);
    queue = []; armed = null;
    if (res.phase === "event") showEvent(res.card, res.ctx);
    else afterTurn();
  }
  function showEvent(card, ctx) {
    const M = $("modalPaper");
    let html = `<h2>${card.title}</h2><p>${card.text}</p>` +
      `<p class="sub">Context: ${ctx}</p>`;
    card.choices.forEach((c, i) => {
      html += `<button class="choice" data-c="${i}">${c.label}</button>`;
    });
    if (card.sources) html += `<div class="src">${card.sources.join(" · ")}</div>`;
    M.innerHTML = html;
    $("modal").classList.add("show");
    M.querySelectorAll(".choice").forEach((b) => b.addEventListener("click", () => {
      $("modal").classList.remove("show");
      game.resolveEvent(Number(b.dataset.c));
      afterTurn();
    }));
  }
  function afterTurn() {
    save();
    if (game.state.turn >= horizon ||
        Object.values(game.state.collapsed).every(Boolean)) return showEnd();
    setTab("brief"); renderAll();
  }
  function showEnd() {
    const s = game.score(), e = game.ending();
    const E = $("endPaper");
    E.innerHTML = `<h2>${e.name}</h2><p>${e.text}</p>` +
      `<table><tr><td>Stabilization</td><td>${s.stabilization}</td></tr>` +
      `<tr><td>× Order (juntas ${s.juntas}, blocs ${s.blocs})</td><td>${s.order_mult}</td></tr>` +
      `<tr><td>× Integrity (drift ${s.drift})</td><td>${s.integrity_mult}</td></tr>` +
      `<tr><td>− Costs (casualties ${s.casualties}, spend)</td><td>${s.costs}</td></tr>` +
      `<tr><td><b>Final score</b></td><td><b>${s.final}</b></td></tr></table>` +
      `<div class="head">Post-mortem: what you believed vs what was true</div>` +
      `<canvas id="pm" width="380" height="170"></canvas>` +
      `<div class="sub">amber = believed insurgent strength (briefing estimates) · ` +
      `red = the truth · the gap is the fog you did or didn't buy down</div>` +
      `<div style="height:8px"></div>` +
      `<button class="primary" id="btnAgain">New run (seed ${game.state.seed + 1})</button>`;
    $("endgame").classList.add("show");
    drawPostMortem();
    $("btnAgain").addEventListener("click", () => {
      $("endgame").classList.remove("show");
      newGame(game.state.seed + 1);
    });
  }
  function drawPostMortem() {
    const cv = $("pm"), ctx = cv.getContext("2d");
    const { believed, truth } = game.state.hist;
    const W = cv.width, H = cv.height, n = truth.length;
    const max = Math.max(10, ...believed, ...truth) * 1.1;
    ctx.fillStyle = "#0d1117"; ctx.fillRect(0, 0, W, H);
    const line = (data, color) => {
      ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.beginPath();
      data.forEach((v, i) => {
        const x = 8 + (W - 16) * (n > 1 ? i / (n - 1) : 0);
        const y = H - 8 - (H - 16) * (v / max);
        i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      });
      ctx.stroke();
    };
    line(believed, "#ffb300"); line(truth, "#ef5350");
  }

  function renderAll() { renderHeader(); renderMap(); renderPanel(); }

  // ---------- boot ----------
  (async function boot() {
    allRules = await loadAll();
    let restored = false;
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (raw) {
        const blob = JSON.parse(raw);
        horizon = blob.horizon || 60;
        scenario = blob.scenario && (blob.scenario === "sahel_lite" ||
          allRules.scenarios[blob.scenario]) ? blob.scenario : "sahel_lite";
        rules = mergedRules(scenario);
        game = PaxEngine.Game(rules, 0).restore(blob.data);
        restored = true;
      }
    } catch (e) { restored = false; }
    if (!restored) { rules = mergedRules(scenario); game = PaxEngine.Game(rules, 42); save(); }
    $("tabBrief").addEventListener("click", () => setTab("brief"));
    $("tabAct").addEventListener("click", () => setTab("act"));
    $("tabReport").addEventListener("click", () => setTab("report"));
    $("tabKey").addEventListener("click", () => setTab("key"));
    $("helpBtn").addEventListener("click", showIntro);
    if (game.state.turn >= horizon) { showEnd(); } else renderAll();
    // First-ever load: orient the player once (tracked separately from the game save).
    try {
      if (!localStorage.getItem("paxstressia_seen_intro")) {
        showIntro();
        localStorage.setItem("paxstressia_seen_intro", "1");
      }
    } catch (e) { /* private mode: just skip the one-time intro */ }
  })();
})();
</script>
</body>
</html>
